name: Build Demo

on:
  workflow_dispatch:

jobs:
  # ─── Web build (for itch.io) ───
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web demo
        run: npm run build:web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldItIn-Demo-Web
          path: dist-web
          retention-days: 30

  # ─── Windows build ───
  build-windows:
    runs-on: windows-latest
    env:
      VITE_DEMO: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app (demo mode)
        run: npm run build:demo

      - name: Package with electron-builder
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldItIn-Demo-Windows
          path: release/*.exe
          retention-days: 30

  # ─── Linux build ───
  build-linux:
    runs-on: ubuntu-latest
    env:
      VITE_DEMO: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app (demo mode)
        run: npm run build:demo

      - name: Package with electron-builder
        run: npx electron-builder --linux --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldItIn-Demo-Linux
          path: release/*.AppImage
          retention-days: 30

  # ─── macOS build (signed + notarized) ───
  build-mac:
    runs-on: macos-latest
    env:
      VITE_DEMO: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app (demo mode)
        run: npm run build:demo

      - name: Package with electron-builder (signed)
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: npx electron-builder --mac --publish never

      - name: Notarize the .dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find release -name "*.dmg" | head -1)
          echo "Notarizing: $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          echo "Notarization complete!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldItIn-Demo-Mac
          path: release/*.dmg
          retention-days: 30
