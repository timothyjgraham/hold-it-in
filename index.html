                                    const enemyDist = Math.sqrt((e.x - t.gridX) ** 2 + (e.z - t.gridZ) ** 2);
                                    const leverScale = 0.3 + 0.7 * Math.min(1, enemyDist / t.def.range);

                                    // Apply as velocity (decays over ~0.25s, total displacement ≈ knockback * leverScale)
                                    const KNOCKBACK_DECAY = 12;
                                    const kbForce = t.def.knockback * leverScale * KNOCKBACK_DECAY;
                                    e.knockbackVX = kbX * kbForce;
                                    e.knockbackVZ = kbZ * kbForce;

                                    // Hit react + hitstop freeze
                                    if (e.animController && !e.dying) {
                                        e.animController.playOneShot('hit_react');
                                        e.animController.setTimeScale(0);
                                        e._hitstopTimer = 0.08;
                                    }

                                    // ─── IMPACT JUICE ───
                                    // Global hitstop — brief game-wide freeze
                                    this._globalHitstop = Math.max(this._globalHitstop, 0.06);
                                    // Camera micro-shake — proportional to lever (tip hits = bigger shake)
                                    this._cameraShake = 0.12;
                                    this._cameraShakeIntensity = 0.15 + 0.15 * leverScale;
                                    // Squash pop — enemy compresses on Y then springs back
                                    e._impactSquash = 0.18;

                                    // POW! impact VFX
                                    this._spawnMopImpact(e.x, e.z);
                                }
                            }
                        }
                    } else {
                        // --- Not sweeping — check cooldown and look for targets ---
                        t.attackTimer -= dt;

                        if (t.attackTimer <= 0) {
                            // Find nearest enemy in range
                            let mopTarget = null;
                            let mopTargetDist = Infinity;
                            for (const e of this.enemies) {
                                if (e.dying) continue;
                                const dx = e.x - t.gridX;
                                const dz = e.z - t.gridZ;
                                const dist = Math.sqrt(dx * dx + dz * dz);
                                if (dist < t.def.range && dist < mopTargetDist) {
                                    mopTarget = e;
                                    mopTargetDist = dist;
                                }
                            }

                            if (mopTarget) {
                                // Initiate sweep toward target
                                const dx = mopTarget.x - t.gridX;
                                const dz = mopTarget.z - t.gridZ;
                                const targetAngle = Math.atan2(dx, dz);
                                let angleDiff = targetAngle - t.mopAngle;
                                // Normalize to [-π, π]
                                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                                const sweepDir = angleDiff >= 0 ? 1 : -1;
                                // Minimum 60° sweep for visual impact, plus follow-through past target
                                const absArc = Math.max(
                                    Math.abs(angleDiff) + t.def.followThrough,
                                    1.05
                                );

                                t.sweepFrom = t.mopAngle;
                                t.sweepTo = t.mopAngle + sweepDir * absArc;
                                t.sweepDir = sweepDir;
                                t.sweepTotalArc = absArc;
                                t.sweepProgress = 0;
                                t.sweeping = true;
                                t.sweepHitEnemies = new Set();
                            }
                        }

                        // Idle sway — subtle wobble when waiting
                        if (mopArm) {
                            mopArm.rotation.y = t.mopAngle + Math.sin(this.time * 1.5) * 0.03;
                        }
                    }

                    continue;
                }
            }

            // --- Update projectiles ---
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const p = this.projectiles[i];
                p.x += p.vx * dt;
                p.z += p.vz * dt;
                p.mesh.position.set(p.x, 0.8, p.z);
                p.life -= dt;

                if (p.life <= 0) {
                    this.scene.remove(p.mesh);
                    this.projectiles.splice(i, 1);
                    continue;
                }

                // Hit detection
                for (const e of this.enemies) {
                    const dx = e.x - p.x;
                    const dz = e.z - p.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < e.size + 0.3) {
                        e.hp -= p.damage;
                        e.hitFlash = 0.15;
                        // Hit react animation (additive layer)
                        if (e.animController && !e.dying) {
                            e.animController.playOneShot('hit_react');
                        }
                        this.scene.remove(p.mesh);
                        this.projectiles.splice(i, 1);
                        break;
                    }
                }
            }

            // --- Update Ubik sprays ---
            this._updateSprays(dt);

            // --- Exit door spring physics ---
            if (this.officeGroup && this.officeGroup.userData.exitDoors) {
                const doors = this.officeGroup.userData.exitDoors;
                const { springK, dampK, pushImpulse, maxAngle, minAngle, doorZ, halfWidth } = doors;

                // Check each enemy for door push (one impulse per enemy)
                for (const e of this.enemies) {
                    if (e.pushedExitDoor) continue;
                    // Enemy crossing the door threshold (within 1 unit of doorZ)
                    if (e.z < doorZ + 1 && e.z > doorZ - 2) {
                        // Check if enemy is within the doorway width
                        if (Math.abs(e.x) < halfWidth) {
                            e.pushedExitDoor = true;
                            // Push based on enemy speed — faster = harder slam
                            const force = pushImpulse * (e.speed / 3);
                            // Push the door on the enemy's side (or both if near center)
                            if (e.x <= 1) doors.leftAngVel += force;
                            if (e.x >= -1) doors.rightAngVel += force;
                        }
                    }
                }

                // Spring physics for left door
                // Positive angle = swung open inward (toward playing field)
                doors.leftAngVel += (-springK * doors.leftAngle - dampK * doors.leftAngVel) * dt;
                doors.leftAngle += doors.leftAngVel * dt;
                doors.leftAngle = Math.max(minAngle, Math.min(maxAngle, doors.leftAngle));
                // Left door: positive rotation.y swings free edge toward -z (into the room)
                doors.leftPivot.rotation.y = doors.leftAngle;

                // Spring physics for right door
                doors.rightAngVel += (-springK * doors.rightAngle - dampK * doors.rightAngVel) * dt;
                doors.rightAngle += doors.rightAngVel * dt;
                doors.rightAngle = Math.max(minAngle, Math.min(maxAngle, doors.rightAngle));
                // Right door: negative rotation.y swings free edge toward -z (into the room)
                doors.rightPivot.rotation.y = -doors.rightAngle;
            }
        },

        _fireProjectile(tower, target) {
            const dx = target.x - tower.gridX;
            const dz = target.z - tower.gridZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            const speed = 20;

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 6, 6),
                new THREE.MeshBasicMaterial({ color: PALETTE.success })
            );
            mesh.position.set(tower.gridX, 0.8, tower.gridZ);
            this.scene.add(mesh);

            this.projectiles.push({
                mesh: mesh,
                x: tower.gridX,
                z: tower.gridZ,
                vx: (dx / dist) * speed,
                vz: (dz / dist) * speed,
                damage: tower.def.damage,
                life: 2.0,
            });
        },

        // ─── UBIK SPRAY SYSTEM ───
        _fireSpray(tower, target) {
            const def = tower.def;
            const spraySpeed = 12;
            const duration = def.sprayDuration || 0.8;

            // Direction from tower toward target
            const dirX = target.x - tower.gridX;
            const dirZ = target.z - tower.gridZ;
            const dirLen = Math.sqrt(dirX * dirX + dirZ * dirZ) || 1;
            const ndx = dirX / dirLen;
            const ndz = dirZ / dirLen;
            // Perpendicular for fan spread
            const perpX = -ndz;
            const perpZ = ndx;

            // Snap can rotation to spray direction
            tower.mesh.rotation.y = Math.atan2(ndx, ndz);

            // Create spray cloud group (multiple particles in a cone)
            const group = new THREE.Group();
            group.position.set(tower.gridX, 1.4, tower.gridZ);
            this.scene.add(group);

            // 5 spray particles in a fan pattern
            const particles = [];
            const sprayMat = new THREE.MeshBasicMaterial({
                color: PALETTE.ubik,
                transparent: true,
                opacity: 0.7,
                depthWrite: false,
            });
            for (let i = 0; i < 5; i++) {
                const size = 0.15 + Math.random() * 0.15;
                const pMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(size, 5, 5),
                    sprayMat.clone()
                );
                // Fan spread along perpendicular axis
                const spread = (i - 2) * 0.12;
                pMesh.position.set(
                    perpX * spread + ndx * 0.3,
                    (Math.random() - 0.5) * 0.3,
                    perpZ * spread + ndz * 0.3
                );
                group.add(pMesh);
                const baseSpeed = spraySpeed + Math.random() * 2;
                particles.push({
                    mesh: pMesh,
                    vx: ndx * baseSpeed + perpX * spread * spraySpeed * 0.3,
                    vz: ndz * baseSpeed + perpZ * spread * spraySpeed * 0.3,
                    startSize: size,
                });
            }

            this.sprays.push({
                group: group,
                particles: particles,
                x: tower.gridX,
                z: tower.gridZ,
                dirX: ndx,             // Spray direction (unit vector)
                dirZ: ndz,
                damage: def.damage,
                life: duration,
                maxLife: duration,
                width: def.sprayWidth || 2.0,
                range: def.range,
                damageTimer: 0,        // Tick damage every 0.2s — continuous while in cloud
            });
        },

        _updateSprays(dt) {
            for (let i = this.sprays.length - 1; i >= 0; i--) {
                const s = this.sprays[i];
                s.life -= dt;
                s.damageTimer -= dt;

                const progress = 1 - s.life / s.maxLife; // 0→1
                const alpha = Math.max(0, s.life / s.maxLife); // 1→0

                // Update each particle
                for (const p of s.particles) {
                    p.mesh.position.x += p.vx * dt;
                    p.mesh.position.z += p.vz * dt;
                    // Grow and fade as spray expands
                    const scale = 1 + progress * 3;
                    p.mesh.scale.setScalar(scale);
                    p.mesh.material.opacity = alpha * 0.6;
                }

                // Damage enemies in the spray cone — continuous tick damage
                if (s.damageTimer <= 0) {
                    s.damageTimer = 0.2; // Tick every 0.2s
                    const sprayFrontDist = progress * s.range;
                    const sprayBackDist = Math.max(0, progress - 0.3) * s.range;
                    const halfWidth = (s.width * 0.5) * progress + 0.5; // Widens with distance
                    // Perpendicular axis for lateral distance
                    const perpX = -s.dirZ;
                    const perpZ = s.dirX;

                    for (const e of this.enemies) {
                        if (e.dying) continue;
                        const relX = e.x - s.x;
                        const relZ = e.z - s.z;
                        // Project onto spray direction (forward distance along cone)
                        const forward = relX * s.dirX + relZ * s.dirZ;
                        // Project onto perpendicular (lateral offset from cone center)
                        const lateral = Math.abs(relX * perpX + relZ * perpZ);

                        if (forward >= sprayBackDist && forward <= sprayFrontDist + 1 &&
                            lateral < halfWidth + e.size * 0.5) {
                            e.hp -= s.damage;
                            e.hitFlash = 0.15;
                            if (e.animController && !e.dying) {
                                e.animController.playOneShot('hit_react');
                            }
                        }
                    }
                }

                // Remove expired spray
                if (s.life <= 0) {
                    // Dispose particle materials
                    for (const p of s.particles) {
                        p.mesh.geometry.dispose();
                        p.mesh.material.dispose();
                    }
                    this.scene.remove(s.group);
                    this.sprays.splice(i, 1);
                }
            }
        },

        // ============================
        // GRID HOVER
        // ============================
        _updateGridHover() {
            const active = this.selectedTower && (this.state === 'playing' || this.state === 'paused') && !this._upgradePhase;

            // Show/hide grid lines based on whether we're placing
            if (this._buildGrid) this._buildGrid.visible = !!active;

            if (!active) {
                this.gridHighlight.visible = false;
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
                this._clearGhost();
                return;
            }

            const pos = this._getGridPos();
            if (!pos) {
                this.gridHighlight.visible = false;
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
                this._clearGhost();
                return;
            }

            // Pulse animation for highlight
            const pulse = 0.85 + Math.sin(Date.now() * 0.006) * 0.15;
            const def = this.TOWERS[this.selectedTower];
            const tw = def.tileWidth || 1;

            this.gridHighlight.position.set(pos.x, 0.05, pos.z);
            this.gridHighlight.scale.set(pulse * tw, pulse, pulse);
            this.gridHighlight.visible = true;

            // Color: green if can place, red if occupied or can't afford
            const gs = CONFIG.grid;
            const halfW = Math.floor(CONFIG.laneWidth / gs / 2) * gs;
            let canPlace = this.coins >= def.cost;
            for (let dx = 0; dx < tw && canPlace; dx++) {
                const cellX = pos.x + (dx - Math.floor(tw / 2)) * gs;
                if (cellX < -halfW || cellX > halfW || this._isCellOccupied(cellX, pos.z)) {
                    canPlace = false;
                }
            }
            const hoverColor = canPlace ? PALETTE.success : PALETTE.danger;
            this.gridHighlight.material.color.setHex(hoverColor);
            this.gridHighlight.material.opacity = canPlace ? 0.4 : 0.25;

            // Range circle
            const range = def.range;
            if (range > 0) {
                const rangeColor = (this.selectedTower === 'coinmagnet') ? PALETTE.gold : hoverColor;
                this.rangeCircle.scale.set(range, range, range);
                this.rangeCircle.position.set(pos.x, 0.04, pos.z);
                this.rangeCircle.material.color.setHex(rangeColor);
                this.rangeCircle.visible = true;

                this.rangeEdge.scale.set(range, range, range);
                this.rangeEdge.position.set(pos.x, 0.045, pos.z);
                this.rangeEdge.material.color.setHex(rangeColor);
                this.rangeEdge.visible = true;
            } else {
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
            }

            // Ghost tower preview
            this._updateGhost(pos, canPlace);
        },

        _updateGhost(pos, canPlace) {
            const def = this.TOWERS[this.selectedTower];
            // Recreate ghost if tower type changed
            if (this._ghostType !== this.selectedTower) {
                this._clearGhost();
                const ghost = this._createTowerMesh(this.selectedTower, def);
                this.ghostPreview = ghost.mesh;
                this.ghostPreview.traverse(child => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.material.transparent = true;
                        child.material.opacity = 0.4;
                        child.material.depthWrite = false;
                    }
                });
                this.scene.add(this.ghostPreview);
                this._ghostType = this.selectedTower;
            }
            if (this.ghostPreview) {
                const bob = Math.sin(Date.now() * 0.004) * 0.1;
                this.ghostPreview.position.set(pos.x, bob, pos.z);
                this.ghostPreview.visible = true;
                // Tint ghost red/green
                this.ghostPreview.traverse(child => {
                    if (child.isMesh) {
                        child.material.opacity = canPlace ? 0.45 : 0.2;
                    }
                });
            }
        },

        _clearGhost() {
            if (this.ghostPreview) {
                this.scene.remove(this.ghostPreview);
                this.ghostPreview = null;
                this._ghostType = null;
            }
        },

        // ============================
        // FLOATING COIN TEXT
        // ============================
        _spawnCoinText(x, z, amount) {
            const canvas = document.createElement('canvas');
            canvas.width = 192;
            canvas.height = 80;
            const ctx = canvas.getContext('2d');
            // Slight random rotation for hand-drawn feel
            const rot = (Math.random() - 0.5) * 0.1;
            ctx.translate(96, 40);
            ctx.rotate(rot);
            ctx.font = '52px Bangers, Impact, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const text = `+${amount}`;
            // Black text outline
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 5;
            ctx.strokeText(text, 0, 2);
            // Gold fill
            ctx.fillStyle = '#ffd93d';
            ctx.fillText(text, 0, 2);

            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, 3, z);
            sprite.scale.set(3, 1.5, 1);
            this.scene.add(sprite);

            this._floatingTexts.push({ sprite, life: 1.2 });
        },

        // ============================
        // MOP IMPACT VFX
        // ============================
        _spawnMopImpact(x, z) {
            // "POW!" text sprite — comic-book style
            const canvas = document.createElement('canvas');
            canvas.width = 192;
            canvas.height = 96;
            const ctx = canvas.getContext('2d');
            const rot = (Math.random() - 0.5) * 0.3;
            ctx.translate(96, 48);
            ctx.rotate(rot);
            ctx.font = 'bold 56px Bangers, Impact, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const words = ['POW!', 'WHAP!', 'SMACK!', 'THWACK!'];
            const text = words[Math.floor(Math.random() * words.length)];
            // Purple text with black outline
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 6;
            ctx.strokeText(text, 0, 2);
            ctx.fillStyle = '#9b59b6';
            ctx.fillText(text, 0, 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(x, 3.5, z);
            sprite.scale.set(3.5, 1.8, 1);
            this.scene.add(sprite);
            this._floatingTexts.push({ sprite, life: 0.8 });

            // Expanding impact ring
            const ringGeo = new THREE.RingGeometry(0.2, 0.5, 16);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x9b59b6,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(x, 0.3, z);
            ring.rotation.x = -Math.PI / 2;
            this.scene.add(ring);
            this._mopImpacts.push({ ring, life: 0.35, maxLife: 0.35 });
        },

        // ============================
        // DOOR BASH PARTICLES
        // ============================
        _spawnDoorChips(x, z) {
            const chipCount = 8 + Math.floor(Math.random() * 6);

            for (let i = 0; i < chipCount; i++) {
                const size = 0.08 + Math.random() * 0.15;
                const geo = Math.random() > 0.5
                    ? new THREE.BoxGeometry(size, size * 0.5, size * 0.3)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                const mat2 = toonMat(PALETTE.wood);
                const chip = new THREE.Mesh(geo, mat2);
                chip.position.set(
                    x + (Math.random() - 0.5) * 2,
                    1.5 + Math.random() * 3,
                    z
                );
                chip.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                chip.castShadow = true;
                this.scene.add(chip);

                this._doorParticles.push({
                    mesh: chip,
                    vx: (Math.random() - 0.5) * 6,
                    vy: 3 + Math.random() * 5,
                    vz: -(2 + Math.random() * 4), // fly toward camera
                    rotSpeed: (Math.random() - 0.5) * 12,
                    life: 0.8 + Math.random() * 0.6,
                    maxLife: 0.8 + Math.random() * 0.6,
                    gravity: 12 + Math.random() * 4,
                });
            }
        },

        // ============================
        // BARRIER BASH PARTICLES
        // ============================
        _spawnBarrierChips(x, z, dmg) {

        // ============================
        // DOOR SHATTER CINEMATIC
        // ============================
        _startDoorShatter(doorZ) {
            this.state = 'cinematic';
            this._cinematicTimer = 0;

            // Hide the intact door panel and cracks
            const ud = this.doorGroup.userData;
            if (ud.door) ud.door.visible = false;
            if (ud.cracks) ud.cracks.forEach(c => c.visible = false);

            // === MASSIVE DOOR EXPLOSION — 50 shards blasting forward ===
            const shardCount = 50;
            for (let i = 0; i < shardCount; i++) {
                const size = 0.15 + Math.random() * 0.5;
                const isPlank = Math.random() > 0.35;
                const geo = isPlank
                    ? new THREE.BoxGeometry(size * 2, size * 0.5, size * 0.15)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                const isChrome = i >= shardCount - 5;
                const mat2 = toonMat(isChrome ? PALETTE.fixture : PALETTE.wood);
                const shard = new THREE.Mesh(geo, mat2);
                shard.position.set(
                    (Math.random() - 0.5) * 5,
                    0.3 + Math.random() * 3.5,
                    doorZ
                );
                shard.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                shard.castShadow = true;
                this.scene.add(shard);
                this._doorParticles.push({
                    mesh: shard,
                    vx: (Math.random() - 0.5) * 10,
                    vy: 1 + Math.random() * 8,
                    vz: -(5 + Math.random() * 12),
                    rotSpeed: (Math.random() - 0.5) * 18,
                    life: 2.5 + Math.random() * 1.5,
                    maxLife: 2.5 + Math.random() * 1.5,
                    gravity: 10 + Math.random() * 6,
                });
            }

            // Mark all enemies as rushing the toilet
            for (const e of this.enemies) {
                e.bashing = false;
                e.rushing = true;
                e.rushSpeed = (e.speed || 3) * 3.5;
                e._pilingOn = false;
                e._pileAngle = 0;
                e._pileRadius = 0;
                e._pileY = 0;
                e._pilePhase = Math.random() * Math.PI * 2;
                e._pileTimer = 0;
            }

            // Player panics — jumps up and flails
            if (this.playerCharacter) {
                this.playerCharacter.startPanic();
            }

            // Schedule timed comic VFX events
            this._cinematicSchedule = [
                { t: 0.15, fn: () => this._spawnComicPop(0.5, 6.5, 3.5, '!!!', '#ff6b7a', 5.5) },
                { t: 0.30, fn: () => this._cinematicDetachPhone() },
                { t: 0.40, fn: () => this._spawnComicPop(-1.8, 6, 4.5, '?!', '#ffd93d', 4.5) },
                { t: 0.55, fn: () => this._spawnComicPop(2.0, 5.5, 2.5, 'AAGH!', '#4a86c8', 4) },
                { t: 0.75, fn: () => this._spawnCurseBubble() },
                { t: 1.00, fn: () => this._spawnImpactStars(0, 4, 3, 5) },
                { t: 1.20, fn: () => this._spawnComicPop(-1.2, 5.5, 3.5, 'HEY!', '#d4a574', 3.5) },
                { t: 1.50, fn: () => this._spawnComicPop(1.5, 5, 3.5, 'MINE!', '#59c3e8', 3.5) },
                { t: 1.60, fn: () => this._spawnImpactStars(0.5, 3.5, 3.5, 4) },
                { t: 1.80, fn: () => this._spawnComicPop(-0.5, 5.5, 4.5, 'MOVE!', '#f5c842', 3.5) },
                { t: 2.10, fn: () => this._spawnComicPop(0.8, 6, 2.8, 'NO!', '#e84888', 4) },
                { t: 2.20, fn: () => this._spawnImpactStars(-0.5, 4, 3, 4) },
                { t: 2.50, fn: () => this._spawnComicPop(-1.5, 5, 3.5, 'OOF!', '#8b5e3c', 3.5) },
            ];
        },

        _cinematicDetachPhone() {
            if (!this.playerCharacter) return;
            const phoneMesh = this.playerCharacter.detachPhone(this.scene);
            if (!phoneMesh) return;
            this._flyingPhone = {
                mesh: phoneMesh,
                vx: -2 + Math.random() * 4,
                vy: 5 + Math.random() * 3,
                vz: -(3 + Math.random() * 3),
                rotX: (Math.random() - 0.5) * 20,
                rotY: (Math.random() - 0.5) * 20,
                rotZ: (Math.random() - 0.5) * 20,
                gravity: 14,
                bounces: 0,
            };
        },

        _updateCinematic(dt) {
            this._cinematicTimer += dt;
            const ct = this._cinematicTimer;

            // === FIRE SCHEDULED EVENTS ===
            while (this._cinematicSchedule.length > 0 &&
                   ct >= this._cinematicSchedule[0].t) {
                this._cinematicSchedule.shift().fn();
            }

            // === CAMERA — big initial shake + lingering rumble ===
            if (ct < 0.8) {
                // Violent shake from door explosion
                const intensity = 0.6 * (1 - ct / 0.8);
                this.camera.position.x = CONFIG.cameraPos.x + (Math.random() - 0.5) * intensity;
                this.camera.position.y = CONFIG.cameraPos.y + (Math.random() - 0.5) * intensity * 0.5;
            } else if (ct < 3.5) {
                // Low rumble from stampede chaos
                const rumble = 0.08 * Math.max(0, 1 - (ct - 0.8) / 2.7);
                this.camera.position.x = CONFIG.cameraPos.x + Math.sin(ct * 23) * rumble;
                this.camera.position.y = CONFIG.cameraPos.y + Math.cos(ct * 19) * rumble * 0.5;
            } else {
                this.camera.position.x = CONFIG.cameraPos.x;
                this.camera.position.y = CONFIG.cameraPos.y;
            }

            // === ENEMY RUSH + PILE-ON ===
            const tx = CONFIG.toiletPos.x;
            const tz = CONFIG.toiletPos.z;
            let pilingCount = 0;

            for (const e of this.enemies) {
                if (!e.rushing || !e.mesh) continue;

                const dx = tx - e.x;
                const dz = tz - e.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                // Transition to piling when close enough
                if (!e._pilingOn && dist < 2.2) {
                    e._pilingOn = true;
                    e._pileAngle = Math.atan2(e.x - tx, e.z - tz);
                    e._pileRadius = 0.2 + Math.random() * 0.7;
                    e._pileY = 0;
                    e._pileTimer = Math.random() * 0.3;
                }

                if (e._pilingOn) {
                    pilingCount++;
                    e._pileTimer += dt;

                    // Periodically jostle — shift target position
                    if (e._pileTimer > 0.25 + Math.random() * 0.35) {
                        e._pileTimer = 0;
                        e._pileAngle += (Math.random() - 0.5) * 2.0;
                        e._pileRadius = 0.15 + Math.random() * 0.8;
                    }

                    // Push toward assigned slot around toilet
                    const tgtX = tx + Math.sin(e._pileAngle) * e._pileRadius;
                    const tgtZ = tz + Math.cos(e._pileAngle) * e._pileRadius;
                    e.x += (tgtX - e.x) * 4 * dt;
                    e.z += (tgtZ - e.z) * 4 * dt;

                    // Bob up and down (trying to climb on / getting pushed off)
                    const bob = Math.sin(ct * 9 + e._pilePhase) * 0.35;
                    e._pileY = Math.max(0, bob);

                    // Squash/stretch from bumping (scale is normally 1,1,1 — size is in geometry)
                    const squash = 1 + Math.sin(ct * 11 + e._pilePhase * 2) * 0.12;
                    e.mesh.scale.y = squash;
                    e.mesh.scale.x = 1 / Math.sqrt(squash);
                    e.mesh.scale.z = 1 / Math.sqrt(squash);

                    e.mesh.position.set(e.x, e._pileY, e.z);

                    // Face the toilet (everyone wants to sit!)
                    e.mesh.rotation.y = Math.atan2(tx - e.x, tz - e.z) +
                        Math.sin(ct * 7 + e._pilePhase) * 0.3;
                } else {
                    // Still rushing toward toilet
                    if (dist > 0.5) {
                        const speed = e.rushSpeed * dt;
                        e.x += (dx / dist) * speed;
                        e.z += (dz / dist) * speed;
                        e.mesh.position.x = e.x;
                        e.mesh.position.z = e.z;
                    }
                }
            }

            // === ENEMY SEPARATION — push overlapping pilings apart ===
            for (let i = 0; i < this.enemies.length; i++) {
                const a = this.enemies[i];
                if (!a._pilingOn || !a.mesh) continue;
                for (let j = i + 1; j < this.enemies.length; j++) {
                    const b = this.enemies[j];
                    if (!b._pilingOn || !b.mesh) continue;
                    const sepX = a.x - b.x;
                    const sepZ = a.z - b.z;
                    const sepDist = Math.sqrt(sepX * sepX + sepZ * sepZ);
                    const minSep = (a.size + b.size) * 0.25;
                    if (sepDist < minSep && sepDist > 0.01) {
                        const push = (minSep - sepDist) * 3 * dt;
                        const nx = sepX / sepDist;
                        const nz = sepZ / sepDist;
                        a.x += nx * push;
                        a.z += nz * push;
                        b.x -= nx * push;
                        b.z -= nz * push;
                    }
                }
            }

            // === TOILET RATTLE — shakes as enemies pile on ===
            if (pilingCount > 0 && this.toilet) {
                const rattleAmp = Math.min(pilingCount * 0.025, 0.12);
                this.toilet.rotation.y = Math.sin(ct * 14) * rattleAmp;
                this.toilet.rotation.z = Math.cos(ct * 11) * rattleAmp * 0.6;
                this.toilet.position.x = CONFIG.toiletPos.x + Math.sin(ct * 17) * rattleAmp * 0.2;
            }

            // === FLYING PHONE PHYSICS ===
            if (this._flyingPhone) {
                const p = this._flyingPhone;
                p.vy -= p.gravity * dt;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.mesh.rotation.x += p.rotX * dt;
                p.mesh.rotation.y += p.rotY * dt;
                p.mesh.rotation.z += p.rotZ * dt;

                // Bounce off floor
                if (p.mesh.position.y < 0.08) {
                    p.mesh.position.y = 0.08;
                    if (p.bounces < 2) {
                        p.vy = Math.abs(p.vy) * 0.35;
                        p.vx *= 0.6;
                        p.vz *= 0.6;
                        p.rotX *= 0.5;
                        p.rotY *= 0.5;
                        p.rotZ *= 0.5;
                        p.bounces++;
                    } else {
                        p.vy = 0;
                        p.vx = 0;
                        p.vz = 0;
                    }
                }

                // Keep screen glowing
                if (p.mesh.children[0]) {
                    p.mesh.children[0].material.emissiveIntensity =
                        1.0 + Math.sin(ct * 6) * 0.5;
                }
            }

            // === UPDATE CINEMATIC EFFECTS (comic pops, speech bubble, stars) ===
            for (let i = this._cinematicEffects.length - 1; i >= 0; i--) {
                const fx = this._cinematicEffects[i];
                fx.life -= dt;
                fx.elapsed = (fx.elapsed || 0) + dt;

                const obj = fx.sprite || fx.mesh;
                if (!obj) continue;

                // Pop-in scale (quick elastic scale from 0 to target)
                const popDur = fx.popDur || 0.2;
                if (fx.elapsed < popDur) {
                    const pt = fx.elapsed / popDur;
                    // Overshoot elastic: peaks at ~1.2x then settles
                    const elastic = pt < 0.6
                        ? (pt / 0.6) * 1.25
                        : 1.25 - (pt - 0.6) / 0.4 * 0.25;
                    const s = fx.targetScale * elastic;
                    obj.scale.set(s, s * 0.55, 1);
                } else {
                    // Gentle float + slow drift
                    obj.position.y += (fx.vy || 0.5) * dt;
                    obj.position.x += (fx.vx || 0) * dt;
                    // Slight wobble
                    if (fx.wobble) {
                        obj.material.rotation = Math.sin(fx.elapsed * 6) * 0.08;
                    }
                }

                // Fade out in last 40% of life
                const fadeStart = fx.maxLife * 0.4;
                if (fx.life < fadeStart) {
                    obj.material.opacity = Math.max(0, fx.life / fadeStart);
                }

                // Clean up dead effects
                if (fx.life <= 0) {
                    this.scene.remove(obj);
                    if (obj.material.map) obj.material.map.dispose();
                    obj.material.dispose();
                    if (obj.geometry) obj.geometry.dispose();
                    this._cinematicEffects.splice(i, 1);
                }
            }

            // === FADE TO BLACK at 3.0s (extended for chaos viewing) ===
            if (ct >= 3.0) {
                const fadeEl = document.getElementById('fade-overlay');
                if (!fadeEl.classList.contains('active')) {
                    fadeEl.classList.add('active');
                }
            }

            // === GAME OVER after fade completes ===
            if (ct >= 5.0) {
                this.gameOver();
            }
        },

        // ============================
        // CINEMATIC VFX HELPERS
        // ============================

        /**
         * Spawn a comic-book style text pop (!!!, ?!, AAGH!, etc.)
         */
        _spawnComicPop(x, y, z, text, color, scale) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const rot = (Math.random() - 0.5) * 0.4;
            ctx.translate(128, 64);
            ctx.rotate(rot);

            // Starburst background for extra punch
            const bgSize = text.length > 3 ? 55 : 48;
            ctx.fillStyle = '#fff4d9';
            ctx.beginPath();
            for (let i = 0; i < 12; i++) {
                const a = (i / 12) * Math.PI * 2;
                const r = i % 2 === 0 ? bgSize : bgSize * 0.65;
                ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Text
            const fontSize = text.length > 4 ? 44 : 58;
            ctx.font = `bold ${fontSize}px Bangers, Impact, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 6;
            ctx.strokeText(text, 0, 0);
            ctx.fillStyle = color;
            ctx.fillText(text, 0, 0);

            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, y, z);
            sprite.scale.set(0.01, 0.01, 1); // start tiny — pops in
            this.scene.add(sprite);

            this._cinematicEffects.push({
                sprite,
                life: 1.5,
                maxLife: 1.5,
                elapsed: 0,
                targetScale: scale || 4,
                popDur: 0.18,
                vy: 0.6,
                vx: (Math.random() - 0.5) * 0.3,
                wobble: true,
            });
        },

        /**
         * Spawn censored curse word speech bubble above the player.
         */
        _spawnCurseBubble() {
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 180;
            const ctx = canvas.getContext('2d');

            // Speech bubble body (rounded rect)
            ctx.fillStyle = '#faf5ef';
            ctx.beginPath();
            ctx.moveTo(30, 10);
            ctx.lineTo(290, 10);
            ctx.quadraticCurveTo(310, 10, 310, 30);
            ctx.lineTo(310, 105);
            ctx.quadraticCurveTo(310, 125, 290, 125);
            ctx.lineTo(185, 125);
            // Triangle pointer
            ctx.lineTo(170, 160);
            ctx.lineTo(145, 125);
            ctx.lineTo(30, 125);
            ctx.quadraticCurveTo(10, 125, 10, 105);
            ctx.lineTo(10, 30);
            ctx.quadraticCurveTo(10, 10, 30, 10);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Curse symbols
            ctx.font = 'bold 52px Bangers, Impact, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ff6b7a';
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 4;
            ctx.strokeText('@#$%!', 160, 68);
            ctx.fillText('@#$%!', 160, 68);

            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            // Position above where the player will be (slightly behind toilet)
            const pz = this.playerCharacter
                ? this.playerCharacter.group.position.z
                : CONFIG.toiletPos.z - 1;
            sprite.position.set(0.3, 6.5, pz);
            sprite.scale.set(0.01, 0.01, 1);
            this.scene.add(sprite);

            this._cinematicEffects.push({
                sprite,
                life: 2.2,
                maxLife: 2.2,
                elapsed: 0,
                targetScale: 5.5,
                popDur: 0.22,
                vy: 0.3,
                vx: 0,
                wobble: true,
            });
        },

        /**
         * Spawn a burst of small impact stars around a position.
         */
        _spawnImpactStars(cx, cy, cz, count) {
            for (let i = 0; i < count; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.translate(32, 32);

                // Draw 4-pointed star
                ctx.fillStyle = i % 2 === 0 ? '#ffd93d' : '#fff0c0';
                ctx.strokeStyle = '#1a1a2e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let p = 0; p < 8; p++) {
                    const a = (p / 8) * Math.PI * 2 - Math.PI / 2;
                    const r = p % 2 === 0 ? 24 : 8;
                    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                const texture = new THREE.CanvasTexture(canvas);
                const mat = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    depthWrite: false,
                });
                const sprite = new THREE.Sprite(mat);
                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
                const rad = 0.3 + Math.random() * 0.5;
                sprite.position.set(
                    cx + Math.cos(angle) * rad,
                    cy + Math.random() * 0.5,
                    cz + Math.sin(angle) * rad
                );
                const s = 0.8 + Math.random() * 0.6;
                sprite.scale.set(s, s, 1);
                this.scene.add(sprite);

                this._cinematicEffects.push({
                    sprite,
                    life: 0.7 + Math.random() * 0.4,
                    maxLife: 0.7 + Math.random() * 0.4,
                    elapsed: 0,
                    targetScale: s,
                    popDur: 0.1,
                    vy: 1.5 + Math.random() * 2,
                    vx: Math.cos(angle) * (1 + Math.random()),
                    wobble: false,
                });
            }
        },

        // ============================
        // RENDER LOOP
        // ============================
        _animate() {
            requestAnimationFrame(() => this._animate());

            const rawDt = Math.min(this.clock.getDelta(), 0.05); // Cap dt
            let dt = rawDt;

            // ─── Global hitstop — freeze everything briefly on big impacts ───
            if (this._globalHitstop > 0) {
                this._globalHitstop -= rawDt;
                dt = rawDt * 0.05; // Near-zero time scale during hitstop
            }

            // ─── Camera micro-shake — uses real time so it decays during hitstop ───
            if (this._cameraShake > 0) {
                this._cameraShake -= rawDt;
                const t = Math.max(0, this._cameraShake / 0.12);
                const intensity = this._cameraShakeIntensity * t;
                this.camera.position.x = CONFIG.cameraPos.x + (Math.random() - 0.5) * intensity;
                this.camera.position.y = CONFIG.cameraPos.y + (Math.random() - 0.5) * intensity * 0.5;
            } else if (this.state !== 'cinematic') {
                this.camera.position.x = CONFIG.cameraPos.x;
                this.camera.position.y = CONFIG.cameraPos.y;
            }

            // Always update toilet glow
            updateToilet(this.toilet, this.clock.elapsedTime);

            // Update player character animation
            if (this.playerCharacter) {
                this.playerCharacter.update(dt);
            }

            // Position wave badge centered above the enemy spawn door (north exit)
            if (this.camera) {
                const exitTop = new THREE.Vector3(0, 7.5, 68);
                exitTop.project(this.camera);
                const wEl = document.getElementById('wave-display');
                const hw = window.innerWidth / 2;
                const hh = window.innerHeight / 2;
                const sx = exitTop.x * hw + hw;
                const sy = -exitTop.y * hh + hh;
                wEl.style.left = (sx - wEl.offsetWidth / 2) + 'px';
                wEl.style.top = (sy - wEl.offsetHeight) + 'px';
            }

            // Update grid hover
            this._updateGridHover();

            // Update floating texts
            for (let i = this._floatingTexts.length - 1; i >= 0; i--) {
                const ft = this._floatingTexts[i];
                ft.life -= dt;
                ft.sprite.position.y += 2.5 * dt;
                ft.sprite.material.opacity = Math.max(0, ft.life / 0.5);
                if (ft.life <= 0) {
                    this.scene.remove(ft.sprite);
                    ft.sprite.material.map.dispose();
                    ft.sprite.material.dispose();
                    this._floatingTexts.splice(i, 1);
                }
            }

            // Update mop impact rings (expanding + fading)
            for (let i = this._mopImpacts.length - 1; i >= 0; i--) {
                const fx = this._mopImpacts[i];
                fx.life -= dt;
                const t = 1 - fx.life / fx.maxLife; // 0→1
                // Quick expand with ease-out
                const scale = 1 + t * 4;
                fx.ring.scale.set(scale, scale, 1);
                fx.ring.material.opacity = 0.8 * (1 - t * t);
                if (fx.life <= 0) {
                    this.scene.remove(fx.ring);
                    fx.ring.geometry.dispose();
                    fx.ring.material.dispose();
                    this._mopImpacts.splice(i, 1);
                }
            }

            // Update door particles (wood chips flying)
            for (let i = this._doorParticles.length - 1; i >= 0; i--) {
                const p = this._doorParticles[i];
                p.life -= dt;
                p.vy -= p.gravity * dt;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.mesh.rotation.x += p.rotSpeed * dt;
                p.mesh.rotation.z += p.rotSpeed * 0.7 * dt;
                // Fade out in last 30% of life
                const fade = Math.min(1, p.life / (p.maxLife * 0.3));
                p.mesh.material.opacity = fade;
                p.mesh.material.transparent = true;
                // Scale down as dying
                const s = Math.max(0.1, fade);
                p.mesh.scale.set(s, s, s);
                if (p.life <= 0 || p.mesh.position.y < -1) {
                    this.scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    this._doorParticles.splice(i, 1);
                }
            }

            // Update sliding pots (kicked pot plant physics)
            for (let i = this._slidingPots.length - 1; i >= 0; i--) {
                const sp = this._slidingPots[i];
                sp.life -= dt;

                // Physics — slide with friction + bounce arc
                const friction = Math.exp(-4.5 * dt);
                sp.vx *= friction;
                sp.vz *= friction;
                sp.vy -= 22 * dt; // gravity
                sp.x += sp.vx * dt;
                sp.z += sp.vz * dt;
                sp.y += sp.vy * dt;

                // Floor bounce
                if (sp.y < 0) {
                    sp.y = 0;
                    sp.vy = Math.abs(sp.vy) * 0.3; // damped bounce
                    if (sp.vy < 0.5) sp.vy = 0;    // stop bouncing when tiny
                }

                // Update mesh position + tumble
                sp.mesh.position.set(sp.x, sp.y, sp.z);
                sp.mesh.rotation.x += sp.spin * dt;
                sp.mesh.rotation.z += sp.spin * 0.6 * dt;

                // Check collision with enemies (pot keeps sliding, trips anyone it hits)
                const speed2 = sp.vx * sp.vx + sp.vz * sp.vz;
                if (speed2 > 1) {
                    for (const e of this.enemies) {
                        if (e.dying || e.stunTimer > 0 || sp.hitEnemies.has(e)) continue;
                        const dx = e.x - sp.x;
                        const dz = e.z - sp.z;
                        const hitRadius = 0.6 + e.size * 0.25;
                        if (dx * dx + dz * dz < hitRadius * hitRadius) {
                            // Trip the enemy — pot keeps going
                            sp.hitEnemies.add(e);
                            e.hp -= sp.tripDamage;
                            e.hitFlash = 0.15;
                            e.stunTimer = sp.stunDuration;
                            e.tripFallDuration = sp.stunDuration;
                            if (e.animController) {
                                e.animController.playOneShot('hit_react');
                                e.animController.setTimeScale(0);
                            }
                            if (e.bashing) {
                                e.bashing = false;
                                e.bashingBarrier = null;
                            }
                            e._impactSquash = 0.18;
                            this._globalHitstop = Math.max(this._globalHitstop, 0.04);
                            this._cameraShake = 0.1;
                            this._cameraShakeIntensity = 0.12;
                            this._spawnTripImpact(e.x, e.z);
                        }
                    }
                }

                // Stopped, timed out, or out of bounds
                const stopped = speed2 < 0.5 && sp.y < 0.05;
                const outOfBounds = sp.x > 16 || sp.x < -16 || sp.z < 2 || sp.z > 71;
                if (sp.life <= 0 || stopped || outOfBounds) {
                    if (sp.hp > 0 && !outOfBounds) {
                        // Re-place as a ground hazard tower
                        this._replacePotPlant(sp);
                        this._slidingPots.splice(i, 1);
                    } else {
                        // Out of HP or out of bounds — shatter
                        this._spawnPotShatter(sp.x, sp.z);
                        this._disposeSlidingPot(i);
                    }
                }
            }

            // Update dropped coins (physics, animation, expiry)
            if (this.coinPool) {
                this.coinPool.update(dt, this.clock.elapsedTime, this.scene);
            }

            // Update active drones
            this._updateDrones(dt);

            // Update upgrade drones
            this._updateUpgradeDrones(dt);

            // Game logic
            this.update(dt);

            // Cinematic sequence (door shatter)
            if (this.state === 'cinematic') {
                this._updateCinematic(dt);
            }

            // Render (post-processing: edges + vignette)
            this.postFX.render();

            // 6E: Performance profiling (debug overlay, toggle with backtick key)
            if (this._showPerfStats) {
                this._perfFrameCount = (this._perfFrameCount || 0) + 1;
                this._perfAccum = (this._perfAccum || 0) + dt;
                if (this._perfAccum >= 1.0) {
                    const fps = Math.round(this._perfFrameCount / this._perfAccum);
                    const info = this.renderer.info.render;
                    const poolStats = this.enemyPool ? this.enemyPool.getStats() : {};
                    const statsText = `FPS: ${fps} | Draw: ${info.calls} | Tris: ${info.triangles} | Enemies: ${this.enemies.length} | Pool: ${JSON.stringify(poolStats.poolSizes || {})}`;
                    if (!this._perfEl) {
                        this._perfEl = document.createElement('div');
                        this._perfEl.style.cssText = 'position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;background:rgba(0,0,0,0.7);padding:4px 8px;z-index:9999;pointer-events:none;';
                        document.body.appendChild(this._perfEl);
                    }
                    this._perfEl.textContent = statsText;
                    this._perfFrameCount = 0;
                    this._perfAccum = 0;
                }
            }
        },
    };
    </script>

    <!-- Module entry point (loads after Game is defined) -->
    <script type="module" src="js/main.js"></script>
</body>
