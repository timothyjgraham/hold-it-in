        },

        // ============================
        // ENEMY SPAWNING
        // ============================
        _startWave() {
            this.wave++;
            this.waveActive = true;
            this.enemiesSpawned = 0;

            // Build spawn queue from composition or procedural generation
            const comp = this.WAVE_COMPOSITIONS[this.wave];
            this._spawnQueue = [];

            // Check for event wave (defined or recurring after wave 50)
            let event = this.WAVE_EVENTS[this.wave] || null;
            if (!event && this.wave > 50 && this.wave % 5 === 0) {
                const keys = Object.keys(this.WAVE_EVENTS);
                const base = this.WAVE_EVENTS[keys[Math.floor(Math.random() * keys.length)]];
                const scale = 1 + (this.wave - 50) * 0.05;
                event = { ...base, enemyMult: (base.enemyMult || 1) * scale };
            }

            if (comp) {
                for (const [type, count] of comp.enemies) {
                    for (let i = 0; i < count; i++) {
                        this._spawnQueue.push(type);
                    }
                }
                this.spawnInterval = comp.interval;
                this._burstSize = 1;
                this._eventSpeedMult = 1.0;
                this._eventDesperateChance = 0;
            } else {
                this._spawnQueue = this._generateProceduralWave(this.wave, event);

                // Base spawn interval — accelerates with wave number
                let interval = Math.max(0.25, 1.5 - (this.wave - 8) * 0.06);
                if (event && event.spawnMult) interval *= event.spawnMult;
                this.spawnInterval = Math.max(0.1, interval);

                // Burst spawning — multiple enemies per spawn tick
                this._burstSize = Math.min(8, 1 + Math.floor(this.wave / 8));
                if (event) this._burstSize = Math.min(12, this._burstSize * 2);

                // Event modifiers for enemy creation
                this._eventSpeedMult = (event && event.speedMult) || 1.0;
                this._eventDesperateChance = (event && event.desperateChance) || 0;
            }

            // Shuffle queue for variety within each wave
            for (let i = this._spawnQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this._spawnQueue[i], this._spawnQueue[j]] = [this._spawnQueue[j], this._spawnQueue[i]];
            }

            this.enemiesPerWave = this._spawnQueue.length;
            this.spawnTimer = 0;

            // Announce with enemy introduction on key waves
            let msg = `WAVE ${this.wave}`;
            if (event) {
                msg += ` — ${event.announcement}`;
            } else if (this.wave === 3) msg += ` — THEY'RE DANCING!`;
            else if (this.wave === 5) msg += ' — SOMETHING BIG IS COMING...';
            else if (this.wave === 7) msg += ` — SOMEONE'S LOSING IT!`;
            else if (this.wave === 9) msg += ' — POWER WALKERS!';
            else if (this.wave === 10) msg += ` — THEY'RE ALL GOING TOGETHER`;
            this.announceWave(msg);
            this.updateHUD();
        },

        _generateProceduralWave(wave, event) {
            const queue = [];

            // Quadratic enemy count — accelerating growth
            let total = 10 + Math.floor(wave * 2.5 + Math.pow(wave, 1.5) * 0.3);
            if (event && event.enemyMult) total = Math.floor(total * event.enemyMult);

            // Enemy type weights — event-specific or escalating defaults
            const defaultWeights = [
                ['girls_group', 0.06],
                ['panicker', Math.min(0.14, 0.08 + wave * 0.002)],
                ['waddle', Math.min(0.18, 0.12 + wave * 0.002)],
                ['powerwalker', Math.min(0.18, 0.14 + wave * 0.001)],
                ['dancer', 0.25],
                // remainder = polite (fallback)
            ];

            for (let i = 0; i < total; i++) {
                const roll = Math.random();
                let type = 'polite';

                if (event && event.weights) {
                    let cumulative = 0;
                    for (const [etype, weight] of Object.entries(event.weights)) {
                        cumulative += weight;
                        if (roll < cumulative) { type = etype; break; }
                    }
                } else {
                    let cumulative = 0;
                    for (const [etype, weight] of defaultWeights) {
                        cumulative += weight;
                        if (roll < cumulative) { type = etype; break; }
                    }
                }

                queue.push(type);
            }
            return queue;
        },

        _spawnEnemy() {
            if (this._spawnQueue.length === 0) return;

            const enemyType = this._spawnQueue.shift();

            // The Girls — spawn as a tight cluster picking a lane
            if (enemyType === 'girls_group') {
                const def = this.ENEMY_TYPES.girls;
                if (!def) return;
                const laneOptions = [-4, 0, 4];
                const targetLane = laneOptions[Math.floor(Math.random() * 3)];
                const groupSize = 5 + Math.floor(Math.random() * 3); // 5-7
                for (let g = 0; g < groupSize; g++) {
                    this._createEnemy('girls', def, {
                        xOverride: targetLane + (Math.random() - 0.5) * 1.5,
                        zOffset: Math.random() * 2,
                        targetLane: targetLane,
                    });
                }
                this.enemiesSpawned++;
                return;
            }

            const def = this.ENEMY_TYPES[enemyType];
            if (!def) return;
            this._createEnemy(enemyType, def, {});
            this.enemiesSpawned++;
        },

        _createEnemy(enemyType, def, opts) {
            const spread = CONFIG.spawnWidth;
            const x = opts.xOverride !== undefined ? opts.xOverride : (Math.random() - 0.5) * spread;
            const z = CONFIG.spawnZoneZ + (opts.zOffset || 0) + Math.random() * 2;

            // Polynomial HP scaling — linear base with exponential multiplier (hockey stick)
            const linearHP = def.baseHP + this.wave * def.hpPerWave;
            let hp = Math.round(linearHP * Math.pow(1.04, this.wave));

            // Speed creep — enemies get faster each wave + event modifier
            const speedCreep = 1 + this.wave * 0.015;
            const eventSpeedMult = this._eventSpeedMult || 1.0;
            let speed = (def.baseSpeed + Math.random() * def.speedVar) * speedCreep * eventSpeedMult;

            // Desperate modifier — frantic, faster, less durable
            const desperateChance = Math.max(
                this._eventDesperateChance || 0,
                this.wave >= 12 ? Math.min(0.4, (this.wave - 12) * 0.025) : 0
            );
            const isDesperate = Math.random() < desperateChance;
            if (isDesperate) {
                speed *= 1.5;
                hp = Math.round(hp * 0.75);
            }

            const size = def.size;
            let color = def.color;
            if (isDesperate) {
                // Tint toward red — visible urgency
                const r = Math.min(255, ((color >> 16) & 0xff) + 80);
                const g = Math.max(0, ((color >> 8) & 0xff) - 40);
                const b = Math.max(0, (color & 0xff) - 40);
                color = (r << 16) | (g << 8) | b;
            }

            let group, skinnedMesh, skeleton, boneMap, outlineMesh, materials;
            let pooledAnimController = null;
            // Legacy fields for non-skeletal fallback
            let body = null, leftLeg = null, rightLeg = null;
            let leftArm = null, rightArm = null, stomachHand = null;

            if (this.USE_SKELETAL && window.createEnemyModel) {
                // === SKELETAL PATH (Phase 5 + 6A pooling) ===
                let model;
                if (this.enemyPool) {
                    model = this.enemyPool.acquire(enemyType, color, isDesperate, size);
                    pooledAnimController = model.animController;
                } else {
                    model = createEnemyModel(enemyType, color, isDesperate, size);
                }
                group = model.group;
                skinnedMesh = model.skinnedMesh;
                skeleton = model.skeleton;
                boneMap = model.boneMap;
                outlineMesh = model.outlineMesh;
                materials = model.materials;
            } else {
                // === LEGACY PATH (primitive geometry) ===
                group = new THREE.Group();

                let bodyW = size * 0.8, bodyH = size * 1.4, bodyD = size * 0.5;
                if (enemyType === 'waddle') { bodyW = size * 1.1; bodyD = size * 0.7; }
                if (enemyType === 'panicker') { bodyW = size * 0.6; }

                body = new THREE.Mesh(
                    new THREE.BoxGeometry(bodyW, bodyH, bodyD),
                    new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 })
                );
                body.position.y = size * 1.2;
                body.castShadow = true;
                group.add(body);

                const head = new THREE.Mesh(
                    new THREE.SphereGeometry(size * 0.35, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.5 })
                );
                head.position.y = size * 2.1;
                head.castShadow = true;
                group.add(head);

                const legMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                let legSpacing = size * 0.15;
                if (enemyType === 'waddle') legSpacing = size * 0.35;
                if (enemyType === 'dancer') legSpacing = size * 0.08;

                leftLeg = new THREE.Mesh(new THREE.BoxGeometry(size * 0.25, size * 0.8, size * 0.25), legMat);
                leftLeg.position.set(-legSpacing, size * 0.4, 0);
                group.add(leftLeg);
                rightLeg = new THREE.Mesh(new THREE.BoxGeometry(size * 0.25, size * 0.8, size * 0.25), legMat);
                rightLeg.position.set(legSpacing, size * 0.4, 0);
                group.add(rightLeg);

                if (enemyType === 'dancer') { body.rotation.x = -0.15; }
                if (enemyType === 'waddle') {
                    body.rotation.x = -0.2;
                    stomachHand = new THREE.Mesh(
                        new THREE.BoxGeometry(size * 0.3, size * 0.2, size * 0.15),
                        new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.5 })
                    );
                    stomachHand.position.set(0, size * 1.0, bodyD * 0.5 + size * 0.05);
                    group.add(stomachHand);
                }
                if (enemyType === 'panicker') {
                    const armMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
                    leftArm = new THREE.Mesh(new THREE.BoxGeometry(size * 0.15, size * 0.6, size * 0.15), armMat);
                    leftArm.position.set(-size * 0.45, size * 2.4, 0);
                    group.add(leftArm);
                    rightArm = new THREE.Mesh(new THREE.BoxGeometry(size * 0.15, size * 0.6, size * 0.15), armMat);
                    rightArm.position.set(size * 0.45, size * 2.4, 0);
                    group.add(rightArm);
                }
                if (enemyType === 'powerwalker') {
                    const armMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
                    leftArm = new THREE.Mesh(new THREE.BoxGeometry(size * 0.15, size * 0.5, size * 0.15), armMat);
                    leftArm.position.set(-size * 0.55, size * 1.4, 0);
                    group.add(leftArm);
                    rightArm = new THREE.Mesh(new THREE.BoxGeometry(size * 0.15, size * 0.5, size * 0.15), armMat);
                    rightArm.position.set(size * 0.55, size * 1.4, 0);
                    group.add(rightArm);
                }
                if (isDesperate) { body.rotation.x -= 0.2; }
            }

            group.position.set(x, 0, z);
            this.scene.add(group);

            const enemy = {
                type: enemyType,
                mesh: group,
                // Skeletal fields (null if legacy)
                skinnedMesh: skinnedMesh || null,
                skeleton: skeleton || null,
                boneMap: boneMap || null,
                outlineMesh: outlineMesh || null,
                materials: materials || null,
                animController: null,
                // Legacy fields (null if skeletal)
                body: body,
                leftLeg: leftLeg,
                rightLeg: rightLeg,
                leftArm: leftArm,
                rightArm: rightArm,
                stomachHand: stomachHand,
                // Common fields
                x: x,
                z: z,
                speed: speed,
                hp: hp,
                maxHp: hp,
                size: size,
                coins: def.coins,
                doorDmg: def.doorDmg,
                slowed: 0,
                walkPhase: Math.random() * Math.PI * 2,
                hitFlash: 0,
                bodyColor: color,
                slowImmune: def.slowImmune || false,
                panicked: false,
                desperate: isDesperate,
                ...(opts.targetLane !== undefined && { targetLane: opts.targetLane }),
            };

            // Set up AnimationController for skeletal enemies (6A: reuse from pool)
            if (this.USE_SKELETAL && skinnedMesh) {
                const ac = pooledAnimController || new AnimationController(skinnedMesh, enemyType);
                enemy.animController = ac;

                // Initial animation state per type
                const initialStates = {
                    polite: 'walk',
                    dancer: 'hop_walk',
                    waddle: 'waddle',
                    panicker: 'panic_run',
                    powerwalker: 'power_walk',
                    girls: 'walk_chat',
                };
                ac.setState(initialStates[enemyType] || 'walk');

                // Girls: random phase offset for visual variety in clusters
                if (enemyType === 'girls') {
                    ac.mixer.time = Math.random() * 2.0;
                }

                // 6B: set initial animation speed for desperate enemies
                if (isDesperate) {
                    ac.setTimeScale(1.5);
                }
            }

            this.enemies.push(enemy);
        },

        // ============================
        // UPDATE LOOP
        // ============================
        update(dt) {
            if (this.state !== 'playing') return;

            this.time += dt;

            // --- Wave management ---
            if (!this.waveActive) {
                this.waveTimer -= dt;
                if (this.waveTimer <= 0) {
                    this._startWave();
                }
            } else {
                // Spawn enemies — burst spawning at higher waves
                this.spawnTimer -= dt;
                if (this.spawnTimer <= 0 && this.enemiesSpawned < this.enemiesPerWave) {
                    const burst = Math.min(this._burstSize || 1, this.enemiesPerWave - this.enemiesSpawned);
                    for (let b = 0; b < burst; b++) {
                        this._spawnEnemy();
                    }
                    this.spawnTimer = this.spawnInterval;
                }

                // Wave complete — all spawned + cleared (or overlap threshold met)
                const overlapThreshold = this.wave >= 20 ? 10 : (this.wave >= 15 ? 5 : 0);
                if (this.enemiesSpawned >= this.enemiesPerWave && this.enemies.length <= overlapThreshold) {
                    this.waveActive = false;
                    const nextComp = this.WAVE_COMPOSITIONS[this.wave + 1];
                    // Inter-wave delay shrinks at higher waves
                    let delay = nextComp ? nextComp.delay : Math.max(1.5, 4 - this.wave * 0.12);
                    if (this.wave >= 20) delay = Math.min(delay, 2.0);
                    if (this.wave >= 30) delay = Math.min(delay, 1.5);
                    this.waveTimer = delay;
                    // Bonus coins — caps at wave 10 to pressure late-game economy
                    const waveBonus = 15 + Math.min(this.wave, 10) * 5;
                    this.coins += waveBonus;
                    this.updateHUD();
                    this.announceWave(`WAVE ${this.wave} CLEARED  +${waveBonus}`);
                    this._spawnCoinText(0, 30, waveBonus);
                }
            }

            // --- Update enemies ---
            for (let i = this.enemies.length - 1; i >= 0; i--) {
                const e = this.enemies[i];

                // Check slow from Wet Floor Signs (speed walkers are immune)
                let slowMult = 1.0;
                if (e.slowed > 0) {
                    e.slowed -= dt;
                } else if (!e.slowImmune) {
                    // Check proximity to slow towers
                    for (const t of this.towers) {
                        if (t.type !== 'wetfloor') continue;
                        const dx = e.x - t.gridX;
                        const dz = e.z - t.gridZ;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < t.def.range) {
                            slowMult = t.def.slowFactor;
                            break;
                        }
                    }
                }

                // Panicker speed aura — panic is contagious, nearby enemies 50% faster
                let auraMult = 1.0;
                if (e.type !== 'panicker') {
                    for (const other of this.enemies) {
                        if (other.type !== 'panicker' || other.bashing) continue;
                        const adx = e.x - other.x;
                        const adz = e.z - other.z;
                        if (adx * adx + adz * adz < 64) { // range 8
                            auraMult = 1.5;
                            break;
                        }
                    }
                }

                // Move toward toilet (skip if bashing the door)
                if (!e.bashing) {
                    // Waddle Tank panic — speeds up when badly hurt (5F)
                    if (e.type === 'waddle' && !e.panicked && e.hp < e.maxHp * 0.5) {
                        e.panicked = true;
                        e.speed *= 2.0;
                        if (e.animController) {
                            e.animController.setState('panic_sprint');
                        } else {
                            // Legacy visual shift
                            if (e.body) { e.body.rotation.x = 0.15; e.body.rotation.z = 0; }
                            if (e.stomachHand) e.stomachHand.visible = false;
                        }
                    }

                    const moveSpeed = e.speed * slowMult * auraMult * dt;
                    e.z -= moveSpeed;

                    // Steering — girls follow their chosen lane, others converge to toilet
                    if (e.type === 'girls' && e.targetLane !== undefined) {
                        const dxToLane = e.targetLane - e.x;
                        e.x += dxToLane * dt * 2.0;
                    } else {
                        const distZ = Math.abs(e.z - CONFIG.toiletPos.z);
                        const convergeDist = 40;
                        if (distZ < convergeDist && Math.abs(e.x) > 0.3) {
                            const convergeStrength = 1 - (distZ / convergeDist);
                            const dxToToilet = CONFIG.toiletPos.x - e.x;
                            e.x += dxToToilet * convergeStrength * dt * 0.8;
                        }
                    }

                    // Panicker zig-zag — slight lateral wobble
                    if (e.type === 'panicker') {
                        e.x += Math.sin(e.walkPhase * 0.5) * dt * 0.5;
                    }

                    e.mesh.position.z = e.z;
                    e.mesh.position.x = e.x;

                    // Trample towers — enemies kick/shove past any tower in their path
                    // Each enemy tracks which towers it already hit to avoid multi-damage
                    if (!e.trampledTowers) e.trampledTowers = new Set();
                    const trampleRadius = 0.8 + e.size * 0.3; // bigger enemies = wider trample
                    for (let ti = this.towers.length - 1; ti >= 0; ti--) {
                        const t = this.towers[ti];
                        if (t.dying) continue;
                        // Unique key per tower placement
                        const tKey = t.gridX + ',' + t.gridZ;
                        if (e.trampledTowers.has(tKey)) continue; // already kicked this one
                        const dx = e.x - t.gridX;
                        const dz = e.z - t.gridZ;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < trampleRadius) {
                            e.trampledTowers.add(tKey);
                            t.hp -= 1;
                            t.hitShake = 0.2;
                            if (t.hp <= 0) {
                                this._destroyTower(ti);
                            }
                        }
                    }

                    // Walk animation (5D + 6B speed sync + 6C secondary motion + 6D effects)
                    if (e.animController) {
                        // 6B: sync animation speed with movement modifiers
                        // 6C: skip speed sync during hitstop freeze
                        if (!e._hitstopTimer || e._hitstopTimer <= 0) {
                            let animSpeed = slowMult * auraMult;
                            if (e.desperate) animSpeed *= 1.5;
                            if (e.lastStraw) animSpeed *= 2.0;
                            e.animController.setTimeScale(animSpeed);
                        }

                        // 6D: Panicker pulsing aura glow
                        if (e.type === 'panicker' && e.skinnedMesh) {
                            const glow = 0.3 + Math.sin(this.time * 4) * 0.3;
                            const mats = e.skinnedMesh.material;
                            if (Array.isArray(mats)) {
                                for (const m of mats) {
                                    if (m.uniforms && m.uniforms.uAuraGlow) m.uniforms.uAuraGlow.value = glow;
                                }
                            }
                        }

                        // 6D: Desperate tint pulsing (subtle throb / frantic flash for lastStraw)
                        if (e.skinnedMesh && (e.desperate || e.lastStraw)) {
                            let pulse;
                            if (e.lastStraw) {
                                // Frantic rapid red flash for last straw enemies
                                pulse = 0.6 + Math.sin(this.time * 12) * 0.4;
                            } else {
                                // Subtle throb for regular desperate
                                pulse = 0.7 + Math.sin(this.time * 6) * 0.3;
                            }
                            const mats = e.skinnedMesh.material;
                            if (Array.isArray(mats)) {
                                for (const m of mats) {
                                    if (m.uniforms && m.uniforms.uDesperateTint) m.uniforms.uDesperateTint.value = pulse;
                                }
                            }
                        }

                        // 6E: LOD — hide outline beyond 40 units
                        const camDist = e.mesh.position.distanceTo(this.camera.position);
                        if (e.outlineMesh) {
                            e.outlineMesh.visible = camDist < 40;
                        }

                        // Skeletal: let AnimationController handle all animation
                        e.animController.update(dt, camDist);
                        // Keep walkPhase for zig-zag movement logic
                        e.walkPhase += dt * e.speed * (e.desperate ? 3 : 2);
                    } else {
                        // Legacy procedural animation
                        e.walkPhase += dt * e.speed * (e.desperate ? 3 : 2);

                        if (e.type === 'dancer') {
                            e.mesh.position.y = Math.abs(Math.sin(e.walkPhase * 1.5)) * 0.4;
                            e.body.rotation.z = Math.sin(e.walkPhase) * 0.15;
                            if (e.leftLeg) e.leftLeg.rotation.x = Math.sin(e.walkPhase * 2) * 0.15;
                            if (e.rightLeg) e.rightLeg.rotation.x = -Math.sin(e.walkPhase * 2) * 0.15;
                            e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase * 1.5)) * 0.15;
                        } else if (e.type === 'waddle' && !e.panicked) {
                            e.body.rotation.z = Math.sin(e.walkPhase) * 0.12;
                            const wLeg = Math.sin(e.walkPhase) * 0.15;
                            if (e.leftLeg) e.leftLeg.rotation.x = wLeg;
                            if (e.rightLeg) e.rightLeg.rotation.x = -wLeg;
                            e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase)) * 0.03;
                        } else if (e.type === 'waddle' && e.panicked) {
                            const wLeg = Math.sin(e.walkPhase) * 0.5;
                            if (e.leftLeg) e.leftLeg.rotation.x = wLeg;
                            if (e.rightLeg) e.rightLeg.rotation.x = -wLeg;
                            e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase)) * 0.08;
                            e.body.rotation.z = 0;
                        } else if (e.type === 'panicker') {
                            const pLeg = Math.sin(e.walkPhase) * 0.4;
                            if (e.leftLeg) e.leftLeg.rotation.x = pLeg;
                            if (e.rightLeg) e.rightLeg.rotation.x = -pLeg;
                            if (e.leftArm) e.leftArm.rotation.z = Math.sin(e.walkPhase * 1.3 + 1) * 0.6;
                            if (e.rightArm) e.rightArm.rotation.z = -Math.sin(e.walkPhase * 1.3) * 0.6;
                            e.body.rotation.z = Math.sin(e.walkPhase * 0.7) * 0.1;
                            e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase)) * 0.06;
                        } else if (e.type === 'powerwalker') {
                            const pwLeg = Math.sin(e.walkPhase) * 0.35;
                            if (e.leftLeg) e.leftLeg.rotation.x = pwLeg;
                            if (e.rightLeg) e.rightLeg.rotation.x = -pwLeg;
                            if (e.leftArm) e.leftArm.rotation.x = -pwLeg;
                            if (e.rightArm) e.rightArm.rotation.x = pwLeg;
                            e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase)) * 0.02;
                        } else {
                            const legSwing = Math.sin(e.walkPhase) * 0.3;
                            if (e.leftLeg) e.leftLeg.rotation.x = legSwing;
                            if (e.rightLeg) e.rightLeg.rotation.x = -legSwing;
                            e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase)) * 0.05;
                        }
                    }
                }

                // 6C: hitstop timer — resume animation after brief freeze
                if (e._hitstopTimer > 0) {
                    e._hitstopTimer -= dt;
                    if (e._hitstopTimer <= 0) {
                        e._hitstopTimer = 0;
                        // TimeScale will be corrected by 6B speed sync on next walk frame
                    }
                }

                // Hit flash effect (5E)
                if (e.hitFlash > 0) {
                    e.hitFlash -= dt;
                    if (e.skinnedMesh) {
                        // Skeletal: update uHitFlash uniform on all materials
                        const flashVal = Math.max(0, e.hitFlash / 0.15);
                        const mats = e.skinnedMesh.material;
                        if (Array.isArray(mats)) {
                            for (const m of mats) {
                                if (m.uniforms && m.uniforms.uHitFlash) m.uniforms.uHitFlash.value = flashVal;
                            }
                        } else if (mats.uniforms && mats.uniforms.uHitFlash) {
                            mats.uniforms.uHitFlash.value = flashVal;
                        }
                    } else if (e.body) {
                        e.body.material.emissive.setHex(0xffffff);
                        e.body.material.emissiveIntensity = Math.max(0, e.hitFlash / 0.15);
                    }
                } else {
                    if (e.skinnedMesh) {
                        const mats = e.skinnedMesh.material;
                        if (Array.isArray(mats)) {
                            for (const m of mats) {
                                if (m.uniforms && m.uniforms.uHitFlash) m.uniforms.uHitFlash.value = 0;
                            }
                        } else if (mats.uniforms && mats.uniforms.uHitFlash) {
                            mats.uniforms.uHitFlash.value = 0;
                        }
                    } else if (e.body) {
                        e.body.material.emissive.setHex(0x000000);
                        e.body.material.emissiveIntensity = 0;
                    }
                }

                // Reached the door? Start bashing it
                const doorZ = 9; // door position (flush with walls)
                const bashRange = doorZ + 1.5;
                if (e.z <= bashRange && this.doorGroup && this.doorGroup.userData.doorHP > 0) {
                    // Stop at the door
                    e.z = Math.max(e.z, bashRange);
                    e.mesh.position.z = e.z;

                    // Initialize bashing state (5G)
                    if (!e.bashing) {
                        e.bashing = true;
                        e.bashTimer = 0.3 + Math.random() * 0.3; // first hit comes fast
                        e.bashCooldown = e.type === 'boss' ? 1.5 : 1.0;
                        // Skeletal: transition to bash_door animation
                        if (e.animController) {
                            e.animController.setState('bash_door');
                        }
                    }

                    // Bash animation
                    e.bashTimer -= dt;
                    if (!e.animController) {
                        // Legacy: lunge forward and back
                        const bashPhase = e.bashTimer / e.bashCooldown;
                        if (bashPhase < 0.15 && bashPhase > 0) {
                            e.mesh.position.z = e.z - (1 - bashPhase / 0.15) * 0.8;
                        } else {
                            e.mesh.position.z = e.z;
                        }
                    } else {
                        // Skeletal: animation handles the lunge, keep mesh at door
                        const camDist = e.mesh.position.distanceTo(this.camera.position);
                        // 6D: panicker aura glow while bashing
                        if (e.type === 'panicker' && e.skinnedMesh) {
                            const glow = 0.3 + Math.sin(this.time * 4) * 0.3;
                            const mats = e.skinnedMesh.material;
                            if (Array.isArray(mats)) {
                                for (const m of mats) {
                                    if (m.uniforms && m.uniforms.uAuraGlow) m.uniforms.uAuraGlow.value = glow;
                                }
                            }
                        }
                        // 6E: outline LOD
                        if (e.outlineMesh) e.outlineMesh.visible = camDist < 40;
                        e.animController.update(dt, camDist);
                    }

                    // Time to bash!
                    if (e.bashTimer <= 0) {
                        e.bashTimer = e.bashCooldown;

                        const ud = this.doorGroup.userData;
                        const dmg = e.doorDmg || 3;
                        ud.doorHP = Math.max(0, ud.doorHP - dmg);

                        // Spawn wood chip particles at impact point
                        this._spawnDoorChips(e.x, doorZ);

                        // Screen shake (subtle)
                        this.camera.position.x += (Math.random() - 0.5) * 0.15;
                        this.camera.position.y += (Math.random() - 0.5) * 0.1;
                        setTimeout(() => {
                            this.camera.position.x = 0;
                            this.camera.position.y = 26;
                        }, 80);

                        // Update crack visibility at thresholds
                        if (ud.cracks) {
                            const pct = ud.doorHP / ud.maxDoorHP;
                            ud.cracks[0].visible = pct <= 0.80;
                            ud.cracks[1].visible = pct <= 0.60;
                            ud.cracks[2].visible = pct <= 0.40;
                            ud.cracks[3].visible = pct <= 0.20;
                            ud.cracks[4].visible = pct <= 0.10;
                        }

                        // Tint door color toward red as HP decreases
                        if (ud.door) {
                            const pct = ud.doorHP / ud.maxDoorHP;
                            const r = Math.min(1.0, 0.55 + (1 - pct) * 0.45);
                            const g = 0.41 * pct;
                            const b = 0.08 * pct;
                            ud.door.material.color.setRGB(r, g, b);
                            ud.door.material.emissive.setHex(0xff0000);
                            ud.door.material.emissiveIntensity = (1 - pct) * 0.3;
                        }

                        this.updateHUD();

                        // Door broken — cinematic shatter sequence!
                        if (ud.doorHP <= 0) {
                            this._startDoorShatter(doorZ);
                            return;
                        }
                    }

                    // Bashing enemies can still be killed — skip movement but don't skip death check
                }

                // Last straw timer — desperate final lunge expires
                if (e.lastStraw) {
                    e.lastStrawTimer -= dt;
                    if (e.lastStrawTimer <= 0) {
                        e.hp = 0;
                        e.lastStraw = false;
                    }
                }

                // Dead? (5H + 5I)
                if (e.hp <= 0) {
                    // Last straw — 20% chance of desperate final lunge near the toilet
                    if (!e.lastStrawUsed && e.z < 25 && Math.random() < 0.2) {
                        e.lastStrawUsed = true;
                        e.lastStraw = true;
                        e.hp = 1;
                        e.speed *= 3.0;
                        e.lastStrawTimer = 1.0;
                        // 5I: desperate tint via uniform or legacy color
                        if (e.skinnedMesh) {
                            const mats = e.skinnedMesh.material;
                            if (Array.isArray(mats)) {
                                for (const m of mats) {
                                    if (m.uniforms && m.uniforms.uDesperateTint) m.uniforms.uDesperateTint.value = 1.0;
                                }
                            } else if (mats.uniforms && mats.uniforms.uDesperateTint) {
                                mats.uniforms.uDesperateTint.value = 1.0;
                            }
                        } else if (e.body) {
                            e.body.material.color.setHex(0xff2200);
                        }
                        continue;
                    }

                    this.score += 10;
                    this.coins += e.coins;
                    this._totalRepelled = (this._totalRepelled || 0) + 1;
                    this._spawnCoinText(e.x, e.z, e.coins);

                    // 5H + 6A: death animation then release to pool (or dispose)
                    if (e.animController && !e.dying) {
                        e.dying = true;
                        e.animController.playOneShot('death');
                        // Delay removal by death clip duration
                        const deathDurations = { polite: 0.6, dancer: 0.5, waddle: 0.8, panicker: 0.6, powerwalker: 0.6, girls: 0.5 };
                        const delay = (deathDurations[e.type] || 0.6) * 1000;
                        const enemyRef = e;
                        setTimeout(() => {
                            if (this.enemyPool && enemyRef.skinnedMesh) {
                                // 6A: release back to pool for reuse
                                this.enemyPool.release({
                                    group: enemyRef.mesh,
                                    skinnedMesh: enemyRef.skinnedMesh,
                                    skeleton: enemyRef.skeleton,
                                    boneMap: enemyRef.boneMap,
                                    outlineMesh: enemyRef.outlineMesh,
                                    materials: enemyRef.materials,
                                    animController: enemyRef.animController,
                                    enemyType: enemyRef.type,
                                });
                            } else {
                                if (enemyRef.animController) enemyRef.animController.dispose();
                                this.scene.remove(enemyRef.mesh);
                                enemyRef.mesh.traverse(child => {
                                    if (child.isMesh) {
                                        if (child.geometry) child.geometry.dispose();
                                        if (child.material) {
                                            if (Array.isArray(child.material)) {
                                                child.material.forEach(m => m.dispose());
                                            } else {
                                                child.material.dispose();
                                            }
                                        }
                                    }
                                });
                            }
                        }, delay);
                        // Remove from enemies array now (no longer participates in game logic)
                        this.enemies.splice(i, 1);
                        this.updateHUD();
                        continue;
                    }

                    this.scene.remove(e.mesh);
                    this.enemies.splice(i, 1);
                    this.updateHUD();
                    continue;
                }
            }

            // --- Update towers (attack + damage feedback) ---
            for (const t of this.towers) {
                // Hit shake animation
                if (t.hitShake > 0) {
                    t.hitShake -= dt;
                    const shakeIntensity = t.hitShake / 0.2;
                    t.mesh.position.x = t.gridX + (Math.random() - 0.5) * 0.15 * shakeIntensity;
                    t.mesh.position.z = t.gridZ + (Math.random() - 0.5) * 0.15 * shakeIntensity;
                } else {
                    t.mesh.position.x = t.gridX;
                    t.mesh.position.z = t.gridZ;
                }

                // Damage tint — flash red on hit, tint toward red as HP decreases
                if (t.hitShake > 0.1) {
                    // Immediate hit flash
                    t.mesh.traverse(child => {
                        if (child.isMesh && child.material.emissive) {
                            child.material.emissive.setHex(0xff4444);
                            child.material.emissiveIntensity = 0.4;
                        }
                    });
                } else if (t.hp < t.maxHp) {
                    // Persistent damage tint
                    const dmgPct = 1 - t.hp / t.maxHp;
                    t.mesh.traverse(child => {
                        if (child.isMesh && child.material.emissive) {
                            child.material.emissive.setHex(0xff0000);
                            child.material.emissiveIntensity = dmgPct * 0.2;
                        }
                    });
                }

                // Tip Jar — passive income
                if (t.type === 'tipjar') {
                    t.incomeTimer -= dt;
                    if (t.incomeTimer <= 0) {
                        t.incomeTimer = t.def.incomeInterval;
                        this.coins += t.def.incomeAmount;
                        this.updateHUD();
                        this._spawnCoinText(t.mesh.position.x, t.mesh.position.z, t.def.incomeAmount);
                        // Pulse the top coin as feedback
                        const topCoin = t.mesh.getObjectByName('topCoin');
                        if (topCoin) topCoin.scale.set(1.5, 1.5, 1.5);
                    }
                    // Animate top coin bob + scale decay
                    const topCoin = t.mesh.getObjectByName('topCoin');
                    if (topCoin) {
                        topCoin.position.y = 0.85 + Math.sin(this.time * 3 + t.gridX) * 0.05;
                        topCoin.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                    }
                    continue;
                }

                if (t.type === 'wetfloor') continue; // passive, no attack

                t.attackTimer -= dt;
                if (t.attackTimer > 0) continue;

                // Find nearest enemy in range
                let nearest = null;
                let nearestDist = Infinity;
                for (const e of this.enemies) {
                    const dx = e.x - t.gridX;
                    const dz = e.z - t.gridZ;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < t.def.range && dist < nearestDist) {
                        nearest = e;
                        nearestDist = dist;
                    }
                }

                if (!nearest) continue;

                t.attackTimer = t.def.attackRate;

                if (t.type === 'mop') {
                    // Melee attack — direct damage + knockback
                    nearest.hp -= t.def.damage;
                    nearest.hitFlash = 0.15;
                    nearest.z += t.def.knockback;
                    nearest.mesh.position.z = nearest.z;
                    // 6C: hitstop — brief animation freeze on heavy mop hit
                    if (nearest.animController) {
                        nearest.animController.setTimeScale(0);
                        nearest._hitstopTimer = 0.05; // ~3 frames at 60fps
                    }
                    // Animate mop swing
                    t.swingAngle = 1.0;
                } else if (t.type === 'freshener') {
                    // Ranged — spawn projectile
                    this._fireProjectile(t, nearest);
                }
            }

            // --- Animate mop swing ---
            for (const t of this.towers) {
                if (t.type !== 'mop' || !t.swingAngle) continue;
                t.swingAngle *= 0.85;
                if (t.swingAngle < 0.01) t.swingAngle = 0;
                t.mesh.rotation.y = Math.sin(this.time * 20) * t.swingAngle * 0.5;
            }

            // --- Update projectiles ---
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const p = this.projectiles[i];
                p.x += p.vx * dt;
                p.z += p.vz * dt;
                p.mesh.position.set(p.x, 0.8, p.z);
                p.life -= dt;

                if (p.life <= 0) {
                    this.scene.remove(p.mesh);
                    this.projectiles.splice(i, 1);
                    continue;
                }

                // Hit detection
                for (const e of this.enemies) {
                    const dx = e.x - p.x;
                    const dz = e.z - p.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < e.size + 0.3) {
                        e.hp -= p.damage;
                        e.hitFlash = 0.15;
                        this.scene.remove(p.mesh);
                        this.projectiles.splice(i, 1);
                        break;
                    }
                }
            }

            // --- Exit door spring physics ---
            if (this.officeGroup && this.officeGroup.userData.exitDoors) {
                const doors = this.officeGroup.userData.exitDoors;
                const { springK, dampK, pushImpulse, maxAngle, minAngle, doorZ, halfWidth } = doors;

                // Check each enemy for door push (one impulse per enemy)
                for (const e of this.enemies) {
                    if (e.pushedExitDoor) continue;
                    // Enemy crossing the door threshold (within 1 unit of doorZ)
                    if (e.z < doorZ + 1 && e.z > doorZ - 2) {
                        // Check if enemy is within the doorway width
                        if (Math.abs(e.x) < halfWidth) {
                            e.pushedExitDoor = true;
                            // Push based on enemy speed — faster = harder slam
                            const force = pushImpulse * (e.speed / 3);
                            // Push the door on the enemy's side (or both if near center)
                            if (e.x <= 1) doors.leftAngVel += force;
                            if (e.x >= -1) doors.rightAngVel += force;
                        }
                    }
                }

                // Spring physics for left door
                // Positive angle = swung open inward (toward playing field)
                doors.leftAngVel += (-springK * doors.leftAngle - dampK * doors.leftAngVel) * dt;
                doors.leftAngle += doors.leftAngVel * dt;
                doors.leftAngle = Math.max(minAngle, Math.min(maxAngle, doors.leftAngle));
                // Left door: positive rotation.y swings free edge toward -z (into the room)
                doors.leftPivot.rotation.y = doors.leftAngle;

                // Spring physics for right door
                doors.rightAngVel += (-springK * doors.rightAngle - dampK * doors.rightAngVel) * dt;
                doors.rightAngle += doors.rightAngVel * dt;
                doors.rightAngle = Math.max(minAngle, Math.min(maxAngle, doors.rightAngle));
                // Right door: negative rotation.y swings free edge toward -z (into the room)
                doors.rightPivot.rotation.y = -doors.rightAngle;
            }
        },

        _fireProjectile(tower, target) {
            const dx = target.x - tower.gridX;
            const dz = target.z - tower.gridZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            const speed = 20;

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0x00ff88 })
            );
            mesh.position.set(tower.gridX, 0.8, tower.gridZ);
            this.scene.add(mesh);

            this.projectiles.push({
                mesh: mesh,
                x: tower.gridX,
                z: tower.gridZ,
                vx: (dx / dist) * speed,
                vz: (dz / dist) * speed,
                damage: tower.def.damage,
                life: 2.0,
            });
        },

        // ============================
        // GRID HOVER
        // ============================
        _updateGridHover() {
            const active = this.selectedTower && (this.state === 'playing' || this.state === 'paused');

            // Show/hide grid lines based on whether we're placing
            if (this._buildGrid) this._buildGrid.visible = !!active;

            if (!active) {
                this.gridHighlight.visible = false;
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
                this._clearGhost();
                return;
            }

            const pos = this._getGridPos();
            if (!pos) {
                this.gridHighlight.visible = false;
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
                this._clearGhost();
                return;
            }

            // Pulse animation for highlight
            const pulse = 0.85 + Math.sin(Date.now() * 0.006) * 0.15;

            this.gridHighlight.position.set(pos.x, 0.05, pos.z);
            this.gridHighlight.scale.set(pulse, pulse, pulse);
            this.gridHighlight.visible = true;

            // Color: green if can place, red if occupied or can't afford
            const def = this.TOWERS[this.selectedTower];
            const canPlace = !this._isCellOccupied(pos.x, pos.z) && this.coins >= def.cost;
            const hoverColor = canPlace ? 0x00ff00 : 0xff4444;
            this.gridHighlight.material.color.setHex(hoverColor);
            this.gridHighlight.material.opacity = canPlace ? 0.4 : 0.25;

            // Range circle (hide for towers with no range like Tip Jar)
            const range = def.range;
            if (range > 0) {
                this.rangeCircle.scale.set(range, range, range);
                this.rangeCircle.position.set(pos.x, 0.04, pos.z);
                this.rangeCircle.material.color.setHex(hoverColor);
                this.rangeCircle.visible = true;

                this.rangeEdge.scale.set(range, range, range);
                this.rangeEdge.position.set(pos.x, 0.045, pos.z);
                this.rangeEdge.material.color.setHex(hoverColor);
                this.rangeEdge.visible = true;
            } else {
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
            }

            // Ghost tower preview
            this._updateGhost(pos, canPlace);
        },

        _updateGhost(pos, canPlace) {
            const def = this.TOWERS[this.selectedTower];
            // Recreate ghost if tower type changed
            if (this._ghostType !== this.selectedTower) {
                this._clearGhost();
                const ghost = this._createTowerMesh(this.selectedTower, def);
                this.ghostPreview = ghost.mesh;
                this.ghostPreview.traverse(child => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.material.transparent = true;
                        child.material.opacity = 0.4;
                        child.material.depthWrite = false;
                    }
                });
                this.scene.add(this.ghostPreview);
                this._ghostType = this.selectedTower;
            }
            if (this.ghostPreview) {
                const bob = Math.sin(Date.now() * 0.004) * 0.1;
                this.ghostPreview.position.set(pos.x, bob, pos.z);
                this.ghostPreview.visible = true;
                // Tint ghost red/green
                this.ghostPreview.traverse(child => {
                    if (child.isMesh) {
                        child.material.opacity = canPlace ? 0.45 : 0.2;
                    }
                });
            }
        },

        _clearGhost() {
            if (this.ghostPreview) {
                this.scene.remove(this.ghostPreview);
                this.ghostPreview = null;
                this._ghostType = null;
            }
        },

        // ============================
        // FLOATING COIN TEXT
        // ============================
        _spawnCoinText(x, z, amount) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 40px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const text = `+${amount}`;
            // Black outline
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.strokeText(text, 64, 32);
            // Gold fill
            ctx.fillStyle = '#ffd700';
            ctx.fillText(text, 64, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, 3, z);
            sprite.scale.set(2.5, 1.25, 1);
            this.scene.add(sprite);

            this._floatingTexts.push({ sprite, life: 1.2 });
        },

        // ============================
        // DOOR BASH PARTICLES
        // ============================
        _spawnDoorChips(x, z) {
            const chipCount = 8 + Math.floor(Math.random() * 6);
            const chipColors = [0x8B6914, 0x7A5C10, 0x9B7924, 0xA08030, 0x6B4E0C, 0xB8942A];

            for (let i = 0; i < chipCount; i++) {
                const size = 0.08 + Math.random() * 0.15;
                const geo = Math.random() > 0.5
                    ? new THREE.BoxGeometry(size, size * 0.5, size * 0.3)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                const mat = new THREE.MeshStandardMaterial({
                    color: chipColors[Math.floor(Math.random() * chipColors.length)],
                    roughness: 0.7,
                    metalness: 0.05,
                });
                const chip = new THREE.Mesh(geo, mat);
                chip.position.set(
                    x + (Math.random() - 0.5) * 2,
                    1.5 + Math.random() * 3,
                    z
                );
                chip.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                chip.castShadow = true;
                this.scene.add(chip);

                this._doorParticles.push({
                    mesh: chip,
                    vx: (Math.random() - 0.5) * 6,
                    vy: 3 + Math.random() * 5,
                    vz: -(2 + Math.random() * 4), // fly toward camera
                    rotSpeed: (Math.random() - 0.5) * 12,
                    life: 0.8 + Math.random() * 0.6,
                    maxLife: 0.8 + Math.random() * 0.6,
                    gravity: 12 + Math.random() * 4,
                });
            }
        },

        // ============================
        // DOOR SHATTER CINEMATIC
        // ============================
        _startDoorShatter(doorZ) {
            this.state = 'cinematic';
            this._cinematicTimer = 0;

            // Hide the intact door panel and cracks
            const ud = this.doorGroup.userData;
            if (ud.door) ud.door.visible = false;
            if (ud.cracks) ud.cracks.forEach(c => c.visible = false);

            // === MASSIVE DOOR EXPLOSION — 50 shards blasting forward ===
            const shardCount = 50;
            const woodColors = [0x8B6914, 0x7A5C10, 0x9B7924, 0xA08030, 0x6B4E0C, 0xB8942A];

            for (let i = 0; i < shardCount; i++) {
                const size = 0.15 + Math.random() * 0.5;
                const isPlank = Math.random() > 0.35;
                const geo = isPlank
                    ? new THREE.BoxGeometry(size * 2, size * 0.5, size * 0.15)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                // Last 5 shards are chrome handle bits
                const isChrome = i >= shardCount - 5;
                const mat = new THREE.MeshStandardMaterial({
                    color: isChrome ? 0xcccccc : woodColors[Math.floor(Math.random() * woodColors.length)],
                    roughness: isChrome ? 0.1 : 0.7,
                    metalness: isChrome ? 0.9 : 0.05,
                });
                const shard = new THREE.Mesh(geo, mat);
                shard.position.set(
                    (Math.random() - 0.5) * 5,
                    0.3 + Math.random() * 3.5,
                    doorZ
                );
                shard.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                shard.castShadow = true;
                this.scene.add(shard);

                this._doorParticles.push({
                    mesh: shard,
                    vx: (Math.random() - 0.5) * 10,
                    vy: 1 + Math.random() * 8,
                    vz: -(5 + Math.random() * 12),
                    rotSpeed: (Math.random() - 0.5) * 18,
                    life: 2.5 + Math.random() * 1.5,
                    maxLife: 2.5 + Math.random() * 1.5,
                    gravity: 10 + Math.random() * 6,
                });
            }

            // Mark all enemies as rushing the toilet
            for (const e of this.enemies) {
                e.bashing = false;
                e.rushing = true;
                e.rushSpeed = (e.speed || 3) * 3.5;
            }
        },

        _updateCinematic(dt) {
            this._cinematicTimer += dt;

            // Screen shake (decaying over 0.6s)
            if (this._cinematicTimer < 0.6) {
                const intensity = 0.5 * (1 - this._cinematicTimer / 0.6);
                this.camera.position.x = CONFIG.cameraPos.x + (Math.random() - 0.5) * intensity;
                this.camera.position.y = CONFIG.cameraPos.y + (Math.random() - 0.5) * intensity * 0.5;
            } else if (this._cinematicTimer < 0.65) {
                this.camera.position.x = CONFIG.cameraPos.x;
                this.camera.position.y = CONFIG.cameraPos.y;
            }

            // Move all rushing enemies toward the toilet
            const tx = CONFIG.toiletPos.x;
            const tz = CONFIG.toiletPos.z;
            for (const e of this.enemies) {
                if (!e.rushing || !e.mesh) continue;
                const dx = tx - e.x;
                const dz = tz - e.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist > 1.0) {
                    const speed = e.rushSpeed * dt;
                    e.x += (dx / dist) * speed;
                    e.z += (dz / dist) * speed;
                    e.mesh.position.x = e.x;
                    e.mesh.position.z = e.z;
                }
            }

            // Fade to black starting at 1.2s
            if (this._cinematicTimer >= 1.2) {
                const fadeEl = document.getElementById('fade-overlay');
                if (!fadeEl.classList.contains('active')) {
                    fadeEl.classList.add('active');
                }
            }

            // Game over after fade completes
            if (this._cinematicTimer >= 3.0) {
                this.gameOver();
            }
        },

        // ============================
        // RENDER LOOP
        // ============================
        _animate() {
            requestAnimationFrame(() => this._animate());

            const dt = Math.min(this.clock.getDelta(), 0.05); // Cap dt

            // Always update toilet glow
            updateToilet(this.toilet, this.clock.elapsedTime);

            // Update grid hover
            this._updateGridHover();

            // Update floating texts
            for (let i = this._floatingTexts.length - 1; i >= 0; i--) {
                const ft = this._floatingTexts[i];
                ft.life -= dt;
                ft.sprite.position.y += 2.5 * dt;
                ft.sprite.material.opacity = Math.max(0, ft.life / 0.5);
                if (ft.life <= 0) {
                    this.scene.remove(ft.sprite);
                    ft.sprite.material.map.dispose();
                    ft.sprite.material.dispose();
                    this._floatingTexts.splice(i, 1);
                }
            }

            // Update door particles (wood chips flying)
            for (let i = this._doorParticles.length - 1; i >= 0; i--) {
                const p = this._doorParticles[i];
                p.life -= dt;
                p.vy -= p.gravity * dt;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.mesh.rotation.x += p.rotSpeed * dt;
                p.mesh.rotation.z += p.rotSpeed * 0.7 * dt;
                // Fade out in last 30% of life
                const fade = Math.min(1, p.life / (p.maxLife * 0.3));
                p.mesh.material.opacity = fade;
                p.mesh.material.transparent = true;
                // Scale down as dying
                const s = Math.max(0.1, fade);
                p.mesh.scale.set(s, s, s);
                if (p.life <= 0 || p.mesh.position.y < -1) {
                    this.scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    this._doorParticles.splice(i, 1);
                }
            }

            // Game logic
            this.update(dt);

            // Cinematic sequence (door shatter)
            if (this.state === 'cinematic') {
                this._updateCinematic(dt);
            }

            // Render
            this.renderer.render(this.scene, this.camera);

            // 6E: Performance profiling (debug overlay, toggle with backtick key)
            if (this._showPerfStats) {
                this._perfFrameCount = (this._perfFrameCount || 0) + 1;
                this._perfAccum = (this._perfAccum || 0) + dt;
                if (this._perfAccum >= 1.0) {
                    const fps = Math.round(this._perfFrameCount / this._perfAccum);
                    const info = this.renderer.info.render;
                    const poolStats = this.enemyPool ? this.enemyPool.getStats() : {};
                    const statsText = `FPS: ${fps} | Draw: ${info.calls} | Tris: ${info.triangles} | Enemies: ${this.enemies.length} | Pool: ${JSON.stringify(poolStats.poolSizes || {})}`;
                    if (!this._perfEl) {
                        this._perfEl = document.createElement('div');
                        this._perfEl.style.cssText = 'position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;background:rgba(0,0,0,0.7);padding:4px 8px;z-index:9999;pointer-events:none;';
                        document.body.appendChild(this._perfEl);
                    }
                    this._perfEl.textContent = statsText;
                    this._perfFrameCount = 0;
                    this._perfAccum = 0;
                }
            }
        },
    };
    </script>

    <script type="module" src="js/main.js"></script>
