<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLD IT IN</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>

    <!-- HUD — multi-layer hand-drawn SVG blobs with independent jitter -->
    <div id="hud">
        <div id="hud-left">
            <!-- Door HP Badge -->
            <div class="hud-badge" id="door-hp-stat">
                <!-- Layer 1: Dark ink outline blob -->
                <svg class="badge-layer-outline" viewBox="0 0 160 80" preserveAspectRatio="none">
                    <path d="M 10 5 Q 80 -2 150 5 Q 160 8 158 20 L 156 60 Q 154 74 140 72 Q 80 78 20 72 Q 4 70 3 58 L 2 18 Q 1 6 10 5 Z"
                          fill="#1a1a1a"/>
                </svg>
                <!-- Layer 2: White fill blob (jitters separately) -->
                <svg class="badge-layer-fill" viewBox="0 0 160 80" preserveAspectRatio="none">
                    <path class="badge-fill"
                          d="M 16 11 Q 80 4 144 11 Q 152 14 151 24 L 149 56 Q 148 66 136 65 Q 80 70 24 65 Q 12 63 11 54 L 9 22 Q 8 13 16 11 Z"
                          fill="#fff"/>
                </svg>
                <!-- Layer 3: Content -->
                <span class="hud-delta" id="door-delta"></span>
                <div class="badge-content">
                    <div class="hp-label-row">
                        <svg class="hud-icon" viewBox="0 0 36 40" width="36" height="40">
                            <rect x="4" y="2" width="28" height="36" rx="3.5" fill="#c8a87c" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
                            <rect x="8" y="6" width="8.5" height="12" rx="2" fill="#8b6e4e" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
                            <rect x="19.5" y="6" width="8.5" height="12" rx="2" fill="#8b6e4e" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
                            <rect x="8" y="22" width="20" height="12" rx="2" fill="#8b6e4e" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
                            <circle cx="27" cy="21" r="3" fill="#ffd93d" stroke="#1a1a1a" stroke-width="2.5"/>
                            <circle cx="26.2" cy="20.2" r="1" fill="rgba(255,255,255,0.45)"/>
                        </svg>
                        <span class="value" id="door-hp-display">100%</span>
                    </div>
                    <!-- HP Bar: dual-layer SVG blob -->
                    <div class="hp-bar-wrap">
                        <svg class="hp-bar-layer-outline" viewBox="0 0 200 28" preserveAspectRatio="none">
                            <path d="M 6 7 Q 10 1 40 3 L 165 1 Q 195 1 198 8 L 199 20 Q 196 27 168 25 L 35 27 Q 6 27 3 21 Z"
                                  fill="#1a1a1a"/>
                        </svg>
                        <svg class="hp-bar-layer-fill" viewBox="0 0 200 28" preserveAspectRatio="none">
                            <defs>
                                <clipPath id="hp-clip">
                                    <rect id="hp-clip-rect" x="0" y="0" width="200" height="28"/>
                                </clipPath>
                            </defs>
                            <path id="hp-fill-path"
                                  d="M 14 10 Q 18 4 45 6 L 160 4 Q 186 4 189 9 L 190 18 Q 187 24 162 22 L 40 24 Q 14 24 11 19 Z"
                                  fill="#ff6b7a" clip-path="url(#hp-clip)"/>
                        </svg>
                    </div>
                </div>
            </div>
            <!-- Coins Badge -->
            <div class="hud-badge coins-badge">
                <svg class="badge-layer-outline" viewBox="0 0 120 56" preserveAspectRatio="none">
                    <path d="M 8 5 Q 60 -1 112 5 Q 120 8 119 16 L 118 40 Q 116 52 104 50 Q 60 55 16 50 Q 4 48 3 40 L 2 14 Q 1 6 8 5 Z"
                          fill="#1a1a1a"/>
                </svg>
                <svg class="badge-layer-fill" viewBox="0 0 120 56" preserveAspectRatio="none">
                    <path class="badge-fill"
                          d="M 14 10 Q 60 4 106 10 Q 113 13 112 20 L 111 38 Q 110 46 100 45 Q 60 49 22 45 Q 12 43 11 36 L 9 18 Q 8 11 14 10 Z"
                          fill="#fff"/>
                </svg>
                <span class="hud-delta" id="coin-delta"></span>
                <div class="badge-content">
                    <svg class="hud-icon" viewBox="0 0 32 32" width="34" height="34">
                        <circle cx="16" cy="16" r="13" fill="#ffd93d" stroke="#1a1a1a" stroke-width="3.5"/>
                        <circle cx="16" cy="16" r="8.5" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.4"/>
                        <text x="16" y="22" text-anchor="middle" font-family="Bangers, sans-serif" font-size="19" fill="#1a1a1a" font-weight="400">$</text>
                        <path d="M9 10 Q12 5 16 8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <span class="value" id="coins-display">50</span>
                </div>
            </div>
        </div>
        <div id="hud-center"></div>
        <div id="hud-right">
            <!-- Score Badge -->
            <div class="hud-badge score-badge">
                <svg class="badge-layer-outline" viewBox="0 0 120 48" preserveAspectRatio="none">
                    <path d="M 8 4 Q 60 -1 112 4 Q 120 7 119 14 L 118 34 Q 116 44 104 42 Q 60 47 16 42 Q 4 40 3 34 L 2 12 Q 1 5 8 4 Z"
                          fill="#1a1a1a"/>
                </svg>
                <svg class="badge-layer-fill" viewBox="0 0 120 48" preserveAspectRatio="none">
                    <path class="badge-fill"
                          d="M 14 9 Q 60 3 106 9 Q 113 12 112 18 L 111 32 Q 110 39 100 38 Q 60 42 22 38 Q 12 36 11 30 L 9 16 Q 8 10 14 9 Z"
                          fill="#fff"/>
                </svg>
                <div class="badge-content">
                    <span class="value" id="score-display">0</span>
                    <span class="icon">PTS</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Wave badge (positioned above door in 3D) -->
    <span id="wave-display">WAVE 1</span>

    <!-- Wave Announcement -->
    <div id="wave-announce"></div>

    <!-- Pause Overlay -->
    <div id="pause-overlay">
        <div id="pause-text">PAUSED</div>
    </div>

    <!-- Tower Build Panel -->
    <div id="tower-panel">
        <div class="tower-btn" data-tower="coinmagnet"
             data-tip-name="Coin Magnet" data-tip-cost="10"
             data-tip-desc="Auto-collects dropped coins in range. Fragile!">
            <span class="hotkey">1</span>
            <div class="tower-icon">
                <!-- Horseshoe magnet with coin jar -->
                <svg viewBox="0 0 48 48" width="36" height="36">
                    <rect x="17" y="34" width="14" height="6" rx="2" fill="#2d2b3d" stroke="#1a1a2e" stroke-width="1.5"/>
                    <rect x="22" y="22" width="4" height="14" rx="1" fill="#a8a098" stroke="#1a1a2e" stroke-width="1"/>
                    <path d="M14 14 A10 10 0 0 1 34 14" fill="none" stroke="#ff6b7a" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="14" cy="14" r="3" fill="#a8a098" stroke="#1a1a2e" stroke-width="1"/>
                    <circle cx="34" cy="14" r="3" fill="#a8a098" stroke="#1a1a2e" stroke-width="1"/>
                    <rect x="18" y="28" width="12" height="10" rx="3" fill="#6688aa" fill-opacity="0.4" stroke="#1a1a2e" stroke-width="1"/>
                    <ellipse cx="24" cy="35" rx="5" ry="2" fill="#ffd93d" stroke="#1a1a2e" stroke-width="0.8"/>
                </svg>
            </div>
            <span class="cost">10</span>
        </div>
        <div class="tower-btn" data-tower="wetfloor"
             data-tip-name="Wet Floor Sign" data-tip-cost="15"
             data-tip-desc="Slows enemies to 40% speed. Tough plastic!">
            <span class="hotkey">2</span>
            <div class="tower-icon">
                <!-- A-frame caution sign with ! -->
                <svg viewBox="0 0 48 48" width="36" height="36">
                    <polygon points="24,4 8,42 40,42" fill="#e8d44a" stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"/>
                    <rect x="22" y="14" width="4" height="16" rx="1" fill="#1a1a2e"/>
                    <circle cx="24" cy="35" r="2.5" fill="#1a1a2e"/>
                </svg>
            </div>
            <span class="cost">15</span>
        </div>
        <div class="tower-btn" data-tower="mop"
             data-tip-name="Mop Turret" data-tip-cost="25"
             data-tip-desc="Sweeping crowd control. Low damage, big knockback!">
            <span class="hotkey">3</span>
            <div class="tower-icon">
                <!-- Mop in bucket -->
                <svg viewBox="0 0 48 48" width="36" height="36">
                    <path d="M12 24 L14 42 L34 42 L36 24 Z" fill="#a8a098" stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round"/>
                    <ellipse cx="24" cy="24" rx="12" ry="3" fill="#6688aa" stroke="#1a1a2e" stroke-width="1"/>
                    <line x1="28" y1="24" x2="22" y2="4" stroke="#8b6e4e" stroke-width="3" stroke-linecap="round"/>
                    <rect x="16" y="2" width="12" height="7" rx="2" fill="#9b59b6" stroke="#1a1a2e" stroke-width="1"/>
                    <rect x="17" y="9" width="3" height="4" rx="0.5" fill="#9b59b6"/>
                    <rect x="22" y="9" width="3" height="4" rx="0.5" fill="#9b59b6"/>
                    <rect x="27" y="9" width="3" height="4" rx="0.5" fill="#9b59b6"/>
                </svg>
            </div>
            <span class="cost">25</span>
        </div>
        <div class="tower-btn" data-tower="ubik"
             data-tip-name="Ubik Spray" data-tip-cost="35"
             data-tip-desc="Long-range spray hits all enemies in cone. Area damage!">
            <span class="hotkey">4</span>
            <div class="tower-icon">
                <!-- Spray can -->
                <svg viewBox="0 0 48 48" width="36" height="36">
                    <rect x="15" y="12" width="18" height="30" rx="4" fill="#6bcb77" stroke="#1a1a2e" stroke-width="2"/>
                    <rect x="18" y="6" width="12" height="8" rx="2" fill="#faf5ef" stroke="#1a1a2e" stroke-width="1.5"/>
                    <rect x="22" y="2" width="4" height="5" rx="1" fill="#a8a098" stroke="#1a1a2e" stroke-width="1"/>
                    <rect x="18" y="20" width="12" height="12" rx="1" fill="#fff4d9" fill-opacity="0.6" stroke="#1a1a2e" stroke-width="0.8"/>
                    <text x="24" y="29" text-anchor="middle" font-size="7" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">UBIK</text>
                    <ellipse cx="24" cy="42" rx="9" ry="2" fill="#1a1a2e" fill-opacity="0.15"/>
                </svg>
            </div>
            <span class="cost">35</span>
        </div>
        <div class="tower-btn" data-tower="potplant"
             data-tip-name="Pot Plant" data-tip-cost="10"
             data-tip-desc="Cheap trip hazard. Gets kicked into enemies on contact!">
            <span class="hotkey">5</span>
            <div class="tower-icon">
                <!-- Potted plant -->
                <svg viewBox="0 0 48 48" width="36" height="36">
                    <path d="M14 28 L16 42 L32 42 L34 28 Z" fill="#c4663a" stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round"/>
                    <ellipse cx="24" cy="28" rx="10" ry="2.5" fill="#c4663a" stroke="#1a1a2e" stroke-width="1"/>
                    <rect x="22" y="14" width="4" height="14" rx="1" fill="#8b6e4e" stroke="#1a1a2e" stroke-width="0.8"/>
                    <circle cx="24" cy="12" r="6" fill="#50c878" stroke="#1a1a2e" stroke-width="1.2"/>
                    <circle cx="19" cy="14" r="4" fill="#50c878" stroke="#1a1a2e" stroke-width="1"/>
                    <circle cx="29" cy="14" r="4" fill="#50c878" stroke="#1a1a2e" stroke-width="1"/>
                </svg>
            </div>
            <span class="cost">10</span>
        </div>
    </div>

    <!-- Tower Tooltip -->
    <div id="tower-tooltip">
        <div class="tip-name"></div>
        <div class="tip-cost-line">
            <svg class="tip-coin-icon" viewBox="0 0 16 16" width="14" height="14" style="vertical-align: -2px;">
                <circle cx="8" cy="8" r="7" fill="#ffd93d" stroke="#1a1a2e" stroke-width="1.5"/>
                <text x="8" y="11.5" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">$</text>
            </svg>
            <span class="tip-cost"></span> coins
        </div>
        <div class="tip-desc"></div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>HOLD IT IN</h1>
        <div class="tagline">Your toilet. Your rules.</div>
        <button id="start-btn">DEFEND THE THRONE</button>
    </div>

    <!-- Fade Overlay (cinematic fade to black) -->
    <div id="fade-overlay"></div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <h1>OCCUPIED</h1>
        <div class="subtitle" id="game-over-subtitle">They broke through the door!</div>
        <div class="stats" id="game-over-stats"></div>
        <button id="restart-btn">TRY AGAIN</button>
    </div>

    <!-- Game Logic -->
    <script>
    const Game = {
        // === STATE ===
        scene: null,
        camera: null,
        renderer: null,
        clock: null,
        toilet: null,
        enemyPool: null,  // Phase 6A: object pool

        state: 'title',  // title | playing | paused | gameover
        wave: 0,
        coins: 50,
        score: 0,
        time: 0,
        doorGroup: null,

        // Entity arrays
        enemies: [],
        towers: [],
        projectiles: [],

        // Wave management
        waveTimer: 0,
        spawnTimer: 0,
        enemiesSpawned: 0,
        enemiesPerWave: 8,
        spawnInterval: 1.5,
        waveDelay: 5.0,
        waveActive: false,
        _spawnQueue: [],
        _floatingTexts: [],
        _doorParticles: [],
        _mopImpacts: [],
        _slidingPots: [],
        _cinematicTimer: 0,
        _cinematicEffects: [],
        _flyingPhone: null,
        _cinematicSchedule: [],

        // Hitstop & impact juice
        _globalHitstop: 0,          // Timer: when > 0, dt scales to near-zero
        _cameraShake: 0,            // Timer: when > 0, camera jitters
        _cameraShakeIntensity: 0,   // Current shake magnitude

        // Player character (seated on toilet)
        playerCharacter: null,

        // Build mode
        selectedTower: null,
        gridHighlight: null,

        // Raycasting for mouse interaction (initialized in init())
        raycaster: null,
        mouse: null,
        groundPlane: null,

        // Tower definitions
        TOWERS: {
            coinmagnet: {
                name: 'Coin Magnet',
                cost: 10,
                range: 8,
                hp: 4,              // Takes a few hits before breaking
                color: 0xf0a030,    // PALETTE.magnet
                effect: 'magnet',
                magnetInterval: 0.3,
                hotkey: 'Digit1',
            },
            wetfloor: {
                name: 'Wet Floor Sign',
                cost: 25,
                range: 0,
                hp: 20,             // Light barrier — disposable but meaningful delay
                color: 0xe8d44a,    // PALETTE.sign
                effect: 'barrier',
                tileWidth: 2,       // Spans 2 grid cells along X axis (4 world units wide)
                hotkey: 'Digit2',
            },
            mop: {
                name: 'Mop Turret',
                cost: 25,
                range: 4.5,
                hp: 6,              // Sturdy — actively fighting back
                color: 0x9b59b6,    // PALETTE.mop
                damage: 8,          // Low damage — crowd control focus
                attackRate: 1.2,    // Cooldown after sweep completes
                knockback: 7.0,     // Big knockback displacement (units)
                sweepSpeed: 9.0,    // Angular velocity (radians/sec)
                followThrough: 0.6, // ~34° past target for follow-through
                hitWidth: 0.6,      // Handle hitbox width
                hotkey: 'Digit3',
            },
            ubik: {
                name: 'Ubik',
                cost: 35,
                range: 18,             // Spray travels 18 units forward
                hp: 6,                 // Sturdy canister — shows progressive damage
                color: 0x6bcb77,    // PALETTE.ubik
                damage: 10,            // Per-tick spray damage (hits multiple enemies)
                attackRate: 1.5,       // Interval between sprays
                sprayDuration: 0.8,    // How long the spray cloud lasts
                sprayWidth: 2.0,       // Width of the spray cone at max range
                hotkey: 'Digit4',
            },
            potplant: {
                name: 'Pot Plant',
                cost: 10,
                range: 0,              // Passive — no active attack
                hp: 3,                 // Survives 3 kicks before breaking
                color: 0xc4663a,       // PALETTE.potplant — terracotta
                effect: 'trip',
                tripDamage: 6,         // Light damage on trip
                stunDuration: 1.8,     // Enemy face-plants for 1.8s
                kickSpeed: 18,         // Initial velocity when kicked (units/sec)
                hotkey: 'Digit5',
            },
        },

        // Enemy type definitions — each has unique movement, silhouette, and mechanic
        ENEMY_TYPES: {
            polite: {
                name: 'Polite Knocker',
                baseSpeed: 3.0, speedVar: 0.5,
                baseHP: 20, hpPerWave: 10,
                size: 1.5, color: 0xd4a574, // PALETTE.polite — warm tan
                coins: 5, doorDmg: 2,
                flankChance: 0.15, // polite, mostly center
            },
            dancer: {
                name: 'Pee Dancer',
                baseSpeed: 5.5, speedVar: 1.0,
                baseHP: 10, hpPerWave: 4,
                size: 1.25, color: 0x59c3e8, // PALETTE.dancer — sky blue
                coins: 3, doorDmg: 1,
                canJumpBarrier: true, // agile — leaps over barriers
                flankChance: 0.6, // fast — darts to the sides to dodge towers
            },
            waddle: {
                name: 'Waddle Tank',
                baseSpeed: 2.0, speedVar: 0.3,
                baseHP: 60, hpPerWave: 18,
                size: 2.0, color: 0x8b5e3c, // PALETTE.waddle — brown
                coins: 12, doorDmg: 4,
                panicThreshold: 0.5, // Panics at 50% HP — speed doubles
                flankChance: 0.1, // big and lumbering, goes straight
            },
            panicker: {
                name: 'Panicker',
                baseSpeed: 4.0, speedVar: 0.5,
                baseHP: 40, hpPerWave: 12,
                size: 1.6, color: 0xf5c842, // PALETTE.panicker — gold-yellow
                coins: 10, doorDmg: 2,
                speedAuraRange: 8, speedAuraBonus: 0.5, // Panic is contagious — priority target
                flankChance: 0.4, // erratic — might go anywhere
            },
            powerwalker: {
                name: 'Power Walker',
                baseSpeed: 3.5, speedVar: 0.3,
                baseHP: 30, hpPerWave: 10,
                size: 1.4, color: 0x20b89a, // PALETTE.power — jade
                coins: 7, doorDmg: 2,
                slowImmune: true, // Too much momentum — wet floor signs useless
                flankChance: 0.7, // strategic — takes wide routes around defenses
            },
            girls: {
                name: 'The Girls',
                baseSpeed: 3.0, speedVar: 0.3,
                baseHP: 8, hpPerWave: 3,
                size: 0.85, color: 0xe84888, // PALETTE.girls — hot pink
                coins: 2, doorDmg: 1,
            },
        },

        // Curated wave compositions — one new enemy per introduction wave
        WAVE_COMPOSITIONS: [
            null, // index 0 unused
            // Wave 1: Tutorial — polite knockers only
            { enemies: [['polite', 5]], interval: 2.5, delay: 5 },
            // Wave 2: More knockers, Coin Magnet now available
            { enemies: [['polite', 7]], interval: 2.0, delay: 4 },
            // Wave 3: PEE DANCERS — fast, bouncy, come in groups
            { enemies: [['polite', 4], ['dancer', 4]], interval: 1.8, delay: 4 },
            // Wave 4: Harder mix, Ubik now available
            { enemies: [['polite', 5], ['dancer', 5]], interval: 1.5, delay: 3.5 },
            // Wave 5: WADDLE TANK — big, slow, panics into sprint at 50% HP
            { enemies: [['polite', 4], ['dancer', 3], ['waddle', 2]], interval: 1.3, delay: 3 },
            // Wave 6: More waddle tanks
            { enemies: [['polite', 5], ['dancer', 5], ['waddle', 3]], interval: 1.2, delay: 3 },
            // Wave 7: PANICKER — speed aura, priority target
            { enemies: [['polite', 4], ['dancer', 4], ['waddle', 2], ['panicker', 1]], interval: 1.0, delay: 3 },
            // Wave 8: More panickers
            { enemies: [['polite', 5], ['dancer', 5], ['waddle', 3], ['panicker', 2]], interval: 0.9, delay: 3 },
            // Wave 9: POWER WALKER — immune to slow
            { enemies: [['polite', 4], ['dancer', 4], ['waddle', 2], ['panicker', 1], ['powerwalker', 3]], interval: 0.8, delay: 3 },
            // Wave 10: THE GIRLS — lane-testing swarm cluster
            { enemies: [['polite', 3], ['dancer', 3], ['waddle', 2], ['panicker', 1], ['powerwalker', 2], ['girls_group', 1]], interval: 0.8, delay: 3 },
        ],

        // Themed horde event waves — pure chaos milestones
        WAVE_EVENTS: {
            15: {
                name: 'TACO TUESDAY',
                announcement: "IT'S TACO TUESDAY!",
                enemyMult: 2.5,
                spawnMult: 0.5,
                weights: { waddle: 0.35, polite: 0.20, dancer: 0.20, panicker: 0.10, powerwalker: 0.10, girls_group: 0.05 },
            },
            20: {
                name: 'THE LUNCH RUSH',
                announcement: 'THE LUNCH RUSH!',
                enemyMult: 3.0,
                spawnMult: 0.4,
                weights: { polite: 0.35, dancer: 0.25, powerwalker: 0.20, panicker: 0.10, waddle: 0.05, girls_group: 0.05 },
            },
            25: {
                name: 'COFFEE KICKED IN',
                announcement: 'THE COFFEE JUST KICKED IN!',
                enemyMult: 2.5,
                spawnMult: 0.35,
                speedMult: 1.4,
                desperateChance: 0.6,
            },
            30: {
                name: 'FOOD POISONING',
                announcement: 'FOOD POISONING IN THE BREAK ROOM!',
                enemyMult: 3.5,
                spawnMult: 0.3,
                weights: { waddle: 0.30, panicker: 0.25, dancer: 0.20, polite: 0.15, girls_group: 0.10 },
            },
            35: {
                name: 'WING NIGHT',
                announcement: 'HALF-PRICE WING NIGHT!',
                enemyMult: 3.0,
                spawnMult: 0.3,
                speedMult: 1.3,
                weights: { waddle: 0.40, polite: 0.20, powerwalker: 0.15, dancer: 0.15, panicker: 0.10 },
            },
            40: {
                name: 'FIRE DRILL',
                announcement: 'FIRE DRILL — EVERYONE OUT!',
                enemyMult: 4.0,
                spawnMult: 0.2,
                speedMult: 1.5,
                desperateChance: 0.8,
            },
            45: {
                name: 'CHILI COOK-OFF',
                announcement: 'THE CHILI COOK-OFF!',
                enemyMult: 4.0,
                spawnMult: 0.25,
                weights: { waddle: 0.35, panicker: 0.30, powerwalker: 0.15, dancer: 0.10, girls_group: 0.10 },
            },
            50: {
                name: 'BLACK FRIDAY',
                announcement: 'BLACK FRIDAY!',
                enemyMult: 5.0,
                spawnMult: 0.15,
                speedMult: 1.6,
                desperateChance: 0.5,
            },
        },

        // Coin drop table — physical coins scattered on enemy death
        // Values are ~30% higher than old instant rewards (skill bonus for collection)
        COIN_DROPS: {
            polite:      { value: 6,  count: 2 },
            dancer:      { value: 4,  count: 1 },
            waddle:      { value: 16, count: 4 },
            panicker:    { value: 13, count: 3 },
            powerwalker: { value: 9,  count: 2 },
            girls:       { value: 3,  count: 1 },
        },

        coinPool: null,

        // ============================
        // INIT
        // ============================
        init() {
            // Wait for THREE.js to load
            if (!window.THREE) {
                setTimeout(() => Game.init(), 50);
                return;
            }

            // Init THREE-dependent objects
            this.raycaster = new THREE.Raycaster();
            this.mouse = new THREE.Vector2();
            this.groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            const container = document.getElementById('game-container');

            // Renderer
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.renderer.setClearColor(PALETTE.ink);
            container.appendChild(this.renderer.domElement);

            // Scene
            this.scene = new THREE.Scene();
            this.scene.fog = new THREE.Fog(PALETTE.ink, 60, 110);

            // Camera — steep TD angle for clear playing field visibility
            const aspect = window.innerWidth / window.innerHeight;
            this.camera = new THREE.PerspectiveCamera(CONFIG.cameraFOV, aspect, 0.1, 250);
            this.camera.position.set(CONFIG.cameraPos.x, CONFIG.cameraPos.y, CONFIG.cameraPos.z);
            this.camera.lookAt(CONFIG.cameraLookAt.x, CONFIG.cameraLookAt.y, CONFIG.cameraLookAt.z);

            // Clock
            this.clock = new THREE.Clock();

            // Post-processing (screen-space edges + vignette)
            this.postFX = setupPostProcessing(this.renderer, this.scene, this.camera);

            // Build the scene
            this._createLighting();
            this._createGround();
            this._createToilet();
            this._createEnvironment();
            this._createGrid();

            // Input
            this._setupInput();

            // UI
            this._setupUI();

            // Handle resize
            window.addEventListener('resize', () => {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                if (this.postFX) this.postFX.setSize(window.innerWidth, window.innerHeight);
            });

            // Drone delivery system
            this.activeDrones = [];
            this.windowPositions = [];
            if (this.officeGroup && this.officeGroup.userData.windowPositions) {
                this.windowPositions = this.officeGroup.userData.windowPositions;
            }

            // Phase 6A: Initialize enemy object pool
            if (window.EnemyPool) {
                this.enemyPool = new EnemyPool();
                this.enemyPool.preAllocate();
                console.log('Enemy pool pre-allocated:', this.enemyPool.getStats().poolSizes);
            }

            // Initialize coin drop pool
            if (window.CoinPool) {
                this.coinPool = new CoinPool();
                this.coinPool.preAllocate(60);
                console.log('Coin pool pre-allocated:', this.coinPool.getStats().poolSize);
            }

            // Upgrade system
            if (window.UpgradeManager) {
                this.upgradeManager = new UpgradeManager();
                this.upgradeDrones = [];     // Active upgrade drones in scene
                this._upgradePhase = false;  // True during upgrade selection between waves
                console.log('Upgrade system initialized');
            }

            // Upgrade selection UI (Stage 3-4)
            if (window.UpgradeSelectionUI) {
                this.upgradeSelectionUI = new UpgradeSelectionUI();
                console.log('Upgrade selection UI initialized');
            }

            // Start render loop (but game doesn't start until player clicks)
            this._animate();

            console.log('Hold It In — initialized');
        },

        // ============================
        // SCENE SETUP
        // ============================
        _createLighting() {
            // Ambient — slightly warm, enough to see bathroom walls
            const ambient = new THREE.AmbientLight(PALETTE.ambient, 0.7);
            this.scene.add(ambient);

            // Main directional light (slightly warm, more overhead to avoid side wash)
            const dirLight = new THREE.DirectionalLight(PALETTE.fillWarm, 0.8);
            dirLight.position.set(3, 35, 18);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -35;
            dirLight.shadow.camera.right = 35;
            dirLight.shadow.camera.top = 70;
            dirLight.shadow.camera.bottom = -5;
            this.scene.add(dirLight);

            // Subtle cool fill from opposite side
            const fillLight = new THREE.DirectionalLight(PALETTE.rimCool, 0.3);
            fillLight.position.set(-10, 20, 10);
            this.scene.add(fillLight);
        },

        _createGround() {
            // Main ground plane (dark, extends to fog)
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = toonMat(PALETTE.charcoal);
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.05;
            ground.receiveShadow = true;
            this.scene.add(ground);

            // Bathroom tiled floor (checkerboard pattern via canvas texture)
            const tileCanvas = document.createElement('canvas');
            tileCanvas.width = 512;
            tileCanvas.height = 512;
            const tCtx = tileCanvas.getContext('2d');
            const tilesPerRow = 8;
            const tilePx = tileCanvas.width / tilesPerRow;
            for (let r = 0; r < tilesPerRow; r++) {
                for (let c = 0; c < tilesPerRow; c++) {
                    tCtx.fillStyle = (r + c) % 2 === 0 ? '#9a9488' : '#8a847a';
                    tCtx.fillRect(c * tilePx, r * tilePx, tilePx, tilePx);
                    tCtx.strokeStyle = '#7a756c';
                    tCtx.lineWidth = 3;
                    tCtx.strokeRect(c * tilePx + 1.5, r * tilePx + 1.5, tilePx - 3, tilePx - 3);
                }
            }
            const tileTexture = new THREE.CanvasTexture(tileCanvas);
            tileTexture.wrapS = THREE.RepeatWrapping;
            tileTexture.wrapT = THREE.RepeatWrapping;
            tileTexture.repeat.set(3, 4);

            const tileGeo = new THREE.PlaneGeometry(CONFIG.corridorWidth, CONFIG.corridorStart + 4);
            const tileMat = new THREE.MeshToonMaterial({
                map: tileTexture,
            });
            const tile = new THREE.Mesh(tileGeo, tileMat);
            tile.rotation.x = -Math.PI / 2;
            tile.position.set(0, -0.01, CONFIG.corridorStart / 2 - 2);
            tile.receiveShadow = true;
            this.scene.add(tile);

            // Lane floor (buildable area — slightly lighter)
            const laneGeo = new THREE.PlaneGeometry(CONFIG.laneWidth, CONFIG.laneLength - CONFIG.corridorStart);
            const laneMat = toonMat(PALETTE.charcoal);
            const lane = new THREE.Mesh(laneGeo, laneMat);
            lane.rotation.x = -Math.PI / 2;
            lane.position.set(0, -0.03, CONFIG.corridorStart + (CONFIG.laneLength - CONFIG.corridorStart) / 2);
            lane.receiveShadow = true;
            this.scene.add(lane);
            this._laneFloor = lane;
        },

        _createToilet() {
            this.toilet = createToilet();
            this.toilet.position.set(CONFIG.toiletPos.x, CONFIG.toiletPos.y, CONFIG.toiletPos.z);
            // Face the door — bowl points toward +Z (enemies approach from that direction)
            this.toilet.rotation.y = 0;
            this.scene.add(this.toilet);

            // Create player character sitting on the toilet
            this._createPlayerCharacter();
        },

        _createPlayerCharacter() {
            if (window.PlayerCharacter) {
                this.playerCharacter = new PlayerCharacter();
                this.playerCharacter.create(this.scene, this.toilet.position);
                console.log('Player character created — seated on toilet');
            }
        },

        _createEnvironment() {
            // Bathroom walls (back, sides, door frame)
            this.scene.add(createBathroomWalls());

            // Single-toilet room — no stall dividers needed

            // Sinks on left wall
            this.scene.add(createSinks());

            // Mirror above sinks
            this.scene.add(createMirror());

            // Hand dryer on right wall
            this.scene.add(createHandDryer());

            // Paper towel dispenser on right wall
            this.scene.add(createPaperTowelDispenser());

            // Trash can near the door
            this.scene.add(createTrashCan());

            // Office elements visible through the doorway
            this.officeGroup = createOfficePeek();
            this.scene.add(this.officeGroup);

            // Bathroom door — enemies must beat it down
            this.doorGroup = createBathroomDoor();
            this.scene.add(this.doorGroup);

            // Bathroom overhead light (actual illumination for the room)
            const bathroomLight = new THREE.PointLight(PALETTE.fillWarm, 0.4, 20, 2);
            bathroomLight.position.set(0, 4.0, 4);
            this.scene.add(bathroomLight);
        },

        _createGrid() {
            // Visual grid overlay for tower placement
            const gridGroup = new THREE.Group();
            gridGroup.name = 'buildGrid';

            const gridSize = CONFIG.grid;
            const halfW = Math.floor(CONFIG.laneWidth / gridSize / 2);
            const startZ = CONFIG.corridorStart + 2; // Don't build in bathroom
            const endZ = CONFIG.laneLength - 2;

            const lineMat = new THREE.LineBasicMaterial({
                color: CONFIG.colors.grid,
                transparent: true,
                opacity: 0.15,
            });

            // Vertical lines (along Z)
            for (let x = -halfW; x <= halfW; x++) {
                const geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(x * gridSize, 0.01, startZ),
                    new THREE.Vector3(x * gridSize, 0.01, endZ),
                ]);
                gridGroup.add(new THREE.Line(geo, lineMat));
            }

            // Horizontal lines (along X)
            for (let z = startZ; z <= endZ; z += gridSize) {
                const geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-halfW * gridSize, 0.01, z),
                    new THREE.Vector3(halfW * gridSize, 0.01, z),
                ]);
                gridGroup.add(new THREE.Line(geo, lineMat));
            }

            this.scene.add(gridGroup);
            this._buildGrid = gridGroup;
            this._buildGrid.visible = false; // Only show when tower selected

            // Grid hover highlight (cell square)
            const highlightGeo = new THREE.PlaneGeometry(gridSize, gridSize);
            const highlightMat = new THREE.MeshBasicMaterial({
                color: PALETTE.gold,
                transparent: true,
                opacity: 0.4,
                depthWrite: false,
                depthTest: false,
            });
            this.gridHighlight = new THREE.Mesh(highlightGeo, highlightMat);
            this.gridHighlight.rotation.x = -Math.PI / 2;
            this.gridHighlight.position.y = 0.05;
            this.gridHighlight.visible = false;
            this.gridHighlight.renderOrder = 1;
            this.scene.add(this.gridHighlight);

            // Range circle — filled semi-transparent disc
            const rangeGeo = new THREE.CircleGeometry(1.0, 64);
            const rangeMat = new THREE.MeshBasicMaterial({
                color: PALETTE.success,
                transparent: true,
                opacity: 0.12,
                side: THREE.DoubleSide,
                depthWrite: false,
                depthTest: false,
            });
            this.rangeCircle = new THREE.Mesh(rangeGeo, rangeMat);
            this.rangeCircle.rotation.x = -Math.PI / 2;
            this.rangeCircle.position.y = 0.04;
            this.rangeCircle.visible = false;
            this.rangeCircle.renderOrder = 1;
            this.scene.add(this.rangeCircle);

            // Range circle edge ring (crisp border)
            const rangeEdgeGeo = new THREE.RingGeometry(0.97, 1.0, 64);
            const rangeEdgeMat = new THREE.MeshBasicMaterial({
                color: PALETTE.success,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide,
                depthWrite: false,
                depthTest: false,
            });
            this.rangeEdge = new THREE.Mesh(rangeEdgeGeo, rangeEdgeMat);
            this.rangeEdge.rotation.x = -Math.PI / 2;
            this.rangeEdge.position.y = 0.045;
            this.rangeEdge.visible = false;
            this.rangeEdge.renderOrder = 2;
            this.scene.add(this.rangeEdge);

            // Ghost tower preview (transparent preview of what will be placed)
            this.ghostPreview = null;
        },

        // ============================
        // INPUT
        // ============================
        _setupInput() {
            // Keyboard
            window.addEventListener('keydown', (e) => {
                // 6E: Toggle performance stats with backtick
                if (e.code === 'Backquote') {
                    this._showPerfStats = !this._showPerfStats;
                    if (!this._showPerfStats && this._perfEl) {
                        this._perfEl.remove();
                        this._perfEl = null;
                    }
                    return;
                }

                if (this.state === 'title') return;

                // Pause toggle (disabled during upgrade selection)
                if (e.code === 'Space' || e.code === 'Escape') {
                    if (this._upgradePhase) return;
                    if (this.state === 'playing') this.pause();
                    else if (this.state === 'paused') this.unpause();
                    return;
                }

                // Tower hotkeys (work while paused too, not during upgrade selection)
                if ((this.state === 'playing' || this.state === 'paused') && !this._upgradePhase) {
                    for (const [key, def] of Object.entries(this.TOWERS)) {
                        if (e.code === def.hotkey) {
                            this.selectTower(key);
                            return;
                        }
                    }
                }
            });

            // Mouse move (for grid highlight)
            window.addEventListener('mousemove', (e) => {
                this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // Mouse click (place tower)
            window.addEventListener('click', (e) => {
                if (this.state !== 'playing' && this.state !== 'paused') return;
                // Don't place towers during upgrade selection
                if (this._upgradePhase) return;
                if (this.selectedTower) {
                    this._tryPlaceTower(e);
                }
            });

            // Right click to deselect
            window.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                this.selectedTower = null;
                this._updateTowerButtons();
            });
        },

        // ============================
        // UI
        // ============================
        _setupUI() {
            // Start button
            document.getElementById('start-btn').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                this.start();
            });

            // Restart button
            document.getElementById('restart-btn').addEventListener('click', () => {
                document.getElementById('game-over-screen').classList.remove('active');
                this.start();
            });

            // Tower panel buttons
            const tooltip = document.getElementById('tower-tooltip');
            const tipName = tooltip.querySelector('.tip-name');
            const tipCost = tooltip.querySelector('.tip-cost');
            const tipDesc = tooltip.querySelector('.tip-desc');

            document.querySelectorAll('.tower-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const towerType = btn.dataset.tower;
                    this.selectTower(towerType);
                });

                // Tooltip show on hover
                btn.addEventListener('mouseenter', () => {
                    tipName.textContent = btn.dataset.tipName;
                    tipCost.textContent = btn.dataset.tipCost;
                    tipDesc.textContent = btn.dataset.tipDesc;

                    // Position tooltip to the left of the button
                    const rect = btn.getBoundingClientRect();
                    tooltip.style.right = (window.innerWidth - rect.left + 10) + 'px';
                    tooltip.style.top = (rect.top + rect.height / 2 - 40) + 'px';
                    tooltip.classList.add('visible');
                });

                btn.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
            });
        },

        selectTower(type) {
            if (this.selectedTower === type) {
                this.selectedTower = null;
            } else {
                this.selectedTower = type;
            }
            this._updateTowerButtons();
        },

        _updateTowerButtons() {
            document.querySelectorAll('.tower-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.tower === this.selectedTower);
            });
        },

        updateHUD() {
            // Door HP display — SVG blob bar
            if (this.doorGroup) {
                const hp = this.doorGroup.userData.doorHP;
                const max = this.doorGroup.userData.maxDoorHP;
                const pct = Math.max(0, Math.round((hp / max) * 100));
                document.getElementById('door-hp-display').textContent = pct + '%';

                // SVG HP bar: clip rect width (0–200 in viewBox space)
                const clipRect = document.getElementById('hp-clip-rect');
                if (clipRect) clipRect.setAttribute('width', (pct / 100) * 200);

                // SVG HP bar: color shift
                const fillPath = document.getElementById('hp-fill-path');
                if (fillPath) {
                    if (pct > 60) fillPath.setAttribute('fill', '#ff6b7a');
                    else if (pct > 40) fillPath.setAttribute('fill', '#ff9800');
                    else if (pct > 20) fillPath.setAttribute('fill', '#ff5722');
                    else fillPath.setAttribute('fill', '#f44336');
                }

                // Urgent jitter on low HP (CSS class drives all layers)
                const hpStat = document.getElementById('door-hp-stat');
                if (pct <= 20 && !hpStat.classList.contains('urgent')) {
                    hpStat.classList.add('urgent');
                }
                if (pct > 20 && hpStat.classList.contains('urgent')) {
                    hpStat.classList.remove('urgent');
                }
            }
            document.getElementById('coins-display').textContent = this.coins;
            document.getElementById('wave-display').textContent = `WAVE ${this.wave}`;
            document.getElementById('score-display').textContent = this.score;
        },

        // --- HUD juice: door damage feedback ---
        _animateDoorHit(dmg) {
            if (this._doorHitAnimBusy) return;
            this._doorHitAnimBusy = true;

            const stat = document.getElementById('door-hp-stat');
            const val = document.getElementById('door-hp-display');
            const delta = document.getElementById('door-delta');

            // Badge shake + red flash
            stat.classList.remove('hit');
            void stat.offsetWidth;
            stat.classList.add('hit');

            // Value bounce
            val.classList.remove('bump');
            void val.offsetWidth;
            val.classList.add('bump');

            // Floating "-X" delta
            if (delta) {
                delta.textContent = `-${dmg}`;
                delta.className = 'hud-delta';
                void delta.offsetWidth;
                delta.className = 'hud-delta show-negative';
            }

            setTimeout(() => {
                stat.classList.remove('hit');
                val.classList.remove('bump');
                if (delta) delta.className = 'hud-delta';
                this._doorHitAnimBusy = false;
            }, 500);
        },

        // --- HUD juice: coin gain feedback ---
        _animateCoinGain(amount) {
            if (this._coinGainAnimBusy) return;
            this._coinGainAnimBusy = true;

            const badge = document.querySelector('.coins-badge');
            const val = document.getElementById('coins-display');
            const delta = document.getElementById('coin-delta');

            // Badge pop + gold flash
            badge.classList.remove('gain');
            void badge.offsetWidth;
            badge.classList.add('gain');

            // Value bounce
            val.classList.remove('bump-gold');
            void val.offsetWidth;
            val.classList.add('bump-gold');

            // Floating "+X" delta
            if (delta) {
                delta.textContent = `+${amount}`;
                delta.className = 'hud-delta';
                void delta.offsetWidth;
                delta.className = 'hud-delta show-positive';
            }

            setTimeout(() => {
                badge.classList.remove('gain');
                val.classList.remove('bump-gold');
                if (delta) delta.className = 'hud-delta';
                this._coinGainAnimBusy = false;
            }, 450);
        },

        announceWave(text) {
            const el = document.getElementById('wave-announce');
            el.textContent = text;
            el.classList.remove('visible');
            // Force reflow for re-trigger of animation
            void el.offsetWidth;
            el.classList.add('visible');
            setTimeout(() => el.classList.remove('visible'), 2200);
        },

        // ============================
        // GAME FLOW
        // ============================
        start() {
            this.state = 'playing';
            this.wave = 0;
            this.coins = CONFIG.startingCoins;

            // Reset door HP and visuals
            if (this.doorGroup) {
                const ud = this.doorGroup.userData;
                ud.doorHP = ud.maxDoorHP;
                // Reset door color
                if (ud.door) {
                    ud.door.material.color.setHex(ud.originalColor);
                    ud.door.material.emissive.setHex(0x000000);
                    ud.door.material.emissiveIntensity = 0;
                    ud.door.visible = true;
                }
                // Hide all cracks
                if (ud.cracks) {
                    ud.cracks.forEach(c => { c.visible = false; });
                }
            }
            this.score = 0;
            this.time = 0;
            this.waveTimer = 0;
            this.waveActive = false;

            // Reset enemy mesh transforms (cinematic may have modified scale/rotation/position)
            for (const e of this.enemies) {
                if (e.mesh) {
                    e.mesh.scale.set(1, 1, 1);
                    e.mesh.rotation.set(0, 0, 0);
                    e.mesh.position.y = 0;
                }
            }

            // Clear entities (6A: release to pool or dispose)
            if (this.enemyPool) {
                this.enemyPool.releaseAll(this.enemies, this.scene);
            } else {
                this.enemies.forEach(e => {
                    if (e.animController) e.animController.dispose();
                    if (e.mesh) {
                        this.scene.remove(e.mesh);
                        e.mesh.traverse(child => {
                            if (child.isMesh) {
                                if (child.geometry) child.geometry.dispose();
                                if (child.material) {
                                    if (Array.isArray(child.material)) {
                                        child.material.forEach(m => m.dispose());
                                    } else {
                                        child.material.dispose();
                                    }
                                }
                            }
                        });
                    }
                });
            }
            this.towers.forEach(t => { if (t.mesh) this.scene.remove(t.mesh); });
            this.projectiles.forEach(p => { if (p.mesh) this.scene.remove(p.mesh); });
            this.enemies = [];
            this.towers = [];
            this.projectiles = [];
            // Clean up active sprays
            if (this.sprays) {
                for (const s of this.sprays) {
                    for (const p of s.particles) {
                        p.mesh.geometry.dispose();
                        p.mesh.material.dispose();
                    }
                    this.scene.remove(s.group);
                }
            }
            this.sprays = [];

            // Clear dropped coins
            if (this.coinPool) {
                this.coinPool.clear(this.scene);
            }

            // Clear floating texts
            this._floatingTexts.forEach(ft => {
                this.scene.remove(ft.sprite);
                ft.sprite.material.map.dispose();
                ft.sprite.material.dispose();
            });
            this._floatingTexts = [];

            // Clear door particles
            this._doorParticles.forEach(p => {
                this.scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
            });
            this._doorParticles = [];

            // Clear mop impact effects
            this._mopImpacts.forEach(fx => {
                this.scene.remove(fx.ring);
                fx.ring.geometry.dispose();
                fx.ring.material.dispose();
            });
            this._mopImpacts = [];

            // Clear sliding pots
            this._slidingPots.forEach(sp => {
                this.scene.remove(sp.mesh);
                sp.mesh.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        child.material.dispose();
                    }
                });
            });
            this._slidingPots = [];

            // Clean up cinematic effects (comic pops, speech bubble, stars)
            this._cinematicEffects.forEach(fx => {
                const obj = fx.sprite || fx.mesh;
                if (obj) {
                    this.scene.remove(obj);
                    if (obj.material) {
                        if (obj.material.map) obj.material.map.dispose();
                        obj.material.dispose();
                    }
                    if (obj.geometry) obj.geometry.dispose();
                }
            });
            this._cinematicEffects = [];
            this._cinematicSchedule = [];

            // Clean up flying phone
            if (this._flyingPhone) {
                this.scene.remove(this._flyingPhone.mesh);
                this._flyingPhone = null;
            }

            // Reset player character to seated idle (only after cinematic)
            if (this.playerCharacter &&
                (this.playerCharacter._isPanicking || !this.playerCharacter.phoneMesh)) {
                this.playerCharacter.reset(this.toilet.position);
            }

            // Reset toilet position/rotation (may have been jostled by cinematic)
            if (this.toilet && this._cinematicTimer > 0) {
                this.toilet.position.set(CONFIG.toiletPos.x, CONFIG.toiletPos.y, CONFIG.toiletPos.z);
                this.toilet.rotation.set(0, 0, 0);
            }

            this._cinematicTimer = 0;
            this._globalHitstop = 0;
            this._cameraShake = 0;
            this._cameraShakeIntensity = 0;

            // Reset fade overlay instantly (no transition)
            const fadeEl = document.getElementById('fade-overlay');
            if (fadeEl) {
                fadeEl.style.transition = 'none';
                fadeEl.classList.remove('active');
                void fadeEl.offsetHeight;
                fadeEl.style.transition = '';
            }

            // Reset upgrade system
            if (this.upgradeManager) {
                this.upgradeManager.reset();
                this._cleanupUpgradeDrones();
                this._upgradePhase = false;
            }
            if (this.upgradeSelectionUI) {
                this.upgradeSelectionUI.deactivate();
            }
            // Clear upgrade HUD cards
            if (this._upgradeHUD) {
                this._upgradeHUD.innerHTML = '';
            }

            this.selectedTower = null;
            this._updateTowerButtons();
            this.updateHUD();

            // 8 second build phase before wave 1
            this.waveTimer = 8.0;
            this.announceWave('PLACE COIN MAGNETS [1] TO COLLECT!');

            this.clock.start();
            console.log('Game started — defend the throne!');
        },

        pause() {
            if (this.state !== 'playing') return;
            this.state = 'paused';
            document.getElementById('pause-overlay').classList.add('active');
        },

        unpause() {
            if (this.state !== 'paused') return;
            this.state = 'playing';
            document.getElementById('pause-overlay').classList.remove('active');
        },

        gameOver() {
            this.state = 'gameover';
            const stats = document.getElementById('game-over-stats');
            stats.innerHTML = `Survived to Wave ${this.wave}<br>Score: ${this.score}<br>Enemies repelled: ${this._totalRepelled || 0}`;
            document.getElementById('game-over-screen').classList.add('active');
        },

        // ============================
        // TOWER PLACEMENT
        // ============================
        _getGridPos(screenX, screenY) {
            this.raycaster.setFromCamera(this.mouse, this.camera);
            const intersect = new THREE.Vector3();
            this.raycaster.ray.intersectPlane(this.groundPlane, intersect);
            if (!intersect) return null;

            const gs = CONFIG.grid;
            const gx = Math.round(intersect.x / gs) * gs;
            const gz = Math.round(intersect.z / gs) * gs;

            // Bounds check — must be in buildable area
            const halfW = Math.floor(CONFIG.laneWidth / gs / 2) * gs;
            const minZ = CONFIG.corridorStart + 2;
            const maxZ = CONFIG.laneLength - 4; // leave clearance before exit doors

            if (gx < -halfW || gx > halfW || gz < minZ || gz > maxZ) return null;
            return { x: gx, z: gz };
        },

        _isCellOccupied(gx, gz) {
            const gs = CONFIG.grid;
            return this.towers.some(t => {
                // Check all cells this tower occupies (multi-tile barriers)
                const tw = t.tileWidth || 1;
                for (let dx = 0; dx < tw; dx++) {
                    const cellX = t.gridX + (dx - Math.floor(tw / 2)) * gs;
                    if (Math.abs(cellX - gx) < gs * 0.5 && Math.abs(t.gridZ - gz) < gs * 0.5) return true;
                }
                return false;
            });
        },

        _tryPlaceTower() {
            const pos = this._getGridPos();
            if (!pos) return;

            const def = this.TOWERS[this.selectedTower];
            if (!def) return;
            if (this.coins < def.cost) return;

            const gs = CONFIG.grid;
            const tw = def.tileWidth || 1;
            const halfW = Math.floor(CONFIG.laneWidth / gs / 2) * gs;

            // Validate all cells for multi-tile towers
            for (let dx = 0; dx < tw; dx++) {
                const cellX = pos.x + (dx - Math.floor(tw / 2)) * gs;
                if (cellX < -halfW || cellX > halfW) return; // out of bounds
                if (this._isCellOccupied(cellX, pos.z)) return;
            }

            this.coins -= def.cost;

            // Create tower mesh
            const tower = this._createTowerMesh(this.selectedTower, def);
            tower.gridX = pos.x;
            tower.gridZ = pos.z;
            tower.tileWidth = tw;
            tower.mesh.castShadow = true;
            tower.delivering = true; // Tower is inactive until drone delivers it
            this.towers.push(tower);

            // Launch drone delivery!
            this._startDroneDelivery(pos.x, pos.z, tower);

            // Player taps phone to order the drone
            if (this.playerCharacter) {
                this.playerCharacter.playPhoneTap();
            }

            // Clear ghost so it doesn't linger on the just-placed cell
            this._clearGhost();

            this.updateHUD();
        },

        _destroyTower(index) {
            const t = this.towers[index];
            t.dying = true;

            // Release all enemies bashing this barrier
            if (t.type === 'wetfloor') {
                for (const e of this.enemies) {
                    if (e.bashingBarrier === t) {
                        e.bashing = false;
                        e.bashingBarrier = null;
                    }
                }
            }

            // Destruction animation — tumble, shrink, fade
            const mesh = t.mesh;
            const startTime = Date.now();
            const duration = 400;
            const tumbleDir = (Math.random() - 0.5) * 2; // random tumble direction

            const animateDeath = () => {
                const elapsed = Date.now() - startTime;
                const p = Math.min(1, elapsed / duration);

                // Tumble over
                mesh.rotation.z = tumbleDir * p * (Math.PI / 2);
                mesh.rotation.x = (1 - Math.abs(tumbleDir)) * p * (Math.PI / 3);

                // Shrink and sink
                const scale = 1 - p * p; // ease-in shrink
                mesh.scale.set(scale, scale, scale);
                mesh.position.y = -p * 0.5;

                // Fade out all materials
                mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.transparent = true;
                        child.material.opacity = Math.max(0, 1 - p * 1.5);
                    }
                });

                if (p < 1) {
                    requestAnimationFrame(animateDeath);
                } else {
                    this.scene.remove(mesh);
                }
            };
            animateDeath();

            // Remove from towers array immediately so it can't be interacted with
            this.towers.splice(index, 1);
        },

        // ============================
        // POT PLANT KICK PHYSICS
        // ============================
        _kickPotPlant(towerIndex, kicker) {
            const t = this.towers[towerIndex];
            const mesh = t.mesh;
            const def = t.def;
            const remainingHp = t.hp; // HP after the trample code decremented it

            // Remove from towers array (it's a projectile now)
            this.towers.splice(towerIndex, 1);

            // Calculate kick direction: from kicker center toward pot center
            let dirX = t.gridX - kicker.x;
            let dirZ = t.gridZ - kicker.z;
            const dirLen = Math.sqrt(dirX * dirX + dirZ * dirZ);
            if (dirLen > 0.01) {
                dirX /= dirLen;
                dirZ /= dirLen;
            } else {
                dirX = 0;
                dirZ = -1;
            }

            // Create sliding pot entity (carries remaining HP)
            const slidingPot = {
                mesh: mesh,
                x: t.gridX,
                z: t.gridZ,
                vx: dirX * def.kickSpeed,
                vz: dirZ * def.kickSpeed,
                vy: 3.5,
                y: 0,
                spin: (Math.random() - 0.5) * 14,
                life: 2.0,
                hitEnemies: new Set(),
                tripDamage: def.tripDamage,
                stunDuration: def.stunDuration,
                hp: remainingHp,              // Survives if hp > 0
            };
            slidingPot.hitEnemies.add(kicker);

            this._slidingPots.push(slidingPot);

            // Trip the kicker — face-plant stun
            kicker.hp -= def.tripDamage;
            kicker.hitFlash = 0.15;
            kicker.stunTimer = def.stunDuration;
            kicker.tripFallDuration = def.stunDuration;
            if (kicker.animController) {
                kicker.animController.playOneShot('hit_react');
                kicker.animController.setTimeScale(0);
            }
            if (kicker.bashing) {
                kicker.bashing = false;
                kicker.bashingBarrier = null;
            }
            kicker._impactSquash = 0.18;

            this._globalHitstop = Math.max(this._globalHitstop, 0.04);
            this._cameraShake = 0.1;
            this._cameraShakeIntensity = 0.12;
            this._spawnTripImpact(kicker.x, kicker.z);
        },

        _replacePotPlant(sp) {
            // Reset mesh rotation from tumble and sit it upright on the ground
            sp.mesh.rotation.set(0, sp.mesh.rotation.y, 0);
            sp.mesh.position.set(sp.x, 0, sp.z);

            // Re-add as a tower at its landed position
            this.towers.push({
                type: 'potplant',
                def: this.TOWERS.potplant,
                mesh: sp.mesh,
                gridX: sp.x,
                gridZ: sp.z,
                hp: sp.hp,
                hitShake: 0,
                dying: false,
                delivering: false,
            });
        },

        _disposeSlidingPot(index) {
            const sp = this._slidingPots[index];
            this.scene.remove(sp.mesh);
            sp.mesh.traverse(child => {
                if (child.isMesh) {
                    child.geometry.dispose();
                    child.material.dispose();
                }
            });
            this._slidingPots.splice(index, 1);
        },

        _spawnPotShatter(x, z) {
            // Terracotta shards + soil + leaf particles
            const colors = [PALETTE.potplant, PALETTE.potplant, PALETTE.wood, PALETTE.success, PALETTE.success, PALETTE.ink];
            const chipCount = 12 + Math.floor(Math.random() * 6);

            for (let i = 0; i < chipCount; i++) {
                const size = 0.08 + Math.random() * 0.18;
                const geo = Math.random() > 0.4
                    ? new THREE.BoxGeometry(size, size * 0.5, size * 0.3)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                const color = colors[Math.floor(Math.random() * colors.length)];
                const mat2 = toonMat(color);
                const chip = new THREE.Mesh(geo, mat2);
                chip.position.set(
                    x + (Math.random() - 0.5) * 1.5,
                    0.5 + Math.random() * 1.0,
                    z + (Math.random() - 0.5) * 1.5
                );
                chip.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                chip.castShadow = true;
                this.scene.add(chip);

                this._doorParticles.push({
                    mesh: chip,
                    vx: (Math.random() - 0.5) * 6,
                    vy: 3 + Math.random() * 4,
                    vz: (Math.random() - 0.5) * 6,
                    rotSpeed: (Math.random() - 0.5) * 14,
                    life: 0.6 + Math.random() * 0.5,
                    maxLife: 0.6 + Math.random() * 0.5,
                    gravity: 14 + Math.random() * 4,
                });
            }
        },

        _spawnTripImpact(x, z) {
            // Comic text sprite — "TRIP!", "CRASH!", etc.
            const canvas = document.createElement('canvas');
            canvas.width = 192;
            canvas.height = 96;
            const ctx = canvas.getContext('2d');
            const rot = (Math.random() - 0.5) * 0.3;
            ctx.translate(96, 48);
            ctx.rotate(rot);
            ctx.font = 'bold 56px Bangers, Impact, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const words = ['TRIP!', 'CRASH!', 'SPLAT!', 'BONK!', 'OOF!'];
            const text = words[Math.floor(Math.random() * words.length)];
            // Terracotta text with black outline
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 6;
            ctx.strokeText(text, 0, 2);
            ctx.fillStyle = '#c4663a';
            ctx.fillText(text, 0, 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(x, 3.5, z);
            sprite.scale.set(3.5, 1.8, 1);
            this.scene.add(sprite);
            this._floatingTexts.push({ sprite, life: 0.8 });

            // Expanding impact ring
            const ringGeo = new THREE.RingGeometry(0.2, 0.5, 16);
            const ringMat = new THREE.MeshBasicMaterial({
                color: PALETTE.potplant,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(x, 0.3, z);
            ring.rotation.x = -Math.PI / 2;
            this.scene.add(ring);
            this._mopImpacts.push({ ring, life: 0.35, maxLife: 0.35 });
        },

        // ============================
        // DRONE DELIVERY SYSTEM
        // ============================
        _createDroneModel() {
            const drone = new THREE.Group();
            drone.name = 'deliveryDrone';

            const bodyMat = toonMat(PALETTE.charcoal);
            const armMat = toonMat(PALETTE.pants);
            const rotorMat = toonMat(PALETTE.fixture, { transparent: true, opacity: 0.5, side: THREE.DoubleSide });

            // Central body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 0.18, 0.7),
                bodyMat
            );
            drone.add(body);

            // Top cover (slightly rounded look)
            const cover = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.08, 0.5),
                toonMat(PALETTE.charcoal)
            );
            cover.position.y = 0.13;
            drone.add(cover);

            // Camera/sensor on bottom
            const sensor = new THREE.Mesh(
                new THREE.SphereGeometry(0.07, 8, 6),
                toonMat(PALETTE.ink, { emissive: PALETTE.danger, emissiveIntensity: 0.5 })
            );
            sensor.position.y = -0.12;
            drone.add(sensor);

            // X-shaped arms
            const arm1 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.04, 0.06), armMat);
            arm1.rotation.y = Math.PI / 4;
            arm1.position.y = 0.02;
            drone.add(arm1);

            const arm2 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.04, 0.06), armMat);
            arm2.rotation.y = -Math.PI / 4;
            arm2.position.y = 0.02;
            drone.add(arm2);

            // 4 rotors at arm tips + motor mounts
            const rotorPositions = [
                { x:  0.6, z:  0.6 },
                { x:  0.6, z: -0.6 },
                { x: -0.6, z:  0.6 },
                { x: -0.6, z: -0.6 },
            ];
            const rotors = [];
            for (const rp of rotorPositions) {
                // Motor mount
                const mount = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06, 0.06, 0.1, 8),
                    bodyMat
                );
                mount.position.set(rp.x, 0.07, rp.z);
                drone.add(mount);

                // Rotor disc (transparent spinning disc)
                const rotor = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.3, 0.3, 0.015, 16),
                    rotorMat
                );
                rotor.position.set(rp.x, 0.14, rp.z);
                drone.add(rotor);
                rotors.push(rotor);

                // Rotor ring (visible edge)
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(0.3, 0.012, 6, 16),
                    armMat
                );
                ring.rotation.x = Math.PI / 2;
                ring.position.set(rp.x, 0.14, rp.z);
                drone.add(ring);
            }
            drone.userData.rotors = rotors;

            // LED lights — green front, red back
            const greenLed = new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 6, 6),
                toonMat(PALETTE.success, { emissive: PALETTE.success, emissiveIntensity: 1.5 })
            );
            greenLed.position.set(0, 0.02, 0.38);
            drone.add(greenLed);

            const redLed = new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 6, 6),
                toonMat(PALETTE.danger, { emissive: PALETTE.danger, emissiveIntensity: 1.5 })
            );
            redLed.position.set(0, 0.02, -0.38);
            drone.add(redLed);

            // Package hook (thin line hanging below)
            const hook = new THREE.Mesh(
                new THREE.CylinderGeometry(0.01, 0.01, 0.3, 4),
                toonMat(PALETTE.charcoal)
            );
            hook.position.y = -0.25;
            hook.name = 'hook';
            drone.add(hook);

            return drone;
        },

        _createPackageModel(towerType) {
            const pkg = new THREE.Group();
            pkg.name = 'package';
            const boxMat = toonMat(PALETTE.wood);
            const isBarrier = towerType === 'wetfloor';

            const box = new THREE.Mesh(
                new THREE.BoxGeometry(
                    isBarrier ? 1.8 : 0.6,
                    isBarrier ? 0.3 : 0.4,
                    isBarrier ? 0.4 : 0.6
                ),
                boxMat
            );
            pkg.add(box);

            // Tape stripe on top
            const tapeMat = toonMat(PALETTE.tileLight);
            const tape = new THREE.Mesh(
                new THREE.BoxGeometry(0.08, 0.005, isBarrier ? 0.42 : 0.62),
                tapeMat
            );
            tape.position.y = isBarrier ? 0.151 : 0.201;
            pkg.add(tape);

            // Barrier gets extra cross-tape (heavy load!)
            if (isBarrier) {
                const tape2 = new THREE.Mesh(
                    new THREE.BoxGeometry(1.82, 0.005, 0.08),
                    tapeMat
                );
                tape2.position.y = 0.151;
                pkg.add(tape2);
            }

            return pkg;
        },

        _startDroneDelivery(targetX, targetZ, tower) {
            if (this.windowPositions.length === 0) {
                // Fallback: no windows, just place directly
                tower.mesh.position.set(targetX, 0, targetZ);
                this.scene.add(tower.mesh);
                tower.mesh.scale.set(1, 1, 1);
                tower.delivering = false;
                return;
            }

            // Pick entry window (prefer side closer to target, or random)
            const leftWindows = this.windowPositions.filter(w => w.x < 0);
            const rightWindows = this.windowPositions.filter(w => w.x > 0);
            const useLeft = targetX <= 0 ? Math.random() < 0.7 : Math.random() < 0.3;
            const entryPool = useLeft ? leftWindows : rightWindows;
            const entry = entryPool[Math.floor(Math.random() * entryPool.length)];

            // Pick exit window (opposite side for dramatic cross)
            const exitPool = entry.x < 0 ? rightWindows : leftWindows;
            const exit = exitPool[Math.floor(Math.random() * exitPool.length)];

            // Create drone
            const isBarrier = tower.type === 'wetfloor';
            const droneModel = this._createDroneModel();
            const pkg = this._createPackageModel(tower.type);
            pkg.position.y = -0.55;
            droneModel.add(pkg);

            // Starting position — just outside the window
            const outsideX = entry.x + (entry.x < 0 ? -2 : 2);
            droneModel.position.set(outsideX, entry.y, entry.z);
            this.scene.add(droneModel);

            // Build flight path using CatmullRomCurve3
            const flyHeight = 7;
            const hoverHeight = 2.0;

            // Inbound path: outside window → above target
            const inboundCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(outsideX, entry.y, entry.z),
                new THREE.Vector3(entry.x, entry.y + 1, entry.z),
                new THREE.Vector3(entry.x * 0.4, flyHeight, (entry.z + targetZ) / 2),
                new THREE.Vector3(targetX, flyHeight, targetZ),
            ], false, 'catmullrom', 0.3);

            // Outbound path: above target → outside exit window
            const exitOutsideX = exit.x + (exit.x < 0 ? -2 : 2);
            const outboundCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(targetX, flyHeight, targetZ),
                new THREE.Vector3(exit.x * 0.4, flyHeight, (targetZ + exit.z) / 2),
                new THREE.Vector3(exit.x, exit.y + 1, exit.z),
                new THREE.Vector3(exitOutsideX, exit.y, exit.z),
            ], false, 'catmullrom', 0.3);

            // Drone state machine
            const droneData = {
                model: droneModel,
                pkg: pkg,
                tower: tower,
                targetX: targetX,
                targetZ: targetZ,
                state: 'entering',  // entering → descending → dropping → ascending → exiting → done
                time: 0,
                inboundCurve: inboundCurve,
                outboundCurve: outboundCurve,
                flyHeight: flyHeight,
                hoverHeight: hoverHeight,
                // Phase durations (seconds) — barrier = heavier load, slower delivery
                enterDuration: isBarrier ? 0.9 : 0.6,
                descendDuration: isBarrier ? 0.4 : 0.25,
                dropDuration: 0.15,
                ascendDuration: 0.2,
                exitDuration: 0.5,
                isBarrier: isBarrier,
                // Previous position for tilt calculation
                prevPos: new THREE.Vector3(outsideX, entry.y, entry.z),
                rotorSpin: 0,
            };

            this.activeDrones.push(droneData);
        },

        _updateDrones(dt) {
            for (let i = this.activeDrones.length - 1; i >= 0; i--) {
                const d = this.activeDrones[i];
                d.time += dt;

                const model = d.model;
                let pos = new THREE.Vector3();
                let done = false;

                if (d.state === 'entering') {
                    const t = Math.min(1, d.time / d.enterDuration);
                    // Ease-in-out for smooth arc
                    const et = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    d.inboundCurve.getPoint(et, pos);
                    model.position.copy(pos);

                    if (t >= 1) {
                        d.state = 'descending';
                        d.time = 0;
                    }
                } else if (d.state === 'descending') {
                    const t = Math.min(1, d.time / d.descendDuration);
                    const et = t * t; // ease-in (accelerating down)
                    const y = d.flyHeight + (d.hoverHeight - d.flyHeight) * et;
                    model.position.set(d.targetX, y, d.targetZ);

                    if (t >= 1) {
                        d.state = 'dropping';
                        d.time = 0;
                    }
                } else if (d.state === 'dropping') {
                    const t = Math.min(1, d.time / d.dropDuration);
                    model.position.set(d.targetX, d.hoverHeight, d.targetZ);

                    if (t >= 1) {
                        // Drop the package — place the tower!
                        if (d.pkg.parent) d.pkg.parent.remove(d.pkg);
                        // Remove hook visual
                        const hook = model.getObjectByName('hook');
                        if (hook) hook.visible = false;

                        // Place tower mesh in scene
                        d.tower.mesh.position.set(d.targetX, 0, d.targetZ);
                        this.scene.add(d.tower.mesh);
                        d.tower.delivering = false;

                        // Pop animation on the tower
                        d.tower.mesh.scale.set(0, 0, 0);
                        const startTime = Date.now();
                        const popDuration = 350;
                        const towerMesh = d.tower.mesh;
                        const animatePop = () => {
                            const pt = Math.min(1, (Date.now() - startTime) / popDuration);
                            const s = pt < 0.5
                                ? 2 * pt * pt
                                : 1 - Math.pow(-2 * pt + 2, 3) / 2;
                            const scale = s * (1 + (1 - pt) * 0.3);
                            towerMesh.scale.set(scale, scale, scale);
