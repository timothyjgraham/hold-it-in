<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLD IT IN</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-left">
            <div class="hud-stat" id="door-hp-stat">
                <span class="icon">🚪</span>
                <span class="value" id="door-hp-display">100%</span>
                <div id="door-hp-bar-bg" style="width:60px;height:8px;background:#333;border-radius:4px;margin-left:6px;overflow:hidden;display:inline-block;vertical-align:middle;">
                    <div id="door-hp-bar" style="width:100%;height:100%;background:#4caf50;border-radius:4px;transition:width 0.3s,background 0.3s;"></div>
                </div>
            </div>
            <div class="hud-stat">
                <span class="icon">🪙</span>
                <span class="value" id="coins-display">50</span>
            </div>
        </div>
        <div id="hud-center">
            <span id="wave-display">WAVE 1</span>
        </div>
        <div id="hud-right">
            <div class="hud-stat">
                <span class="value" id="score-display">0</span>
                <span class="icon">PTS</span>
            </div>
        </div>
    </div>

    <!-- Wave Announcement -->
    <div id="wave-announce"></div>

    <!-- Pause Overlay -->
    <div id="pause-overlay">
        <div id="pause-text">PAUSED</div>
    </div>

    <!-- Tower Build Panel -->
    <div id="tower-panel">
        <div class="tower-btn" data-tower="tipjar" title="Tip Jar — Generates 2 coins every 3s">
            <span class="hotkey">1</span>
            <span class="label">Tip Jar</span>
            <span class="cost">10</span>
        </div>
        <div class="tower-btn" data-tower="wetfloor" title="Wet Floor Sign — Slows enemies">
            <span class="hotkey">2</span>
            <span class="label">Wet Floor</span>
            <span class="cost">15</span>
        </div>
        <div class="tower-btn" data-tower="mop" title="Mop Turret — Attacks + knockback">
            <span class="hotkey">3</span>
            <span class="label">Mop</span>
            <span class="cost">25</span>
        </div>
        <div class="tower-btn" data-tower="freshener" title="Air Freshener — Ranged DPS">
            <span class="hotkey">4</span>
            <span class="label">Freshener</span>
            <span class="cost">35</span>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>HOLD IT IN</h1>
        <div class="tagline">Your toilet. Your rules.</div>
        <button id="start-btn">DEFEND THE THRONE</button>
    </div>

    <!-- Fade Overlay (cinematic fade to black) -->
    <div id="fade-overlay"></div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <h1>OCCUPIED</h1>
        <div class="subtitle" id="game-over-subtitle">They broke through the door!</div>
        <div class="stats" id="game-over-stats"></div>
        <button id="restart-btn">TRY AGAIN</button>
    </div>

    <!-- Game Logic -->
    <script>
    const Game = {
        // === STATE ===
        scene: null,
        camera: null,
        renderer: null,
        clock: null,
        toilet: null,

        state: 'title',  // title | playing | paused | gameover
        wave: 0,
        coins: 50,
        score: 0,
        time: 0,
        doorGroup: null,

        // Entity arrays
        enemies: [],
        towers: [],
        projectiles: [],

        // Wave management
        waveTimer: 0,
        spawnTimer: 0,
        enemiesSpawned: 0,
        enemiesPerWave: 8,
        spawnInterval: 1.5,
        waveDelay: 5.0,
        waveActive: false,
        _floatingTexts: [],
        _doorParticles: [],
        _cinematicTimer: 0,

        // Build mode
        selectedTower: null,
        gridHighlight: null,

        // Raycasting for mouse interaction (initialized in init())
        raycaster: null,
        mouse: null,
        groundPlane: null,

        // Tower definitions
        TOWERS: {
            tipjar: {
                name: 'Tip Jar',
                cost: 10,
                range: 0,
                hp: 1,              // Glass jar — shatters on contact
                color: 0xf39c12,
                effect: 'income',
                incomeAmount: 2,
                incomeInterval: 2.5,
                hotkey: 'Digit1',
            },
            wetfloor: {
                name: 'Wet Floor Sign',
                cost: 15,
                range: 6,
                hp: 4,              // Plastic sign — takes a beating
                color: 0xf1c40f,
                effect: 'slow',
                slowFactor: 0.4,
                hotkey: 'Digit2',
            },
            mop: {
                name: 'Mop Turret',
                cost: 25,
                range: 5,
                hp: 6,              // Sturdy — actively fighting back
                color: 0x8e44ad,
                damage: 20,
                attackRate: 1.0,
                knockback: 2.0,
                hotkey: 'Digit3',
            },
            freshener: {
                name: 'Air Freshener',
                cost: 35,
                range: 9,
                hp: 2,              // Fragile canister — place at the back
                color: 0x2ecc71,
                damage: 12,
                attackRate: 0.6,
                hotkey: 'Digit4',
            },
        },

        // ============================
        // INIT
        // ============================
        init() {
            // Wait for THREE.js to load
            if (!window.THREE) {
                setTimeout(() => Game.init(), 50);
                return;
            }

            // Init THREE-dependent objects
            this.raycaster = new THREE.Raycaster();
            this.mouse = new THREE.Vector2();
            this.groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            const container = document.getElementById('game-container');

            // Renderer
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.renderer.setClearColor(0x1a1a2e);
            container.appendChild(this.renderer.domElement);

            // Scene
            this.scene = new THREE.Scene();
            this.scene.fog = new THREE.Fog(0x1a1a2e, 60, 110);

            // Camera — steep TD angle for clear playing field visibility
            const aspect = window.innerWidth / window.innerHeight;
            this.camera = new THREE.PerspectiveCamera(CONFIG.cameraFOV, aspect, 0.1, 250);
            this.camera.position.set(CONFIG.cameraPos.x, CONFIG.cameraPos.y, CONFIG.cameraPos.z);
            this.camera.lookAt(CONFIG.cameraLookAt.x, CONFIG.cameraLookAt.y, CONFIG.cameraLookAt.z);

            // Clock
            this.clock = new THREE.Clock();

            // Build the scene
            this._createLighting();
            this._createGround();
            this._createToilet();
            this._createEnvironment();
            this._createGrid();

            // Input
            this._setupInput();

            // UI
            this._setupUI();

            // Handle resize
            window.addEventListener('resize', () => {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start render loop (but game doesn't start until player clicks)
            this._animate();

            console.log('Hold It In — initialized');
        },

        // ============================
        // SCENE SETUP
        // ============================
        _createLighting() {
            // Ambient — slightly warm, enough to see bathroom walls
            const ambient = new THREE.AmbientLight(0x505060, 0.7);
            this.scene.add(ambient);

            // Main directional light (slightly warm, from above-right)
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
            dirLight.position.set(10, 30, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -35;
            dirLight.shadow.camera.right = 35;
            dirLight.shadow.camera.top = 70;
            dirLight.shadow.camera.bottom = -5;
            this.scene.add(dirLight);

            // Subtle blue fill from opposite side
            const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
            fillLight.position.set(-10, 20, 10);
            this.scene.add(fillLight);
        },

        _createGround() {
            // Main ground plane (dark, extends to fog)
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({
                color: CONFIG.colors.ground,
                roughness: 0.9,
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.05;
            ground.receiveShadow = true;
            this.scene.add(ground);

            // Bathroom tiled floor (checkerboard pattern via canvas texture)
            const tileCanvas = document.createElement('canvas');
            tileCanvas.width = 512;
            tileCanvas.height = 512;
            const tCtx = tileCanvas.getContext('2d');
            const tilesPerRow = 8;
            const tilePx = tileCanvas.width / tilesPerRow;
            for (let r = 0; r < tilesPerRow; r++) {
                for (let c = 0; c < tilesPerRow; c++) {
                    tCtx.fillStyle = (r + c) % 2 === 0 ? '#8999a8' : '#7a8a9a';
                    tCtx.fillRect(c * tilePx, r * tilePx, tilePx, tilePx);
                    tCtx.strokeStyle = '#5e6e7a';
                    tCtx.lineWidth = 3;
                    tCtx.strokeRect(c * tilePx + 1.5, r * tilePx + 1.5, tilePx - 3, tilePx - 3);
                }
            }
            const tileTexture = new THREE.CanvasTexture(tileCanvas);
            tileTexture.wrapS = THREE.RepeatWrapping;
            tileTexture.wrapT = THREE.RepeatWrapping;
            tileTexture.repeat.set(3, 4);

            const tileGeo = new THREE.PlaneGeometry(CONFIG.corridorWidth, CONFIG.corridorStart + 4);
            const tileMat = new THREE.MeshStandardMaterial({
                map: tileTexture,
                roughness: 0.35,
                metalness: 0.1,
            });
            const tile = new THREE.Mesh(tileGeo, tileMat);
            tile.rotation.x = -Math.PI / 2;
            tile.position.set(0, -0.01, CONFIG.corridorStart / 2 - 2);
            tile.receiveShadow = true;
            this.scene.add(tile);

            // Lane floor (buildable area — slightly lighter)
            const laneGeo = new THREE.PlaneGeometry(CONFIG.laneWidth, CONFIG.laneLength - CONFIG.corridorStart);
            const laneMat = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a,
                roughness: 0.85,
            });
            const lane = new THREE.Mesh(laneGeo, laneMat);
            lane.rotation.x = -Math.PI / 2;
            lane.position.set(0, -0.03, CONFIG.corridorStart + (CONFIG.laneLength - CONFIG.corridorStart) / 2);
            lane.receiveShadow = true;
            this.scene.add(lane);
            this._laneFloor = lane;
        },

        _createToilet() {
            this.toilet = createToilet();
            this.toilet.position.set(CONFIG.toiletPos.x, CONFIG.toiletPos.y, CONFIG.toiletPos.z);
            // Face the door — bowl points toward +Z (enemies approach from that direction)
            this.toilet.rotation.y = 0;
            this.scene.add(this.toilet);
        },

        _createEnvironment() {
            // Bathroom walls (back, sides, door frame)
            this.scene.add(createBathroomWalls());

            // Single-toilet room — no stall dividers needed

            // Sinks on left wall
            this.scene.add(createSinks());

            // Mirror above sinks
            this.scene.add(createMirror());

            // Hand dryer on right wall
            this.scene.add(createHandDryer());

            // Paper towel dispenser on right wall
            this.scene.add(createPaperTowelDispenser());

            // Trash can near the door
            this.scene.add(createTrashCan());

            // Office elements visible through the doorway
            this.officeGroup = createOfficePeek();
            this.scene.add(this.officeGroup);

            // Bathroom door — enemies must beat it down
            this.doorGroup = createBathroomDoor();
            this.scene.add(this.doorGroup);

            // Bathroom overhead light (actual illumination for the room)
            const bathroomLight = new THREE.PointLight(0xeee8dd, 0.4, 20, 2);
            bathroomLight.position.set(0, 4.0, 4);
            this.scene.add(bathroomLight);
        },

        _createGrid() {
            // Visual grid overlay for tower placement
            const gridGroup = new THREE.Group();
            gridGroup.name = 'buildGrid';

            const gridSize = CONFIG.grid;
            const halfW = Math.floor(CONFIG.laneWidth / gridSize / 2);
            const startZ = CONFIG.corridorStart + 2; // Don't build in bathroom
            const endZ = CONFIG.laneLength - 2;

            const lineMat = new THREE.LineBasicMaterial({
                color: CONFIG.colors.grid,
                transparent: true,
                opacity: 0.15,
            });

            // Vertical lines (along Z)
            for (let x = -halfW; x <= halfW; x++) {
                const geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(x * gridSize, 0.01, startZ),
                    new THREE.Vector3(x * gridSize, 0.01, endZ),
                ]);
                gridGroup.add(new THREE.Line(geo, lineMat));
            }

            // Horizontal lines (along X)
            for (let z = startZ; z <= endZ; z += gridSize) {
                const geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-halfW * gridSize, 0.01, z),
                    new THREE.Vector3(halfW * gridSize, 0.01, z),
                ]);
                gridGroup.add(new THREE.Line(geo, lineMat));
            }

            this.scene.add(gridGroup);
            this._buildGrid = gridGroup;
            this._buildGrid.visible = false; // Only show when tower selected

            // Grid hover highlight (cell square)
            const highlightGeo = new THREE.PlaneGeometry(gridSize, gridSize);
            const highlightMat = new THREE.MeshBasicMaterial({
                color: 0xffd700,
                transparent: true,
                opacity: 0.4,
                depthWrite: false,
                depthTest: false,
            });
            this.gridHighlight = new THREE.Mesh(highlightGeo, highlightMat);
            this.gridHighlight.rotation.x = -Math.PI / 2;
            this.gridHighlight.position.y = 0.05;
            this.gridHighlight.visible = false;
            this.gridHighlight.renderOrder = 1;
            this.scene.add(this.gridHighlight);

            // Range circle — filled semi-transparent disc
            const rangeGeo = new THREE.CircleGeometry(1.0, 64);
            const rangeMat = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.12,
                side: THREE.DoubleSide,
                depthWrite: false,
                depthTest: false,
            });
            this.rangeCircle = new THREE.Mesh(rangeGeo, rangeMat);
            this.rangeCircle.rotation.x = -Math.PI / 2;
            this.rangeCircle.position.y = 0.04;
            this.rangeCircle.visible = false;
            this.rangeCircle.renderOrder = 1;
            this.scene.add(this.rangeCircle);

            // Range circle edge ring (crisp border)
            const rangeEdgeGeo = new THREE.RingGeometry(0.97, 1.0, 64);
            const rangeEdgeMat = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide,
                depthWrite: false,
                depthTest: false,
            });
            this.rangeEdge = new THREE.Mesh(rangeEdgeGeo, rangeEdgeMat);
            this.rangeEdge.rotation.x = -Math.PI / 2;
            this.rangeEdge.position.y = 0.045;
            this.rangeEdge.visible = false;
            this.rangeEdge.renderOrder = 2;
            this.scene.add(this.rangeEdge);

            // Ghost tower preview (transparent preview of what will be placed)
            this.ghostPreview = null;
        },

        // ============================
        // INPUT
        // ============================
        _setupInput() {
            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (this.state === 'title') return;

                // Pause toggle
                if (e.code === 'Space' || e.code === 'Escape') {
                    if (this.state === 'playing') this.pause();
                    else if (this.state === 'paused') this.unpause();
                    return;
                }

                // Tower hotkeys (work while paused too)
                if (this.state === 'playing' || this.state === 'paused') {
                    for (const [key, def] of Object.entries(this.TOWERS)) {
                        if (e.code === def.hotkey) {
                            this.selectTower(key);
                            return;
                        }
                    }
                }
            });

            // Mouse move (for grid highlight)
            window.addEventListener('mousemove', (e) => {
                this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // Mouse click (place tower)
            window.addEventListener('click', (e) => {
                if (this.state !== 'playing' && this.state !== 'paused') return;
                if (this.selectedTower) {
                    this._tryPlaceTower(e);
                }
            });

            // Right click to deselect
            window.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                this.selectedTower = null;
                this._updateTowerButtons();
            });
        },

        // ============================
        // UI
        // ============================
        _setupUI() {
            // Start button
            document.getElementById('start-btn').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                this.start();
            });

            // Restart button
            document.getElementById('restart-btn').addEventListener('click', () => {
                document.getElementById('game-over-screen').classList.remove('active');
                this.start();
            });

            // Tower panel buttons
            document.querySelectorAll('.tower-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const towerType = btn.dataset.tower;
                    this.selectTower(towerType);
                });
            });
        },

        selectTower(type) {
            if (this.selectedTower === type) {
                this.selectedTower = null;
            } else {
                this.selectedTower = type;
            }
            this._updateTowerButtons();
        },

        _updateTowerButtons() {
            document.querySelectorAll('.tower-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.tower === this.selectedTower);
            });
        },

        updateHUD() {
            // Door HP display
            if (this.doorGroup) {
                const hp = this.doorGroup.userData.doorHP;
                const max = this.doorGroup.userData.maxDoorHP;
                const pct = Math.max(0, Math.round((hp / max) * 100));
                document.getElementById('door-hp-display').textContent = pct + '%';
                const bar = document.getElementById('door-hp-bar');
                bar.style.width = pct + '%';
                // Color shifts: green → yellow → orange → red
                if (pct > 60) bar.style.background = '#4caf50';
                else if (pct > 40) bar.style.background = '#ff9800';
                else if (pct > 20) bar.style.background = '#ff5722';
                else bar.style.background = '#f44336';
            }
            document.getElementById('coins-display').textContent = this.coins;
            document.getElementById('wave-display').textContent = `WAVE ${this.wave}`;
            document.getElementById('score-display').textContent = this.score;
        },

        announceWave(text) {
            const el = document.getElementById('wave-announce');
            el.textContent = text;
            el.classList.add('visible');
            setTimeout(() => el.classList.remove('visible'), 2000);
        },

        // ============================
        // GAME FLOW
        // ============================
        start() {
            this.state = 'playing';
            this.wave = 0;
            this.coins = CONFIG.startingCoins;

            // Reset door HP and visuals
            if (this.doorGroup) {
                const ud = this.doorGroup.userData;
                ud.doorHP = ud.maxDoorHP;
                // Reset door color
                if (ud.door) {
                    ud.door.material.color.setHex(ud.originalColor);
                    ud.door.material.emissive.setHex(0x000000);
                    ud.door.material.emissiveIntensity = 0;
                    ud.door.visible = true;
                }
                // Hide all cracks
                if (ud.cracks) {
                    ud.cracks.forEach(c => { c.visible = false; });
                }
            }
            this.score = 0;
            this.time = 0;
            this.waveTimer = 0;
            this.waveActive = false;

            // Clear entities
            this.enemies.forEach(e => { if (e.mesh) this.scene.remove(e.mesh); });
            this.towers.forEach(t => { if (t.mesh) this.scene.remove(t.mesh); });
            this.projectiles.forEach(p => { if (p.mesh) this.scene.remove(p.mesh); });
            this.enemies = [];
            this.towers = [];
            this.projectiles = [];

            // Clear floating texts
            this._floatingTexts.forEach(ft => {
                this.scene.remove(ft.sprite);
                ft.sprite.material.map.dispose();
                ft.sprite.material.dispose();
            });
            this._floatingTexts = [];

            // Clear door particles
            this._doorParticles.forEach(p => {
                this.scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
            });
            this._doorParticles = [];
            this._cinematicTimer = 0;

            // Reset fade overlay instantly (no transition)
            const fadeEl = document.getElementById('fade-overlay');
            if (fadeEl) {
                fadeEl.style.transition = 'none';
                fadeEl.classList.remove('active');
                void fadeEl.offsetHeight;
                fadeEl.style.transition = '';
            }

            this.selectedTower = null;
            this._updateTowerButtons();
            this.updateHUD();

            // 8 second build phase before wave 1
            this.waveTimer = 8.0;
            this.announceWave('PLACE TIP JARS [1] FOR INCOME!');

            this.clock.start();
            console.log('Game started — defend the throne!');
        },

        pause() {
            if (this.state !== 'playing') return;
            this.state = 'paused';
            document.getElementById('pause-overlay').classList.add('active');
        },

        unpause() {
            if (this.state !== 'paused') return;
            this.state = 'playing';
            document.getElementById('pause-overlay').classList.remove('active');
        },

        gameOver() {
            this.state = 'gameover';
            const stats = document.getElementById('game-over-stats');
            stats.innerHTML = `Survived to Wave ${this.wave}<br>Score: ${this.score}<br>Enemies repelled: ${this._totalRepelled || 0}`;
            document.getElementById('game-over-screen').classList.add('active');
        },

        // ============================
        // TOWER PLACEMENT
        // ============================
        _getGridPos(screenX, screenY) {
            this.raycaster.setFromCamera(this.mouse, this.camera);
            const intersect = new THREE.Vector3();
            this.raycaster.ray.intersectPlane(this.groundPlane, intersect);
            if (!intersect) return null;

            const gs = CONFIG.grid;
            const gx = Math.round(intersect.x / gs) * gs;
            const gz = Math.round(intersect.z / gs) * gs;

            // Bounds check — must be in buildable area
            const halfW = Math.floor(CONFIG.laneWidth / gs / 2) * gs;
            const minZ = CONFIG.corridorStart + 2;
            const maxZ = CONFIG.laneLength - 4; // leave clearance before exit doors

            if (gx < -halfW || gx > halfW || gz < minZ || gz > maxZ) return null;
            return { x: gx, z: gz };
        },

        _isCellOccupied(gx, gz) {
            const gs = CONFIG.grid;
            return this.towers.some(t =>
                Math.abs(t.gridX - gx) < gs * 0.5 && Math.abs(t.gridZ - gz) < gs * 0.5
            );
        },

        _tryPlaceTower() {
            const pos = this._getGridPos();
            if (!pos) return;
            if (this._isCellOccupied(pos.x, pos.z)) return;

            const def = this.TOWERS[this.selectedTower];
            if (!def) return;
            if (this.coins < def.cost) return;

            this.coins -= def.cost;

            // Create tower mesh
            const tower = this._createTowerMesh(this.selectedTower, def);
            tower.gridX = pos.x;
            tower.gridZ = pos.z;
            tower.mesh.position.set(pos.x, 0, pos.z);
            tower.mesh.castShadow = true;
            this.scene.add(tower.mesh);
            this.towers.push(tower);

            // Placement pop animation — scale from 0 → overshoot → settle
            tower.mesh.scale.set(0, 0, 0);
            const startTime = Date.now();
            const popDuration = 350;
            const animatePop = () => {
                const t = Math.min(1, (Date.now() - startTime) / popDuration);
                // Elastic ease-out
                const s = t < 0.5
                    ? 2 * t * t
                    : 1 - Math.pow(-2 * t + 2, 3) / 2;
                const scale = s * (1 + (1 - t) * 0.3); // overshoot then settle
                tower.mesh.scale.set(scale, scale, scale);
                if (t < 1) requestAnimationFrame(animatePop);
                else tower.mesh.scale.set(1, 1, 1);
            };
            animatePop();

            // Clear ghost so it doesn't linger on the just-placed cell
            this._clearGhost();

            this.updateHUD();
        },

        _destroyTower(index) {
            const t = this.towers[index];
            t.dying = true;

            // Destruction animation — tumble, shrink, fade
            const mesh = t.mesh;
            const startTime = Date.now();
            const duration = 400;
            const tumbleDir = (Math.random() - 0.5) * 2; // random tumble direction

            const animateDeath = () => {
                const elapsed = Date.now() - startTime;
                const p = Math.min(1, elapsed / duration);

                // Tumble over
                mesh.rotation.z = tumbleDir * p * (Math.PI / 2);
                mesh.rotation.x = (1 - Math.abs(tumbleDir)) * p * (Math.PI / 3);

                // Shrink and sink
                const scale = 1 - p * p; // ease-in shrink
                mesh.scale.set(scale, scale, scale);
                mesh.position.y = -p * 0.5;

                // Fade out all materials
                mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.transparent = true;
                        child.material.opacity = Math.max(0, 1 - p * 1.5);
                    }
                });

                if (p < 1) {
                    requestAnimationFrame(animateDeath);
                } else {
                    this.scene.remove(mesh);
                }
            };
            animateDeath();

            // Remove from towers array immediately so it can't be interacted with
            this.towers.splice(index, 1);
        },

        _createTowerMesh(type, def) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({
                color: def.color,
                roughness: 0.5,
                metalness: 0.1,
            });

            if (type === 'tipjar') {
                // Glass jar
                const jar = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.35, 0.45, 0.8, 8),
                    new THREE.MeshStandardMaterial({
                        color: 0xaaddff,
                        roughness: 0.1,
                        metalness: 0.2,
                        transparent: true,
                        opacity: 0.6,
                    })
                );
                jar.position.y = 0.4;
                group.add(jar);
                // Coins inside
                const coins = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.3, 0.3, 0.25, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 })
                );
                coins.position.y = 0.25;
                group.add(coins);
                // Coin on top (bobs in animation)
                const topCoin = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15, 0.15, 0.04, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1, emissive: 0xffa500, emissiveIntensity: 0.2 })
                );
                topCoin.position.y = 0.85;
                topCoin.name = 'topCoin';
                group.add(topCoin);
            } else if (type === 'wetfloor') {
                // Triangle sign shape
                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(0.6, 1.5, 4),
                    mat
                );
                cone.position.y = 0.75;
                group.add(cone);
                // Exclamation mark
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.12, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0x000000 })
                );
                dot.position.set(0, 0.5, 0.45);
                group.add(dot);
            } else if (type === 'mop') {
                // Handle
                const handle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.05, 2.0, 6),
                    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
                );
                handle.position.y = 1.0;
                group.add(handle);
                // Mop head
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.3, 0.8),
                    mat
                );
                head.position.y = 0.15;
                group.add(head);
                // Base
                const base = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.5, 0.3, 8),
                    new THREE.MeshStandardMaterial({ color: 0x555555 })
                );
                base.position.y = 0.15;
                group.add(base);
            } else if (type === 'freshener') {
                // Can body
                const can = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8),
                    mat
                );
                can.position.y = 0.8;
                group.add(can);
                // Nozzle
                const nozzle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.08, 0.15, 0.3, 6),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                nozzle.position.y = 1.5;
                group.add(nozzle);
                // Base platform
                const base = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.5, 0.2, 8),
                    new THREE.MeshStandardMaterial({ color: 0x555555 })
                );
                base.position.y = 0.1;
                group.add(base);
            }

            return {
                type: type,
                mesh: group,
                gridX: 0,
                gridZ: 0,
                def: def,
                hp: def.hp,
                maxHp: def.hp,
                attackTimer: 0,
                hitShake: 0,
                // Tower-specific state
                ...(type === 'mop' && { swingAngle: 0 }),
                ...(type === 'tipjar' && { incomeTimer: def.incomeInterval }),
            };
        },

        // ============================
        // ENEMY SPAWNING
        // ============================
        _startWave() {
            this.wave++;
            this.waveActive = true;
            this.enemiesSpawned = 0;

            // Scale difficulty — wave 1 is a teaching wave
            this.enemiesPerWave = 3 + Math.floor(this.wave * 2);
            this.spawnInterval = Math.max(0.5, 2.5 - this.wave * 0.1);

            this.spawnTimer = 0;
            this.announceWave(`WAVE ${this.wave}`);
            this.updateHUD();
        },

        _spawnEnemy() {
            const spread = CONFIG.spawnWidth;
            const x = (Math.random() - 0.5) * spread;
            const z = CONFIG.spawnZoneZ + Math.random() * 2; // spawn just behind the exit doors

            // Enemy type varies with wave
            let speed = 2.5 + Math.random() * 1.0;
            let hp = 15 + this.wave * 8;
            let size = 1.5;
            let color = 0xe67e22;
            let coins = 6;
            let enemyType = 'polite';

            const roll = Math.random();
            if (this.wave >= 3 && roll < 0.3) {
                // Speed Walker
                enemyType = 'speedwalker';
                speed = 4.5 + Math.random() * 2;
                hp = 12 + this.wave * 5;
                size = 1.2;
                color = 0x3498db;
                coins = 8;
            } else if (this.wave >= 6 && roll < 0.15) {
                // Karen
                enemyType = 'karen';
                speed = 2.5;
                hp = 60 + this.wave * 15;
                size = 1.8;
                color = 0xe74c3c;
                coins = 16;
            } else if (this.wave >= 5 && roll < 0.25) {
                // Coffee Drinker
                enemyType = 'coffee';
                speed = 1.8;
                hp = 45 + this.wave * 12;
                size = 1.6;
                color = 0x795548;
                coins = 12;
            }

            // Create enemy mesh — simple low-poly person
            const group = new THREE.Group();

            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(size * 0.8, size * 1.4, size * 0.5),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 })
            );
            body.position.y = size * 1.2;
            body.castShadow = true;
            group.add(body);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(size * 0.35, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.5 })
            );
            head.position.y = size * 2.1;
            head.castShadow = true;
            group.add(head);

            // Legs (two small boxes)
            const legMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(size * 0.25, size * 0.8, size * 0.25), legMat);
            leftLeg.position.set(-size * 0.15, size * 0.4, 0);
            group.add(leftLeg);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(size * 0.25, size * 0.8, size * 0.25), legMat);
            rightLeg.position.set(size * 0.15, size * 0.4, 0);
            group.add(rightLeg);

            group.position.set(x, 0, z);
            this.scene.add(group);

            const enemy = {
                type: enemyType,
                mesh: group,
                body: body,
                leftLeg: leftLeg,
                rightLeg: rightLeg,
                x: x,
                z: z,
                speed: speed,
                hp: hp,
                maxHp: hp,
                size: size,
                coins: coins,
                slowed: 0,
                walkPhase: Math.random() * Math.PI * 2,
                hitFlash: 0,
                bodyColor: color,
            };

            this.enemies.push(enemy);
            this.enemiesSpawned++;
        },

        // ============================
        // UPDATE LOOP
        // ============================
        update(dt) {
            if (this.state !== 'playing') return;

            this.time += dt;

            // --- Wave management ---
            if (!this.waveActive) {
                this.waveTimer -= dt;
                if (this.waveTimer <= 0) {
                    this._startWave();
                }
            } else {
                // Spawn enemies
                this.spawnTimer -= dt;
                if (this.spawnTimer <= 0 && this.enemiesSpawned < this.enemiesPerWave) {
                    this._spawnEnemy();
                    this.spawnTimer = this.spawnInterval;
                }

                // Wave complete when all enemies spawned and cleared
                if (this.enemiesSpawned >= this.enemiesPerWave && this.enemies.length === 0) {
                    this.waveActive = false;
                    this.waveTimer = this.waveDelay;
                    // Bonus coins for surviving the wave
                    const waveBonus = 15 + this.wave * 5;
                    this.coins += waveBonus;
                    this.updateHUD();
                    this.announceWave(`WAVE ${this.wave} CLEARED  +${waveBonus}`);
                    this._spawnCoinText(0, 30, waveBonus);
                }
            }

            // --- Update enemies ---
            for (let i = this.enemies.length - 1; i >= 0; i--) {
                const e = this.enemies[i];

                // Check slow from Wet Floor Signs
                let slowMult = 1.0;
                if (e.slowed > 0) {
                    e.slowed -= dt;
                } else {
                    // Check proximity to slow towers
                    for (const t of this.towers) {
                        if (t.type !== 'wetfloor') continue;
                        const dx = e.x - t.gridX;
                        const dz = e.z - t.gridZ;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < t.def.range) {
                            slowMult = t.def.slowFactor;
                            break;
                        }
                    }
                }

                // Move toward toilet (skip if bashing the door)
                if (!e.bashing) {
                    const moveSpeed = e.speed * slowMult * dt;
                    e.z -= moveSpeed;

                    // Steer toward toilet x — stronger as enemies approach
                    const distZ = Math.abs(e.z - CONFIG.toiletPos.z);
                    const convergeDist = 40;
                    if (distZ < convergeDist && Math.abs(e.x) > 0.3) {
                        const convergeStrength = 1 - (distZ / convergeDist);
                        const dxToToilet = CONFIG.toiletPos.x - e.x;
                        e.x += dxToToilet * convergeStrength * dt * 0.8;
                    }

                    e.mesh.position.z = e.z;
                    e.mesh.position.x = e.x;

                    // Trample towers — enemies kick/shove past any tower in their path
                    // Each enemy tracks which towers it already hit to avoid multi-damage
                    if (!e.trampledTowers) e.trampledTowers = new Set();
                    const trampleRadius = 0.8 + e.size * 0.3; // bigger enemies = wider trample
                    for (let ti = this.towers.length - 1; ti >= 0; ti--) {
                        const t = this.towers[ti];
                        if (t.dying) continue;
                        // Unique key per tower placement
                        const tKey = t.gridX + ',' + t.gridZ;
                        if (e.trampledTowers.has(tKey)) continue; // already kicked this one
                        const dx = e.x - t.gridX;
                        const dz = e.z - t.gridZ;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < trampleRadius) {
                            e.trampledTowers.add(tKey);
                            t.hp -= 1;
                            t.hitShake = 0.2;
                            if (t.hp <= 0) {
                                this._destroyTower(ti);
                            }
                        }
                    }

                    // Walk animation
                    e.walkPhase += dt * e.speed * 2;
                    const legSwing = Math.sin(e.walkPhase) * 0.3;
                    if (e.leftLeg) e.leftLeg.rotation.x = legSwing;
                    if (e.rightLeg) e.rightLeg.rotation.x = -legSwing;
                    // Slight body bob
                    e.body.position.y = e.size * 1.2 + Math.abs(Math.sin(e.walkPhase)) * 0.05;
                }

                // Hit flash effect
                if (e.hitFlash > 0) {
                    e.hitFlash -= dt;
                    e.body.material.emissive.setHex(0xffffff);
                    e.body.material.emissiveIntensity = Math.max(0, e.hitFlash / 0.15);
                } else {
                    e.body.material.emissive.setHex(0x000000);
                    e.body.material.emissiveIntensity = 0;
                }

                // Reached the door? Start bashing it
                const doorZ = 9; // door position (flush with walls)
                const bashRange = doorZ + 1.5;
                if (e.z <= bashRange && this.doorGroup && this.doorGroup.userData.doorHP > 0) {
                    // Stop at the door
                    e.z = Math.max(e.z, bashRange);
                    e.mesh.position.z = e.z;

                    // Initialize bashing state
                    if (!e.bashing) {
                        e.bashing = true;
                        e.bashTimer = 0.3 + Math.random() * 0.3; // first hit comes fast
                        e.bashCooldown = e.type === 'espresso' ? 0.6 : (e.type === 'boss' ? 1.5 : 1.0);
                    }

                    // Bash animation: lunge forward and back
                    e.bashTimer -= dt;
                    const bashPhase = e.bashTimer / e.bashCooldown;
                    if (bashPhase < 0.15 && bashPhase > 0) {
                        // Lunge forward (toward door)
                        e.mesh.position.z = e.z - (1 - bashPhase / 0.15) * 0.8;
                    } else {
                        e.mesh.position.z = e.z;
                    }

                    // Time to bash!
                    if (e.bashTimer <= 0) {
                        e.bashTimer = e.bashCooldown;

                        const ud = this.doorGroup.userData;
                        const dmg = e.type === 'boss' ? 8 : (e.type === 'coffee' ? 4 : (e.type === 'espresso' ? 1 : 3));
                        ud.doorHP = Math.max(0, ud.doorHP - dmg);

                        // Spawn wood chip particles at impact point
                        this._spawnDoorChips(e.x, doorZ);

                        // Screen shake (subtle)
                        this.camera.position.x += (Math.random() - 0.5) * 0.15;
                        this.camera.position.y += (Math.random() - 0.5) * 0.1;
                        setTimeout(() => {
                            this.camera.position.x = 0;
                            this.camera.position.y = 26;
                        }, 80);

                        // Update crack visibility at thresholds
                        if (ud.cracks) {
                            const pct = ud.doorHP / ud.maxDoorHP;
                            ud.cracks[0].visible = pct <= 0.80;
                            ud.cracks[1].visible = pct <= 0.60;
                            ud.cracks[2].visible = pct <= 0.40;
                            ud.cracks[3].visible = pct <= 0.20;
                            ud.cracks[4].visible = pct <= 0.10;
                        }

                        // Tint door color toward red as HP decreases
                        if (ud.door) {
                            const pct = ud.doorHP / ud.maxDoorHP;
                            const r = Math.min(1.0, 0.55 + (1 - pct) * 0.45);
                            const g = 0.41 * pct;
                            const b = 0.08 * pct;
                            ud.door.material.color.setRGB(r, g, b);
                            ud.door.material.emissive.setHex(0xff0000);
                            ud.door.material.emissiveIntensity = (1 - pct) * 0.3;
                        }

                        this.updateHUD();

                        // Door broken — cinematic shatter sequence!
                        if (ud.doorHP <= 0) {
                            this._startDoorShatter(doorZ);
                            return;
                        }
                    }

                    // Bashing enemies can still be killed — skip movement but don't skip death check
                }

                // Dead?
                if (e.hp <= 0) {
                    this.score += 10;
                    this.coins += e.coins;
                    this._totalRepelled = (this._totalRepelled || 0) + 1;
                    this._spawnCoinText(e.x, e.z, e.coins);

                    // Coffee Drinker splits on death
                    if (e.type === 'coffee') {
                        for (let s = 0; s < 2; s++) {
                            const miniGroup = new THREE.Group();
                            const miniBody = new THREE.Mesh(
                                new THREE.BoxGeometry(0.25, 0.4, 0.2),
                                new THREE.MeshStandardMaterial({ color: 0x4fc3f7 })
                            );
                            miniBody.position.y = 0.3;
                            miniGroup.add(miniBody);
                            const miniHead = new THREE.Mesh(
                                new THREE.SphereGeometry(0.12, 6, 6),
                                new THREE.MeshStandardMaterial({ color: 0xffccaa })
                            );
                            miniHead.position.y = 0.6;
                            miniGroup.add(miniHead);
                            miniGroup.position.set(e.x + (s === 0 ? -0.5 : 0.5), 0, e.z);
                            this.scene.add(miniGroup);
                            this.enemies.push({
                                type: 'espresso',
                                mesh: miniGroup,
                                body: miniBody,
                                leftLeg: null,
                                rightLeg: null,
                                x: e.x + (s === 0 ? -0.5 : 0.5),
                                z: e.z,
                                speed: 7,
                                hp: 10,
                                maxHp: 10,
                                size: 0.3,
                                coins: 1,
                                slowed: 0,
                                walkPhase: Math.random() * Math.PI * 2,
                                hitFlash: 0,
                                bodyColor: 0x4fc3f7,
                            });
                        }
                    }

                    this.scene.remove(e.mesh);
                    this.enemies.splice(i, 1);
                    this.updateHUD();
                    continue;
                }
            }

            // --- Update towers (attack + damage feedback) ---
            for (const t of this.towers) {
                // Hit shake animation
                if (t.hitShake > 0) {
                    t.hitShake -= dt;
                    const shakeIntensity = t.hitShake / 0.2;
                    t.mesh.position.x = t.gridX + (Math.random() - 0.5) * 0.15 * shakeIntensity;
                    t.mesh.position.z = t.gridZ + (Math.random() - 0.5) * 0.15 * shakeIntensity;
                } else {
                    t.mesh.position.x = t.gridX;
                    t.mesh.position.z = t.gridZ;
                }

                // Damage tint — flash red on hit, tint toward red as HP decreases
                if (t.hitShake > 0.1) {
                    // Immediate hit flash
                    t.mesh.traverse(child => {
                        if (child.isMesh) {
                            child.material.emissive = child.material.emissive || new THREE.Color();
                            child.material.emissive.setHex(0xff4444);
                            child.material.emissiveIntensity = 0.4;
                        }
                    });
                } else if (t.hp < t.maxHp) {
                    // Persistent damage tint
                    const dmgPct = 1 - t.hp / t.maxHp;
                    t.mesh.traverse(child => {
                        if (child.isMesh) {
                            child.material.emissive = child.material.emissive || new THREE.Color();
                            child.material.emissive.setHex(0xff0000);
                            child.material.emissiveIntensity = dmgPct * 0.2;
                        }
                    });
                }

                // Tip Jar — passive income
                if (t.type === 'tipjar') {
                    t.incomeTimer -= dt;
                    if (t.incomeTimer <= 0) {
                        t.incomeTimer = t.def.incomeInterval;
                        this.coins += t.def.incomeAmount;
                        this.updateHUD();
                        this._spawnCoinText(t.mesh.position.x, t.mesh.position.z, t.def.incomeAmount);
                        // Pulse the top coin as feedback
                        const topCoin = t.mesh.getObjectByName('topCoin');
                        if (topCoin) topCoin.scale.set(1.5, 1.5, 1.5);
                    }
                    // Animate top coin bob + scale decay
                    const topCoin = t.mesh.getObjectByName('topCoin');
                    if (topCoin) {
                        topCoin.position.y = 0.85 + Math.sin(this.time * 3 + t.gridX) * 0.05;
                        topCoin.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                    }
                    continue;
                }

                if (t.type === 'wetfloor') continue; // passive, no attack

                t.attackTimer -= dt;
                if (t.attackTimer > 0) continue;

                // Find nearest enemy in range
                let nearest = null;
                let nearestDist = Infinity;
                for (const e of this.enemies) {
                    const dx = e.x - t.gridX;
                    const dz = e.z - t.gridZ;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < t.def.range && dist < nearestDist) {
                        nearest = e;
                        nearestDist = dist;
                    }
                }

                if (!nearest) continue;

                t.attackTimer = t.def.attackRate;

                if (t.type === 'mop') {
                    // Melee attack — direct damage + knockback
                    nearest.hp -= t.def.damage;
                    nearest.hitFlash = 0.15;
                    nearest.z += t.def.knockback;
                    nearest.mesh.position.z = nearest.z;
                    // Animate mop swing
                    t.swingAngle = 1.0;
                } else if (t.type === 'freshener') {
                    // Ranged — spawn projectile
                    this._fireProjectile(t, nearest);
                }
            }

            // --- Animate mop swing ---
            for (const t of this.towers) {
                if (t.type !== 'mop' || !t.swingAngle) continue;
                t.swingAngle *= 0.85;
                if (t.swingAngle < 0.01) t.swingAngle = 0;
                t.mesh.rotation.y = Math.sin(this.time * 20) * t.swingAngle * 0.5;
            }

            // --- Update projectiles ---
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const p = this.projectiles[i];
                p.x += p.vx * dt;
                p.z += p.vz * dt;
                p.mesh.position.set(p.x, 0.8, p.z);
                p.life -= dt;

                if (p.life <= 0) {
                    this.scene.remove(p.mesh);
                    this.projectiles.splice(i, 1);
                    continue;
                }

                // Hit detection
                for (const e of this.enemies) {
                    const dx = e.x - p.x;
                    const dz = e.z - p.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < e.size + 0.3) {
                        e.hp -= p.damage;
                        e.hitFlash = 0.15;
                        this.scene.remove(p.mesh);
                        this.projectiles.splice(i, 1);
                        break;
                    }
                }
            }

            // --- Exit door spring physics ---
            if (this.officeGroup && this.officeGroup.userData.exitDoors) {
                const doors = this.officeGroup.userData.exitDoors;
                const { springK, dampK, pushImpulse, maxAngle, minAngle, doorZ, halfWidth } = doors;

                // Check each enemy for door push (one impulse per enemy)
                for (const e of this.enemies) {
                    if (e.pushedExitDoor) continue;
                    // Enemy crossing the door threshold (within 1 unit of doorZ)
                    if (e.z < doorZ + 1 && e.z > doorZ - 2) {
                        // Check if enemy is within the doorway width
                        if (Math.abs(e.x) < halfWidth) {
                            e.pushedExitDoor = true;
                            // Push based on enemy speed — faster = harder slam
                            const force = pushImpulse * (e.speed / 3);
                            // Push the door on the enemy's side (or both if near center)
                            if (e.x <= 1) doors.leftAngVel += force;
                            if (e.x >= -1) doors.rightAngVel += force;
                        }
                    }
                }

                // Spring physics for left door
                // Positive angle = swung open inward (toward playing field)
                doors.leftAngVel += (-springK * doors.leftAngle - dampK * doors.leftAngVel) * dt;
                doors.leftAngle += doors.leftAngVel * dt;
                doors.leftAngle = Math.max(minAngle, Math.min(maxAngle, doors.leftAngle));
                // Left door: positive rotation.y swings free edge toward -z (into the room)
                doors.leftPivot.rotation.y = doors.leftAngle;

                // Spring physics for right door
                doors.rightAngVel += (-springK * doors.rightAngle - dampK * doors.rightAngVel) * dt;
                doors.rightAngle += doors.rightAngVel * dt;
                doors.rightAngle = Math.max(minAngle, Math.min(maxAngle, doors.rightAngle));
                // Right door: negative rotation.y swings free edge toward -z (into the room)
                doors.rightPivot.rotation.y = -doors.rightAngle;
            }
        },

        _fireProjectile(tower, target) {
            const dx = target.x - tower.gridX;
            const dz = target.z - tower.gridZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            const speed = 20;

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0x00ff88 })
            );
            mesh.position.set(tower.gridX, 0.8, tower.gridZ);
            this.scene.add(mesh);

            this.projectiles.push({
                mesh: mesh,
                x: tower.gridX,
                z: tower.gridZ,
                vx: (dx / dist) * speed,
                vz: (dz / dist) * speed,
                damage: tower.def.damage,
                life: 2.0,
            });
        },

        // ============================
        // GRID HOVER
        // ============================
        _updateGridHover() {
            const active = this.selectedTower && (this.state === 'playing' || this.state === 'paused');

            // Show/hide grid lines based on whether we're placing
            if (this._buildGrid) this._buildGrid.visible = !!active;

            if (!active) {
                this.gridHighlight.visible = false;
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
                this._clearGhost();
                return;
            }

            const pos = this._getGridPos();
            if (!pos) {
                this.gridHighlight.visible = false;
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
                this._clearGhost();
                return;
            }

            // Pulse animation for highlight
            const pulse = 0.85 + Math.sin(Date.now() * 0.006) * 0.15;

            this.gridHighlight.position.set(pos.x, 0.05, pos.z);
            this.gridHighlight.scale.set(pulse, pulse, pulse);
            this.gridHighlight.visible = true;

            // Color: green if can place, red if occupied or can't afford
            const def = this.TOWERS[this.selectedTower];
            const canPlace = !this._isCellOccupied(pos.x, pos.z) && this.coins >= def.cost;
            const hoverColor = canPlace ? 0x00ff00 : 0xff4444;
            this.gridHighlight.material.color.setHex(hoverColor);
            this.gridHighlight.material.opacity = canPlace ? 0.4 : 0.25;

            // Range circle (hide for towers with no range like Tip Jar)
            const range = def.range;
            if (range > 0) {
                this.rangeCircle.scale.set(range, range, range);
                this.rangeCircle.position.set(pos.x, 0.04, pos.z);
                this.rangeCircle.material.color.setHex(hoverColor);
                this.rangeCircle.visible = true;

                this.rangeEdge.scale.set(range, range, range);
                this.rangeEdge.position.set(pos.x, 0.045, pos.z);
                this.rangeEdge.material.color.setHex(hoverColor);
                this.rangeEdge.visible = true;
            } else {
                this.rangeCircle.visible = false;
                this.rangeEdge.visible = false;
            }

            // Ghost tower preview
            this._updateGhost(pos, canPlace);
        },

        _updateGhost(pos, canPlace) {
            const def = this.TOWERS[this.selectedTower];
            // Recreate ghost if tower type changed
            if (this._ghostType !== this.selectedTower) {
                this._clearGhost();
                const ghost = this._createTowerMesh(this.selectedTower, def);
                this.ghostPreview = ghost.mesh;
                this.ghostPreview.traverse(child => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.material.transparent = true;
                        child.material.opacity = 0.4;
                        child.material.depthWrite = false;
                    }
                });
                this.scene.add(this.ghostPreview);
                this._ghostType = this.selectedTower;
            }
            if (this.ghostPreview) {
                const bob = Math.sin(Date.now() * 0.004) * 0.1;
                this.ghostPreview.position.set(pos.x, bob, pos.z);
                this.ghostPreview.visible = true;
                // Tint ghost red/green
                this.ghostPreview.traverse(child => {
                    if (child.isMesh) {
                        child.material.opacity = canPlace ? 0.45 : 0.2;
                    }
                });
            }
        },

        _clearGhost() {
            if (this.ghostPreview) {
                this.scene.remove(this.ghostPreview);
                this.ghostPreview = null;
                this._ghostType = null;
            }
        },

        // ============================
        // FLOATING COIN TEXT
        // ============================
        _spawnCoinText(x, z, amount) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 40px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const text = `+${amount}`;
            // Black outline
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.strokeText(text, 64, 32);
            // Gold fill
            ctx.fillStyle = '#ffd700';
            ctx.fillText(text, 64, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, 3, z);
            sprite.scale.set(2.5, 1.25, 1);
            this.scene.add(sprite);

            this._floatingTexts.push({ sprite, life: 1.2 });
        },

        // ============================
        // DOOR BASH PARTICLES
        // ============================
        _spawnDoorChips(x, z) {
            const chipCount = 8 + Math.floor(Math.random() * 6);
            const chipColors = [0x8B6914, 0x7A5C10, 0x9B7924, 0xA08030, 0x6B4E0C, 0xB8942A];

            for (let i = 0; i < chipCount; i++) {
                const size = 0.08 + Math.random() * 0.15;
                const geo = Math.random() > 0.5
                    ? new THREE.BoxGeometry(size, size * 0.5, size * 0.3)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                const mat = new THREE.MeshStandardMaterial({
                    color: chipColors[Math.floor(Math.random() * chipColors.length)],
                    roughness: 0.7,
                    metalness: 0.05,
                });
                const chip = new THREE.Mesh(geo, mat);
                chip.position.set(
                    x + (Math.random() - 0.5) * 2,
                    1.5 + Math.random() * 3,
                    z
                );
                chip.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                chip.castShadow = true;
                this.scene.add(chip);

                this._doorParticles.push({
                    mesh: chip,
                    vx: (Math.random() - 0.5) * 6,
                    vy: 3 + Math.random() * 5,
                    vz: -(2 + Math.random() * 4), // fly toward camera
                    rotSpeed: (Math.random() - 0.5) * 12,
                    life: 0.8 + Math.random() * 0.6,
                    maxLife: 0.8 + Math.random() * 0.6,
                    gravity: 12 + Math.random() * 4,
                });
            }
        },

        // ============================
        // DOOR SHATTER CINEMATIC
        // ============================
        _startDoorShatter(doorZ) {
            this.state = 'cinematic';
            this._cinematicTimer = 0;

            // Hide the intact door panel and cracks
            const ud = this.doorGroup.userData;
            if (ud.door) ud.door.visible = false;
            if (ud.cracks) ud.cracks.forEach(c => c.visible = false);

            // === MASSIVE DOOR EXPLOSION — 50 shards blasting forward ===
            const shardCount = 50;
            const woodColors = [0x8B6914, 0x7A5C10, 0x9B7924, 0xA08030, 0x6B4E0C, 0xB8942A];

            for (let i = 0; i < shardCount; i++) {
                const size = 0.15 + Math.random() * 0.5;
                const isPlank = Math.random() > 0.35;
                const geo = isPlank
                    ? new THREE.BoxGeometry(size * 2, size * 0.5, size * 0.15)
                    : new THREE.TetrahedronGeometry(size * 0.6, 0);
                // Last 5 shards are chrome handle bits
                const isChrome = i >= shardCount - 5;
                const mat = new THREE.MeshStandardMaterial({
                    color: isChrome ? 0xcccccc : woodColors[Math.floor(Math.random() * woodColors.length)],
                    roughness: isChrome ? 0.1 : 0.7,
                    metalness: isChrome ? 0.9 : 0.05,
                });
                const shard = new THREE.Mesh(geo, mat);
                shard.position.set(
                    (Math.random() - 0.5) * 5,
                    0.3 + Math.random() * 3.5,
                    doorZ
                );
                shard.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                shard.castShadow = true;
                this.scene.add(shard);

                this._doorParticles.push({
                    mesh: shard,
                    vx: (Math.random() - 0.5) * 10,
                    vy: 1 + Math.random() * 8,
                    vz: -(5 + Math.random() * 12),
                    rotSpeed: (Math.random() - 0.5) * 18,
                    life: 2.5 + Math.random() * 1.5,
                    maxLife: 2.5 + Math.random() * 1.5,
                    gravity: 10 + Math.random() * 6,
                });
            }

            // Mark all enemies as rushing the toilet
            for (const e of this.enemies) {
                e.bashing = false;
                e.rushing = true;
                e.rushSpeed = (e.speed || 3) * 3.5;
            }
        },

        _updateCinematic(dt) {
            this._cinematicTimer += dt;

            // Screen shake (decaying over 0.6s)
            if (this._cinematicTimer < 0.6) {
                const intensity = 0.5 * (1 - this._cinematicTimer / 0.6);
                this.camera.position.x = CONFIG.cameraPos.x + (Math.random() - 0.5) * intensity;
                this.camera.position.y = CONFIG.cameraPos.y + (Math.random() - 0.5) * intensity * 0.5;
            } else if (this._cinematicTimer < 0.65) {
                this.camera.position.x = CONFIG.cameraPos.x;
                this.camera.position.y = CONFIG.cameraPos.y;
            }

            // Move all rushing enemies toward the toilet
            const tx = CONFIG.toiletPos.x;
            const tz = CONFIG.toiletPos.z;
            for (const e of this.enemies) {
                if (!e.rushing || !e.mesh) continue;
                const dx = tx - e.x;
                const dz = tz - e.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist > 1.0) {
                    const speed = e.rushSpeed * dt;
                    e.x += (dx / dist) * speed;
                    e.z += (dz / dist) * speed;
                    e.mesh.position.x = e.x;
                    e.mesh.position.z = e.z;
                }
            }

            // Fade to black starting at 1.2s
            if (this._cinematicTimer >= 1.2) {
                const fadeEl = document.getElementById('fade-overlay');
                if (!fadeEl.classList.contains('active')) {
                    fadeEl.classList.add('active');
                }
            }

            // Game over after fade completes
            if (this._cinematicTimer >= 3.0) {
                this.gameOver();
            }
        },

        // ============================
        // RENDER LOOP
        // ============================
        _animate() {
            requestAnimationFrame(() => this._animate());

            const dt = Math.min(this.clock.getDelta(), 0.05); // Cap dt

            // Always update toilet glow
            updateToilet(this.toilet, this.clock.elapsedTime);

            // Update grid hover
            this._updateGridHover();

            // Update floating texts
            for (let i = this._floatingTexts.length - 1; i >= 0; i--) {
                const ft = this._floatingTexts[i];
                ft.life -= dt;
                ft.sprite.position.y += 2.5 * dt;
                ft.sprite.material.opacity = Math.max(0, ft.life / 0.5);
                if (ft.life <= 0) {
                    this.scene.remove(ft.sprite);
                    ft.sprite.material.map.dispose();
                    ft.sprite.material.dispose();
                    this._floatingTexts.splice(i, 1);
                }
            }

            // Update door particles (wood chips flying)
            for (let i = this._doorParticles.length - 1; i >= 0; i--) {
                const p = this._doorParticles[i];
                p.life -= dt;
                p.vy -= p.gravity * dt;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.mesh.rotation.x += p.rotSpeed * dt;
                p.mesh.rotation.z += p.rotSpeed * 0.7 * dt;
                // Fade out in last 30% of life
                const fade = Math.min(1, p.life / (p.maxLife * 0.3));
                p.mesh.material.opacity = fade;
                p.mesh.material.transparent = true;
                // Scale down as dying
                const s = Math.max(0.1, fade);
                p.mesh.scale.set(s, s, s);
                if (p.life <= 0 || p.mesh.position.y < -1) {
                    this.scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    this._doorParticles.splice(i, 1);
                }
            }

            // Game logic
            this.update(dt);

            // Cinematic sequence (door shatter)
            if (this.state === 'cinematic') {
                this._updateCinematic(dt);
            }

            // Render
            this.renderer.render(this.scene, this.camera);
        },
    };
    </script>

    <script type="module" src="js/main.js"></script>
