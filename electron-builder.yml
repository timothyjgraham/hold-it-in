appId: com.holditin.game
productName: Hold It In
directories:
  output: release
files:
  - dist/**/*
  - electron-main.js
  - electron-preload.js
mac:
  category: public.app-category.games
  target:
    - target: dmg
      arch:
        - universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
win:
  target:
    - target: nsis
      arch:
        - x64
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Game
