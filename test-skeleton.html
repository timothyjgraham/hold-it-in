<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2 Mesh Construction Test — Skeletal Animation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: monospace; color: #ccc; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 12px 16px;
            border-radius: 6px; font-size: 13px; line-height: 1.6;
            max-width: 380px; z-index: 10;
        }
        #info h2 { color: #ffd700; margin-bottom: 6px; font-size: 15px; }
        #info .ok { color: #2ecc71; }
        #info .fail { color: #e74c3c; }
        #info .label { color: #f39c12; }
        #info .sub { color: #888; font-size: 11px; }
        #controls {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px 14px;
            border-radius: 6px; font-size: 12px; z-index: 10;
        }
        #controls button {
            background: #333; color: #ccc; border: 1px solid #555;
            padding: 4px 10px; margin: 2px; border-radius: 3px; cursor: pointer;
            font-family: monospace;
        }
        #controls button:hover { background: #555; }
        #controls button.active { background: #f39c12; color: #000; }
        #labels {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .type-label {
            position: absolute; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 3px 8px;
            border-radius: 3px; font-size: 11px; white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Phase 2: Mesh Construction Test</h2>
        <div id="status">Loading modules...</div>
    </div>
    <div id="controls">
        <div style="margin-bottom: 6px; color: #f39c12;">Validation Controls:</div>
        <button id="btnBoneRotate">Rotate Spine Bone</button>
        <button id="btnHitFlash">Hit Flash</button>
        <button id="btnDesperate">Desperate Tint</button>
        <button id="btnSkeletonHelper">Toggle Helpers</button>
    </div>
    <div id="labels"></div>

    <script type="module">
        import { ENEMY_VISUAL_CONFIG } from './js/data/enemyConfig.js';
        import { createEnemyModel } from './js/models/EnemyModelFactory.js';
        import { createEnemyMaterials } from './js/models/EnemyMaterials.js';

        // ── Scene setup ──
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 5, 14);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ── Lighting (match game lighting) ──
        scene.add(new THREE.AmbientLight(0x505060, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(10, 30, 20);
        scene.add(dirLight);

        // Spot light from upper-left (match game bathroom)
        const spotLight = new THREE.SpotLight(0xffeedd, 0.6, 50, Math.PI / 6);
        spotLight.position.set(-5, 12, 3);
        scene.add(spotLight);

        // Ground grid for reference
        const grid = new THREE.GridHelper(30, 30, 0x333366, 0x222244);
        scene.add(grid);

        // ── Spawn one of each enemy type as fully skinned meshes ──
        const types = ['polite', 'dancer', 'waddle', 'panicker', 'powerwalker', 'girls'];
        const spacing = 5;
        const startX = -(types.length - 1) * spacing / 2;
        const models = [];
        const helpers = [];
        const statusLines = [];

        types.forEach((type, i) => {
            const config = ENEMY_VISUAL_CONFIG[type];
            try {
                const model = createEnemyModel(type, config.materialColors.body, false, config.size);

                // Position on the grid
                model.group.position.x = startX + i * spacing;
                scene.add(model.group);

                // SkeletonHelper overlay (toggleable)
                const helper = new THREE.SkeletonHelper(model.skinnedMesh);
                helper.material.linewidth = 2;
                helper.visible = false;
                scene.add(helper);
                helpers.push(helper);

                models.push({ type, model, x: startX + i * spacing });

                const boneCount = model.skeleton.bones.length;
                const vertCount = model.skinnedMesh.geometry.attributes.position.count;
                statusLines.push(
                    `<span class="label">${type}</span>: ${boneCount} bones, ${vertCount} verts <span class="ok">OK</span>`
                );
            } catch (e) {
                console.error(`Failed to create ${type}:`, e);
                statusLines.push(
                    `<span class="label">${type}</span>: <span class="fail">FAIL</span> — ${e.message}`
                );
            }
        });

        // ── Also spawn a desperate version of Polite Knocker for comparison ──
        try {
            const despModel = createEnemyModel('polite', 0xd4a574, true, 1.5);
            despModel.group.position.x = startX + types.length * spacing;
            scene.add(despModel.group);
            models.push({ type: 'polite (desperate)', model: despModel, x: startX + types.length * spacing });
            statusLines.push('<span class="label">desperate tint</span>: <span class="ok">OK</span>');
        } catch (e) {
            console.error('Failed desperate model:', e);
            statusLines.push(`<span class="label">desperate tint</span>: <span class="fail">FAIL</span>`);
        }

        // ── Test hit flash uniform ──
        let hitFlashTestOk = false;
        try {
            if (models.length > 0) {
                const mat = models[0].model.skinnedMesh.material;
                const mats = Array.isArray(mat) ? mat : [mat];
                mats[0].uniforms.uHitFlash.value = 0.0; // confirm uniform exists
                hitFlashTestOk = true;
            }
            statusLines.push(`<span class="label">hit flash uniform</span>: ${hitFlashTestOk ? '<span class="ok">OK</span>' : '<span class="fail">FAIL</span>'}`);
        } catch (e) {
            statusLines.push(`<span class="label">hit flash uniform</span>: <span class="fail">FAIL</span>`);
        }

        // ── Test outline follows skeleton ──
        let outlineTestOk = false;
        try {
            if (models.length > 0) {
                const om = models[0].model.outlineMesh;
                outlineTestOk = om && om.isSkinnedMesh && om.skeleton === models[0].model.skeleton;
            }
            statusLines.push(`<span class="label">outline skinning</span>: ${outlineTestOk ? '<span class="ok">OK</span>' : '<span class="fail">FAIL</span>'}`);
        } catch (e) {
            statusLines.push(`<span class="label">outline skinning</span>: <span class="fail">FAIL</span>`);
        }

        // ── Test skin weights exist ──
        let skinWeightTestOk = false;
        try {
            if (models.length > 0) {
                const geo = models[0].model.skinnedMesh.geometry;
                skinWeightTestOk = !!(geo.getAttribute('skinIndex') && geo.getAttribute('skinWeight'));
            }
            statusLines.push(`<span class="label">skin weights</span>: ${skinWeightTestOk ? '<span class="ok">OK</span>' : '<span class="fail">FAIL</span>'}`);
        } catch (e) {
            statusLines.push(`<span class="label">skin weights</span>: <span class="fail">FAIL</span>`);
        }

        statusLines.push('<br><span class="sub">Use controls below to test bone deformation and effects</span>');
        document.getElementById('status').innerHTML = statusLines.join('<br>');

        // ── Validation control buttons ──
        let boneRotating = false;
        let hitFlashActive = false;
        let desperateActive = false;
        let helpersVisible = false;

        document.getElementById('btnBoneRotate').addEventListener('click', function() {
            boneRotating = !boneRotating;
            this.classList.toggle('active', boneRotating);
        });

        document.getElementById('btnHitFlash').addEventListener('click', function() {
            hitFlashActive = !hitFlashActive;
            this.classList.toggle('active', hitFlashActive);
            models.forEach(({ model }) => {
                const mats = Array.isArray(model.skinnedMesh.material)
                    ? model.skinnedMesh.material
                    : [model.skinnedMesh.material];
                mats.forEach(m => {
                    if (m.uniforms && m.uniforms.uHitFlash) {
                        m.uniforms.uHitFlash.value = hitFlashActive ? 1.0 : 0.0;
                    }
                });
            });
        });

        document.getElementById('btnDesperate').addEventListener('click', function() {
            desperateActive = !desperateActive;
            this.classList.toggle('active', desperateActive);
            models.forEach(({ model }) => {
                const mats = Array.isArray(model.skinnedMesh.material)
                    ? model.skinnedMesh.material
                    : [model.skinnedMesh.material];
                mats.forEach(m => {
                    if (m.uniforms && m.uniforms.uDesperateTint) {
                        m.uniforms.uDesperateTint.value = desperateActive ? 1.0 : 0.0;
                    }
                });
            });
        });

        document.getElementById('btnSkeletonHelper').addEventListener('click', function() {
            helpersVisible = !helpersVisible;
            this.classList.toggle('active', helpersVisible);
            helpers.forEach(h => { h.visible = helpersVisible; });
        });

        // ── Type labels (HTML overlay) ──
        const labelsContainer = document.getElementById('labels');
        function updateLabels() {
            labelsContainer.innerHTML = '';
            const tempVec = new THREE.Vector3();

            models.forEach(({ type, model, x }) => {
                const config = ENEMY_VISUAL_CONFIG[type.replace(' (desperate)', '')] || ENEMY_VISUAL_CONFIG['polite'];
                tempVec.set(x, config.size * 2.8, 0);
                tempVec.project(camera);

                const screenX = (tempVec.x * 0.5 + 0.5) * window.innerWidth;
                const screenY = (-tempVec.y * 0.5 + 0.5) * window.innerHeight;

                if (tempVec.z < 1) {
                    const label = document.createElement('div');
                    label.className = 'type-label';
                    label.style.left = screenX + 'px';
                    label.style.top = (screenY - 20) + 'px';
                    label.style.color = '#' + new THREE.Color(config.materialColors.body).getHexString();
                    label.textContent = type;
                    labelsContainer.appendChild(label);
                }
            });
        }

        // ── Simple orbit controls (mouse drag) ──
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let orbit = { theta: 0, phi: 0.35, radius: 16 };
        const target = new THREE.Vector3(2, 2.5, 0);

        function updateCamera() {
            camera.position.x = target.x + orbit.radius * Math.sin(orbit.theta) * Math.cos(orbit.phi);
            camera.position.y = target.y + orbit.radius * Math.sin(orbit.phi);
            camera.position.z = target.z + orbit.radius * Math.cos(orbit.theta) * Math.cos(orbit.phi);
            camera.lookAt(target);
        }
        updateCamera();

        renderer.domElement.addEventListener('mousedown', e => {
            isDragging = true;
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            orbit.theta -= dx * 0.005;
            orbit.phi = Math.max(0.1, Math.min(1.4, orbit.phi + dy * 0.005));
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
            updateCamera();
        });
        renderer.domElement.addEventListener('wheel', e => {
            orbit.radius = Math.max(5, Math.min(40, orbit.radius + e.deltaY * 0.02));
            updateCamera();
        });

        // ── Resize handler ──
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── Render loop ──
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const elapsed = clock.elapsedTime;

            // Bone rotation validation — rotate spine bone on all models
            if (boneRotating) {
                models.forEach(({ model }) => {
                    const spine = model.boneMap.spine;
                    if (spine) {
                        spine.rotation.x = Math.sin(elapsed * 2) * 0.3;
                        spine.rotation.z = Math.sin(elapsed * 1.5) * 0.15;
                    }
                    // Also rotate upper legs to show leg deformation
                    const ulL = model.boneMap.upperLeg_L;
                    const ulR = model.boneMap.upperLeg_R;
                    if (ulL) ulL.rotation.x = Math.sin(elapsed * 3) * 0.5;
                    if (ulR) ulR.rotation.x = Math.sin(elapsed * 3 + Math.PI) * 0.5;
                });
            }

            renderer.render(scene, camera);
            updateLabels();
        }
        animate();

        console.log('Phase 2 Mesh Construction Test — all modules loaded');
    </script>
</body>
</html>
