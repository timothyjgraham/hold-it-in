<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hold It In — Small Capsule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Russo+One&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="462" height="174"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 462, H = 174;

const PAL = {
  ink: '#1a1a2e', charcoal: '#2d2b3d', cream: '#fff4d9', white: '#faf5ef',
  tileLight: '#ddd2c0', tileDark: '#c4b8a5',
  hoodie: '#4a86c8', skin: '#ffccaa', pants: '#3a3a4a',
  polite: '#d4a574', dancer: '#59c3e8', waddle: '#8b5e3c', panicker: '#f5c842',
  power: '#20b89a', girls: '#e84888',
  gold: '#ffd93d', glow: '#fff0c0', holyGold: '#ffd080',
};

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath(); ctx.fill(); if (ctx.lineWidth > 0.5) ctx.stroke();
}

// Small capsule: Focus on LOGO readability. Simpler composition.

// Background: dark tile with warm center
const ts = 20;
for (let y = 0; y < H; y += ts) {
  for (let x = 0; x < W; x += ts) {
    ctx.fillStyle = ((x/ts|0)+(y/ts|0))%2===0 ? PAL.tileLight : PAL.tileDark;
    ctx.fillRect(x, y, ts, ts);
  }
}

// Darken
const grad = ctx.createRadialGradient(W*0.35, H*0.5, 30, W*0.5, H*0.5, W*0.55);
grad.addColorStop(0, 'rgba(255,240,192,0.08)');
grad.addColorStop(0.5, 'rgba(26,26,46,0.3)');
grad.addColorStop(1, 'rgba(26,26,46,0.65)');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

// Mini toilet silhouette on the left
function miniToilet(cx, cy, s) {
  ctx.save(); ctx.translate(cx, cy);
  const ol = PAL.ink, lw = 2;
  ctx.fillStyle = 'rgba(26,26,46,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 18*s, 14*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.white; ctx.strokeStyle = ol; ctx.lineWidth = lw;
  roundRect(-12*s, -30*s, 24*s, 22*s, 3*s); // tank
  ctx.beginPath(); ctx.ellipse(0, -2*s, 13*s, 16*s, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // bowl
  ctx.fillStyle = '#b8c8d8'; ctx.beginPath(); ctx.ellipse(0, -1*s, 8*s, 10*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = PAL.white; ctx.lineWidth = 4*s;
  ctx.beginPath(); ctx.ellipse(0, -2*s, 11*s, 14*s, 0, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = ol; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, -2*s, 12.5*s, 15.5*s, 0, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = PAL.gold; ctx.strokeStyle = ol; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(14*s, -24*s, 2.5*s, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  roundRect(-10*s, 12*s, 20*s, 7*s, 3*s);
  ctx.restore();
}

// Holy glow
const glow = ctx.createRadialGradient(80, 85, 5, 80, 85, 80);
glow.addColorStop(0, 'rgba(255,240,192,0.2)');
glow.addColorStop(1, 'rgba(255,208,128,0)');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, 200, H);

miniToilet(80, 90, 1.5);

// Gold sparkles
function sparkle(x, y, s) {
  ctx.save(); ctx.globalAlpha = 0.6 + Math.random()*0.4;
  ctx.fillStyle = PAL.gold;
  ctx.beginPath();
  ctx.moveTo(x, y-s); ctx.lineTo(x+s*0.25, y); ctx.lineTo(x, y+s); ctx.lineTo(x-s*0.25, y);
  ctx.closePath(); ctx.fill(); ctx.restore();
}
[[55,50,3],[95,45,2.5],[110,60,2],[60,110,2.5],[100,120,2],[70,70,3.5],[90,95,2]].forEach(([x,y,s])=>sparkle(x,y,s));

// A few small enemies on the right
function tinyEnemy(cx, cy, s, c) {
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = PAL.pants; ctx.strokeStyle = PAL.ink; ctx.lineWidth = 1.2;
  roundRect(-3*s, 7*s, 6*s, 10*s, 1.5*s);
  ctx.fillStyle = c;
  roundRect(-7*s, -8*s, 14*s, 16*s, 2.5*s);
  ctx.fillStyle = PAL.skin;
  ctx.beginPath(); ctx.arc(0, -14*s, 5.5*s, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-2*s, -14.5*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.5*s, -14.5*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.ink;
  ctx.beginPath(); ctx.arc(-1.5*s, -14*s, 1*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3*s, -14*s, 1*s, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

tinyEnemy(385, 110, 0.9, PAL.panicker);
tinyEnemy(410, 125, 0.85, PAL.waddle);
tinyEnemy(430, 100, 0.75, PAL.girls);
tinyEnemy(365, 130, 0.8, PAL.dancer);
tinyEnemy(400, 80, 0.65, PAL.polite);
tinyEnemy(440, 140, 0.7, PAL.power);

// Title — must be VERY readable at small sizes
ctx.save();
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
const titleX = W * 0.5, titleY = H * 0.42;

ctx.font = 'bold 44px "Russo One", "Arial Black", "Impact", sans-serif';
// Shadow
ctx.fillStyle = 'rgba(26,26,46,0.7)';
ctx.fillText('HOLD IT IN', titleX + 2, titleY + 2);
// Outline
ctx.strokeStyle = PAL.ink; ctx.lineWidth = 7; ctx.lineJoin = 'round';
ctx.strokeText('HOLD IT IN', titleX, titleY);
// Fill
const tGrad = ctx.createLinearGradient(titleX - 130, titleY - 25, titleX + 130, titleY + 25);
tGrad.addColorStop(0, '#ffd93d'); tGrad.addColorStop(0.4, '#fff4d9');
tGrad.addColorStop(0.6, '#ffe870'); tGrad.addColorStop(1, '#ffd93d');
ctx.fillStyle = tGrad;
ctx.fillText('HOLD IT IN', titleX, titleY);

// Subtitle
ctx.font = 'bold 15px "Russo One", "Arial", sans-serif';
ctx.strokeStyle = PAL.ink; ctx.lineWidth = 4; ctx.lineJoin = 'round';
ctx.strokeText('TOWER DEFENSE', titleX, titleY + 32);
ctx.fillStyle = PAL.cream;
ctx.fillText('TOWER DEFENSE', titleX, titleY + 32);

ctx.restore();

// Vignette
const vGrad = ctx.createRadialGradient(W*0.4, H*0.5, H*0.2, W*0.5, H*0.5, W*0.55);
vGrad.addColorStop(0, 'rgba(26,26,46,0)');
vGrad.addColorStop(1, 'rgba(26,26,46,0.4)');
ctx.fillStyle = vGrad;
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
